front:
  text: 參寥子詩集卷第六
  hash: sha256:7bfa716f09f436ccff4166d080eda32084dc970c74b0d8b01a62ed346718cf3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_006-1a}
body:
  text: 寄王元均奉議昆仲崇文學士後二子皆翹翹異哉荆山麓産此英瓊瑶婆娑翰墨場文彩相蔚饒頃我未知識寸心徒搖搖前年廣陵城會合如有招名都冠淮海氣象古所豪林園若棊置佳處遺塵囂良辰肯浪負杖策同嬉遨清談落玉麈亹亹如聞韶嵗晏樂未闋離群復蕭蕭扁舟眇一葉出沒隨江潮雲山列千里廬藿尤岧嶤孤懷喜自放跨躒豈憚勞所嗟無二陸相我吟風騷廬山雜興溪石斑斑舞碎光巖花冉冉馥幽香當時吳猛逢山處金闕橫開在上方隔崖垂蔓蔚蒼蒼隱見莓苔舊石床定有飛仙集其下月明時復度笙篁髙松夾道夕陽明抱葉風蟬引細聲勸爾行人聊駐足出山無物更能清星渚江邊月巳生石橋歸路夜崢嶸西風散入松千樹翻覆銀河秋浪聲宿回峰院寄黃擇中察院秋堂立四壁物色夜蕭然藜床抱孤影起坐未成眠曽飈激髙梧万動接虛警感至情先謝理冥神預領銅壷漏未央扶杖起倣徨方塘溢繁荇冷月下踈篁躑躅步空除風帶裊霜裾泯余契幽獨悵子隔川途短短袖中書明發欲誰寄梁上木鯉魚儻能將此意古亦有相思吾今何所遺浩歌望雲水期子與同歸寄史院王正仲曽子開二學士太史久不作千秋想前人朝廷理故事董職須絶倫青錢兩學士班馬相並鄰婆娑金閨中婉孌得所親學海揚波瀾詞林藹芳春青編炳金雘允顯無曲陳翹翹茂令德諤諤規縉紳玉堂行見躋清切凌紫宸野人蹈江海放浪無邊垠相思邈何許共此青桂輪寄東坡昆仲江南十月天未霜木梢冉冉猶青蒼煙沙篁竹媚兩岸亭午氣候如春陽吳檣楚柂自紛擾花鴨鸕鷀殊未忙深灣野浦望不劇葦間隱隱聞漁桹黃昏無雲桂魄滿一川秀色傾銀潢何人隔岸弄長笛吹風渡水聲悲涼蘭臺故人天一方美景樂事誰相將船窗欹枕夜未央沓沓孤雲空飛揚梅花寄章仲粹法曹蕙死蘭枯驚嵗晏玉􅵿初發照溪寒從來吳苑墻頭見不似匡廬谷底看月浸繁枝香冉冉露浮紅蕚曉團團參軍詩格追何遜應笑山人自考槃梅花雲英粲粲笑相重結子能參鼎鼐功茜杏妖桃緣格俗含芳不得與君同造化推排力自強非關著意占年芳繁霜亂雪虛埋沒傾國人知有此香枝頭灼灼爛生光弄日驕寒倚短墻欲賦却慙無妙手使人操筆憶何郎寄福州太守孫莘老龍圖公生自淮海弱不遊群兒良哉白玉質炯炯無磷緇澡身以道德餘棄為文詞端能處庠序邈有孔孟姿一朝擅髙名卓然動京師餘輝耀天末燁燁如斗箕校酬藝閣中精義無參差同時鵷鷺行半巳翔鳯池兩登諫官室抗疏犯天威揚舲去江海曠嵗成流離朱輪擁苕霅五馬從合肥編氓仰遺愛墮淚存豐碑歸來遘風樹憔悴不展眉藉苫一室中四壁無重帷南鄰有古剎而我方捿遲杖藜時過公泣血聞嗟咨從容勸我坐一飯常共為蒸蒸沸古鼎蔌蔌投園葵客來慵應門客去知為誰禮喪事云既始領吳門麾瓶盂走梁苑恨不相追隨秋風亟東下旌斾俄巳睽浮川與遵陸多病亦云疲七閩冨名山空翠相逶迤在昔慕仁智於今慰遨嬉棠隂想初坐吏案紛交馳庖刀一為解往往無孑遺麥秋薦丹實梅雨裁纎絺黃金燕佳客柔指鳴哀絲萬事不芥蒂羡公能自怡聞子由舟及南昌以寄之髙安居士實人龍五載南遷道愈豐域外城池剛自守人間膏火詎能攻屢嗟江海星霜隔行喜雲林笑語同五老峰前佳氣象待君一醉吐長虹和子由彭蠡湖遇風雪夫子經濟材妙質靜而默當年大廷中如堵觀射策雄哉賢父兄一日並輝赫勳業望夔龍寧論二千石扶搖吝不借困此垂天翼五載貶筠陽區區挍尋尺鹽車厄驥足道路行歎惜脫身當嵗晏行李唯典籍髙懷久達觀不見憔悴色悠悠東下船晚次彭蠡側江風忽崩騰江水翻且黑飄風斷黃蘆落鴈委砂磧鵝毛飛雪片滿野來無極龍驤飛萬斛欲進不可得淹留向汀灣蕭瑟日將夕黃昏勢漸壯夜半巳堆積魚龍亦悲嘯凛氣增几席青燈冷不眠坐漱元和液危檣翻曉鴉霽日動窗隙搴幃望廬山萬仞絶寸碧茫茫銀世界蕩蕩月閫域順流復前趨百里俄頃刻暫停篙櫓喧却著登山屐五老笑相迎千嵓委圭璧紛紛林下士洗眼兾一識松門共邀迓香霧浮羃羃相將擁寒爐軟語同夙昔堂堂赤眼師既往有遺迹惸然窣堵波縹眇根石壁清晨陪拄杖緩步躡山肋徘回憩蒼嶺左右抗松櫪猿猱侮僮僕上下或戲劇巴僧眉半雪解后語鄉國却返朱砂峰招提更岑寂中藏李氏書盛事誇絶特東坡老居士邇亦有題墨一覽慰君心都忘逺行役寄俞秀老清老二居士風溪雲巘雪消初鳥變春聲滿屋除安得故人同蠟屐石梁斜日看遊魚落星江水接天流花絮飛時暮雨收波底鯉魚東去否尺書煩汝到楊州慚愧君家好弟兄風流冝與晉人并青鞋布襪能從我共入廬山深處行廬山道中懷子瞻谷口晴雲散曉光鳥聲呼我渡橫塘輕明獨愛桃花靜撩亂偏嫌桞絮狂處處叢祠起簫鼓家家籬落動耕桑去年今日東坡路拄杖相將探海棠酬周亨叔主簿見贈廬山百里蟠穹蒼絶頂隂雲常下覆晴日天風忽掃除翠壁千層開錦繡我來廬山初得君愛君面有廬山秀長篇嶮韻使我驚忽獲風流雲散後氣味清新滿牙頰如入洞庭嘗橘柚梅子如錢桞絮飛杜鵑哀號山雨晝念君眀當京邑行馬蹄蹴踏春泥皺黃陂新息道路逈野飯藜羮須強嗅天街到日夏漸熱車轂相摩汗如溜丈夫功名非苟取勸子未用輕藍綬山中五月早歸來澗底清泠當共漱訪荆國王公浩蕩經綸志已行北山歸老思冥冥可妨渡水穿雲客拄杖芒鞋到户庭博辨舊聞輕孟子談經早不愧楊雄惠能伎倆元無有還許從容廣座中苦嫌榮祿早收身歸與漁樵共隱淪白下門西山迤邐興來長是岸烏巾謁上竺觀音大士十年江海去飄然魂夢長依鷲嶺邊月地雲階重到處殷勤稽首白衣仙次韻元翁見寄十載離群歎渺茫良辰無地可相羊何時却入蓮花社軟語重焚柏子香藹藹春風搖几席紛紛啼鳥滿林塘欲慿海燕傳消息徑入君家舊屋梁病中四絶句呈劉景文左藏一室寥寥北嶺隈午窗孤枕夢初回無端自是風驚竹錯認旁人問疾來西風薄木晚颼颼古屋無人夜更幽童子未間煎藥火隔窗燈影漫悠悠髙梧挂月照床頭聒砌寒螀似怨秋我病尚能安靜默爾曹無事苦啁啾竹裏鳴鴉曉欲飛遽褰踈箔望朝暉莫嫌山色經秋瘦我亦秋來減帶圍余初入智果院云折蘇翰林率賔客相送者十六人各賦詩一章泰山屹天下四海同仰止我公命世英突兀等於是胸中廓秋漢皎絶微雲滓當年事危言軒冕如脫屣正貴知我希寧慙不吾以風雲果再符六翮挑空起一昨厭承眀抗章求迤邐餘杭右雄籓比屋冨生齒立談政即成興不負山水雍容敦末契訪我頑且鄙大斾輝松門禽猿亦驚喜森森門下士左右燦珠履使君道德姿圭角非所恃軟語如春風薰然著桃李今朝真勝事千載足遺美安得筆如椽磨崖為公紀龍井辨才老師新亭公禆余繼和輒次元韻折初成有詩呈府帥翰林逺公吾家傑道妙非壺丘德傾龍象侣貌蓋江湖秋平生經論學不為名相留淹淹若懸瀑下注萬丈湫昔年謝講事衆挽不轉頭刳心老嵓穴百念本不浮東南多望士唯見此老優翰林天下公方外實輩流旌旗虎溪路竟日泉石遊衆生病未巳師意可忘憂次韻蘇仲豫承務寄伯逹推官蘇子真豪英氣貌嚴且重幼無兒女姿嗜好百不動唯餘讀書事乃與古人共文章造深淳詞力寬不縱樂哉賢父兄道義日相從昨朝西湖外目極孤鴻送髙帆去百里山水乏吟弄作詩投置郵但述鴒原夢辨才生日像末真風恐不傳故生豪傑為人天慈航橫截三千界法雨均沾四十年獨鶴精神秋始健長松根節老彌堅莫將有物觀無象唾霧氷輪處處圎寄題解頥堂道人還家今幾時築室搆堂名解頥尺書三遣要我賦我獨老矣何能為塵埃筆研試料理肝肺枯稿源不滋為君苦思強抽軋詞慳氣迫無逶迤東陽自古號多士文采風流世有之堂成往往獻佳句羅列四壁皆瑰竒譬如鈞天巳九奏安用擊築鳴參差又如玉食厭方丈葵藿欲進旁必嗤他年但約訪君去借君几席聊偃欹堂中插架足書史牙籖玉軸當細窺送仲豫叔黨二承務赴試春闈炯炯雙黃鵠雍容振羽儀風髙辭澤國嵗暮及天池文彩非凡近周旋競陸離眀年翔集處九萬是君期同蘇文饒主簿西湖夜泛鳯咮山頭暮靄空月娥飛出廣寒宫初登桂楫橫湖去似覺銀河有路通掠草飛螢星點點眠沙宿鷺玉叢叢從來江揔文才妙請付毫端刻畫中酬錢塘宰王昭叔朝奉令尹胸中萬斛寬簿書堆案豈相關揮毫手過庖刀疾訪勝心同止水間竹日映簷光破碎雪雲開嶺翠連環自嗟不及匡山逺坐對淵明秖愧顔景文寵示把五言一章景文巳和之復使余繼其後折四月十七日翰林公過龍山真覺院賞枇脫略今山簡能吟舊子春偶因尋勝出不為採芳人紅紫千葩盡甘酸萬顆新江雲浮翠壁靄靄散魚鱗夏夜奉懷景文路分曽欄霽晚雨餘響猶滴瀝天風吹浮雲入夜巳無迹月波泛修竹灔灔流几席蘭膏滅衆炬涼氣滿四壁蕙煙擢銅爐暗觸鼻端息藜床但危坐萬想本空寂肺肝既冷然紈扇亦暫釋將軍不吾期樂事空自得願言賦長謡為我記此夕次韻景文會朱充仁大夫魏敏中朝奉於望湖樓長句髙樓冠浮雲下瞰百頃湖清漪照兩岸秀色含菰蒲騷人冨筆力領略驚須臾短長隨萬象肯議鶴與鳬二客各英妙溫溫古為徒從公文字飲所樂非歌呼酒酣挹諸山髙下如迎趨籃輿復迤邐逺訪飛來孤炎蒸近亭午天地如大爐石泉飲吾廬快意猶過屠松門徹九里始見靈山隅佳名自開皇籍甚聞中區幽芳不時艷地勝乃滋濡招提數四海雄觀冝且無歸途憩壽星寒碧森萬株蕭騷聒衆響孰辨笙與竽擡眸矚新榜蔚蔚氣自殊將軍戀清絶歡容頽玉壷道人烹露芽滿盞浮雲腴儻無方外姿未可同此娛寒食日有詩示怡然并余余次韻之折蘇翰林司馬中玉提刑過訪使君薄圭組冨貴良易足一麾下東南千里爭拭目援毫賦山水詞力㵼溪谷勝遊便杖履聒耳厭絲竹西湖破春冰曉漲翻晴緑相將二使軺導從還屏逐後先度嵓壑頡頏追鸞鵠樂事殊未央酒行冝局促風流俄醉舞坐客瞻頽玉嵇阮真逹生秦
