front:
  text: 參寥子詩集卷第二
  hash: sha256:d0d423718f577521718ed66cded4c7ba76fd399d1e037d3fce3759708ae4ce0b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_002-1a}
body:
  text: 法孫法頴邵伯道中一道河流逺接天兩行官栁復蕭然村􅿨歷歷鳴何處倣佛孤煙落日邊回首山光古寺基拂天寒木耿斜暉孤撑漸與鍾聲逺但見風幡竹外飛平山堂觀雨午枕藜床夢忽驚栁邊雷送雨如傾蜀岡西望蕪城路銀竹森森十里橫建隆秋夜𣑽唄聲沈香霧銷月明金殿影岧嶤夜深唯有龕燈在風露滿庭人寂寥姢姢雲月照窗扉𥿄帳形開夢覺時庭下風篁自成韻吹簫安用玉人為晚步叢薄蕭蕭朔吹翻瞑鴉遼亂欲投村江南雪後山無數林表才分翠一㾗次韻閻永仁博士同飲蜀井潭潭古甃閟髙岡修綆低懸百尺長廋語樂天推絶特第泉鴻漸許甘凉金盤謾說溥秋露玉碗休誇沃蔗漿更有碧梧盤爽䕃坐驚亭午失驕陽次韻永仁見贈憐君泣血依墳墓雖設衡門不妄開盈几貝多翻百遍同龕彌勒禮千回夜寒幽鳥窺香火嵗暮鄰僧數往來何日為余重掃榻卧聽松韻落清哀次韻何子溫龍圗見贈春破䢴溝古驛旁揮毫邂逅沈東陽自慙擊壤無髙韻但愧投珠有異光曠逹未應輸靖節風流可復羡知章我非照鏡迷頭客一接清歡亦似狂楊康功待制所藏醉道士石天官夜燕瓊樓春一官大醉頽穹旻飛光貫地若素練百里雞犬聲紛紛吹風洗雨嵗月古化此頑石良悲辛楚山之老頗知異濯以澗底清漪淪霓裳倣佛認羽客楮冠數寸橫秋雲空齊晝間戲一擊琅然哀韻還清真我聞天官天所陳雖復暫屈終當申烈風迅雷一朝作却上蒼蒼朝紫宸乾明夜坐懷孫萃老學士余生飄泊猶斷蓬詎肯低回附根柢兹焉得坎謾栖止一日從風即輕逝淮南十月寒未苦耿耿虛堂屬宵夜星辰錯落挂簷廡爽氣侵尋入衣𬒮桐葉聲翻玉露圎竹枝影掃金波碎安得南鄰龐老翁揮麈堂堂坐相對維陽府學四柏堂時為教官折鄒志完待制頖宫本凄凉庭户無冗長蒼然餘四柏終日清相向夫人擅所有髙懷益超放炎蒸五六月大厦如甕盎凉飈天外來披拂逾一餉恍如乘虛舟破月渡溟漲嚴冬衆木死薿薿獨無恙非永造化私故與冰雪抗冝亦有神明兹焉隂所相次韻少遊學士送龔深之往金陵見王荆公春風隨意可嬉娛水有舟航陸有車應笑楊雄未忘我閉門猶著解嘲書夢幼皆輸古竺乾功名何用咤燕然羡君一棹江南去碧薺時魚暮雨邊虎踞龍盤亦漫雄城荒狐兔往來通可人誰有秦淮月出沒姢姢波浪中白下長干春霧披家家桃李粲朝暉懸知一見毗耶老心地如灰不更飛次韻黃子理宣德田居四時四序自逶迤田園常局促春陽旋東臯迫我事銚耨出種曝籬根驅牛飲溪曲暉暉明朝陽聒聒喧布榖頽齡惜筋骸曉睡謾云足蓐食出柴門荷蓧赴幽谷搴條視柔桑密葉巳舒緑今年氣候早膏雨厭霡霂鄰翁時一來耕耨每相屬離離小麥黃習習南風度桑棗暗蓬麻耘鋤困朝暮種瓜屋東隅翠蔓巳分布黃花引踈籬冉冉欲橫路白水漫青秧聮翩下鷗鷺新絲換濁酒肴蔌羞薄具掃灑聚比鄰環坐䕃髙樹稚子羡嬴餘牽衣傍翁嫗牛羊嶺外歸落日林梢去餉婦亦還家笑言隔煙霧村落巳徂暑蚊蠅尚喧啾衡門霽朝雨苑竹歸新秋機絲迫鄰女札札無停休中田藹黃稼爛熳如雲浮渌蟻釀新甕嘉魴釣清流瓦尊遲來客禮數忘獻酬三杯未肯辭笑語方綢繆時平盜自隱場圃無宵憂兒孫漸束髮婚嫁迫所謀欵曲從我言歸途蹇淹留林端有月色相送前溪頭朔吹鳴髙林回塘冰已結牛羊卧茅屋原野暗飛雪壯男臂雕弓短後事田獵饑鷹一號呼荒徑灑毛血歸來誇意氣鄰舍呼飲啜明朝過南山更欲窮窟穴寒爐然豆萁光焰時起滅布被擁嬌兒從渠踏裏裂老翁寢不寐展轉念鵝鴨籬落易穿窬狐狸恐驚發和龍直夫祕校細雨細雨連阡陌輕雲濕不飛池寒鷗自卧巢冷燕催歸慘淡疑沈樹飄蕭忽近幃簷花霑巳久稍欲墮人衣薄霧兼寒雨凌晨靄未分細冝池上見清愛竹邊聞斗帳侵蘭夢虛櫺逼蕙薰晚來欣小霽鈎箔見踈雲傍砌飄才斷從風強更來斑斑泣蛛網浥浥汗江梅薄日光時漏曽隂意未開少陵心易感詩句寫清哀次韻孫傳師龍圗遊醴泉寺楊林幾曲到城根中有招提氣象昏暝雀聚群盤棟吻老藤垂蔓覆髙垣月生歸路無燈火巷轉人家有笑言却掩吾廬還寂寞冷風搖幔影翩翻春晴積雨久不破曾隂蔽城闕曉來得春風掃蕩净六合綽約墻頭花依微帶殘月少年誰家子驊騮飛蹀躞揚鞭出郊去逸興生林樾黃鳥弄柔音青梅巳堪折行樂須及辰芳時易消歇寒食東城隅青楊夾馳道髙樓暖鳯笙絶曲聞縹眇晴日動鞦韆飛煙拂瑶草南鄰與北里良辰競為好人生逆旅間何必事枯槁仰首笑春風兹懷誰與造東園斜照眀眀射竹籬桑隂翳翳麥蛾飛蕭條一徑無來轍時見羸牛引犢歸曲渚回塘孰與期杖藜終日自忘歸隔林倣佛聞機杼應有人家在翠微雲峰缺處支笻立溪溜聲中弄扇行習習南風吹百草幽香知有蕙蘭生淮上蘆梢向曉戰秋風浦口寒潮尚未通日出岸沙多細穴白蝦青蟹走無窮今夜沙頭月上遲小螢零碎傍船飛可憐光彩雖無限何似嬋娟一寸輝天闊隂雲低抱樹沙寒鷗鷺欲親人小航泊處誰家住修竹踈花宛似春冬夜㑹孫莘老司諫書齊去馬來車聲巳䦨雪雲低壓暮簷寒地爐山枿燒初熟軟語聊為世外歡碧瓦爐焚裊裊香紅柑紫栗更分嘗從來樂事人間少不惜歸途夜漏長多病山人能放曠忘緣居士解逍遙蒲團疊足清相向誰道雲林勝市朝曉出土山繞山修竹曉參差葉葉塗霜墜碧枝日腳漸髙風乍起蕭蕭恰似雨來時寄蔡彥規主簿繞舍蒼煙晚更凝隔簾新月未多明捿烏著樹無餘噪老檜吟風有細聲客散愈憐真境好定回猶覺幻身輕可堪俗子能知味此語聊傳北郭生次韻太虛夜坐字太虛折少遊一古寺冬蕭瑟天寒色更冥捲幃延素月轉盻失流星爐砥眠枯枿窗根立凍瓶談餘焚柏子一燧小煙清廣陵城外野步呈莘老林梢聒聒鳥聲繁積雪初消澗水渾老樹卧波寒影動野煙浮草夕陽昏風回笛響山前路犬吠人行竹外村杖屨不知幽興逺歸來新月在柴門次韻王通叟寺丞見寄雕斫肝脾欲報公還如獻豕過遼東珠璣屢獲淵雲妙土木曾無粲忍風耿耿吟魂嗟異處迢迢桂魄謾相同錦囊應有新詩在九曲池邊多塞鴻寄仲恭曉雨霽郛郭晴雲遞紛披曦和拆萬物初莖弄葳蕤倏魚泳弱藻漾漾動碧漪緬彼空際山黛影搖參差感此芳菲節美人曠佳期音形眇何方莽莽天一涯長河泮春冰花浪激箭馳好慿三尺鯉寄我相思詩早秋南樓書事白帝初回天地秋井梧葉老隂尚稠森森爽氣入屏幔骨冷魂清無汗流覺來覽眺覓佳處挾冊獨上西南樓崇山廣澤坐可挹逺水孤村橫道周上窺青天墮海日下瞰白鶴盤庭楸誰令濃隂起曽嶂撲撲亂眼如雲浮埋林漲壑只俄頃撫袂掩抑將誰儔眀星皎月邈難見絡緯蟋蟀空啁啾安得風生土囊口萬里一掃無停留王孫未歸空碧草我思不見徒離憂和莘老經六合西門水亭懷裴學士折栁相從地重來失舊柯林光延晚照岸影動霜波碧圃檀欒密朱簷翡翠過主人成異物搔首奈情何和莘老初至溫泉呈慶禪師年華行巳老林莽尚葱蒼地勝連龍窟泉溫注鬼湯人風逺城市鍾𣑽近僧坊九夏來投錫捿心應更凉參寥子詩集卷第二
