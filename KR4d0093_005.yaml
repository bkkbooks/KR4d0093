front:
  text: 參寥子詩集卷第五
  hash: sha256:858da993afffc510187b84725b0299a64999d656fc54a9f096b7bd83bfbfcd3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_005-1a}
body:
  text: 戲招李無悔秀才淋漓一雨過秋山洗出西湖小霽天炯炯魚鱗含倒景飄飄羊角卷荒阡野塘白芡珠盈斗幽浦紅蕖錦繞船冷炙殘杯當巳厭好來波際弄嬋姢西湖雪霽寄彥瞻西湖漫天三日雪上下一色迷空虛曾巒沓嶂杳難辨倣佛樓觀疑有無飢雛乳獸失所食飛走阡陌空號呼中園却羡啄木鳥利觜自解謀朝哺曉來鍾鼓報新霽天半稍稍分浮圖試慿髙樓肆逺目千里顛倒羅瓊琚逡巡夜月出海角光彩猛射來城隅方壷圎嶠只在眼綽約恍晤神仙居咄哉浩景似欺壓謂我不足為傳摸風流江左杜從事氣格豪贍凌相如安得飄颻跨鸞鵠手持栗尾來為書次韻彥瞻舟次三墩見寄雪消幽港漲漪漣草際晴絲罥細煙避槳輕鷗翻㸃㸃亞墻修竹靜姢姢風流逺繼東山後詩句髙凌北斗邉何日去尋陽羡路相携青嶂弄雲泉次韻彥瞻樊良道中幾日官河凍不流朝來微暖始通舟江梅破蘂香猶淺汀草埋沙緑未浮修網橫川魚乍集晴雲開野雪初收探珠既巳從驪頷何用區區入海搜寄張眀甫朝奉昔公令吾鄉緑髮氣方壯鳴絃坐髙堂百里肅清曠良辰騁遨嬉繭足履青嶂當時陪杖屨笑語相頡頏論文希鄴都樂事敦可尚銅章既云解余亦航海上悠悠亘六載天角空相望朅來石頭城邂逅慰離愴携手雨花臺俯仰得超放瓶盂徙京口冉冉抱微恙扁舟亂江來起我神益王浮雲共平生飄忽無定向去年客梁園塵土紛冗長狙猿失林木憔悴無優况獨有青桂枝冰雪不凋喪惠然肯過從香積仍接餉秋風迫南還危帆髙且張落日通津門轉盻增惋悵寢寐見髙標幽魂驚夜帳相忘同海魚千里各雲浪探梅問訊風篁嶺下梅踈枝嶺蘂未全開繁英待得渾如雪霜曉無人我獨來嵗寒亭草枯蓬斷正紛紛翠幹排簷不攺隂自是孤根難挫抑驕霜傲雪本無心與元規話别湖水蒼茫四接天短篷孤榜數回旋想君東海東頭夢猶在汀洲白鳥邊雷岫庵南千種梅含芳準擬為君開冷香秀色誰為主趂取花時更一來春日蘭英蕙蕚競芳新左右吹香暗襲人江海久無騷客賦一枝唯可薦靈均清溪白石曉磷磷洗露桃花兩岸新欲覓劉郎家住處但聞雞犬不逢人春詞輕雲著地栁垂絲百尺髙臺獨步時遙愛南鄰紅杏樹曉來新有過墻枝濛濛小雨暗池塘逺樹依微不辨行可是晚來風更惡杏花香亂撲回廊氷開池面初浮緑日促花梢始破紅謾道春光來眼底茫然無意對芳叢駐景樓額額髙樓古道旁樓前風物鬱摐摐溪聲不斷來幽耳山色無時在小窗金鼎養丹嘗駐景玉樽傾酒屢空缸宋清賣藥長安市千載佳名與子雙程公闢給事罷㑹稽道過錢塘因以詩見之嘗聞鍾鼓過蓬萊席上無非八斗才刻燭揮毫公屢勝投壷飲釂客先頽老元格調真難繼短李風流不易陪鑑水稽山行樂處後車長是載鄒枚江干千騎送朱輪父老無緣借寇恂吳國旌旗開白日越溪桃李失青春雄名素與珠星爛妙質長隨玉樹新當寧比聞思舊德萬方行見入洪鈞寄濟眀茫乎一氣同渾淪瀰漫六合無邊垠吁哉破散幾千載被在萬物含其真清輕為天濁為地一一厚薄理自勻駑駘騏驥不並廄夜光魚目難相親錢郎少年禀清裔英姿綽欲揮等倫忠言讜論躡根本行義修篤無緇磷是家嚴君抱徑烈直筆曽預螭頭臣我昔浮遊霅溪側傾蓋遇子情彌欣炎雲燒空五六月漾舟南郭吟青蘋溪流寬圍野橋碧溪樹靜嘯涼飊新竒探險取得佳句𣣔壓桞惲江南春瓶盂屬我暫行役樂事一跌成參辰使君旋亦報西去紛紛萬變難重陳南山暮冬厚積雪剛茂不死期松筠江行寄俞仲寬察院潮回沙浦寒月落山未曉駕言江上行行逺心亦悄苑屋兩三家雞聲聞縹眇輕風颭垂楊芳枝何裊裊上有雙鳴禽下有蕙蘭草蒸蒸物巳繁灼灼花更好時見頳尾鱗跳波泳紋藻即事起幽情情含結懷抱故交如參辰咫尺曠煙島紅日巳三竿回轅白沙道但聞蕭葦間拿音飛杳杳春日雜興池南池北日融融水荇風蒲各占叢幸有花枝能照眼可無詩句補春工城根野水渌逶沱颭颭風船掠岸過日暮蕙蘭無處採渚花汀草占春多栁外披煙舒逺目花邊植杖坐芳茵能言百舌深藏葉解舞鵾雞不避人雨闋中庭暖日浮春禽百種聚喧啾粉腰蜂子尤無賴撓遍花鬚未肯休去嵗春風上苑行爛窺紅紫厭平生而今眼底無姚魏浪蘂浮花懶問名碧流如鏡轉春渠時送殘紅出雨餘可怕莓苔黏屐齒強扶笻竹過鄰居雨洗樓頭碧瓦昏五更殘月墮金盆轆轤索轉玉繩曉花底宿禽無數喧梅梢青子大於錢慚愧春光又一年亭午無人初破睡杜䳌聲在桞花邊戢戢籬根紫筍長滿城桃李罷芬芳東風雖是無情物送謝迎繁亦更忙樹萱移菊助春榮沐雨踈風擢翠莖童子新能理荒穢不教蕭艾並叢生雪堂雨中梢林急雨暮凄凄簾幕風燈暗欲迷向曉請看南陌上一畨紅素掩春泥春日赤壁灧灧春江水拍隄雙雙出沒羡鳬鷖白沙青石無泥滓且逐東風進杖藜蕭瑟江梅樹樹空蘭芽猶短未成叢行窮赤壁山西路只有桃花一樣紅留别雪堂呈子瞻策杖南來寄雪堂眼看花絮老風光主人今是天涯客眀日孤帆下渺茫寄題徐德之先生間軒建安自古多俊髦徐子磊落尤其豪論兵說劒走湖海身勤事左無所遭緑林五校巳屠膾黑衣三衛羞徒勞歸來故山便卜築脫棄萬事輕鴻毛橫前澗水漱哀玉傍舍老攊藏飛猱山𬞞何用羡粱肉鶴氅未必輸青袍追雲弄月有真趣慎勿輕語傳兒曹九江與東坡居士話别霅水黃樓赤壁間勝遊長得共躋攀屠龍冉冉空三載窺豹悠悠愧一斑投錫雲林聊避暑絶江舟楫自東還求田問舍知何處杖屨它時訪小山贈潘邠老秀才去年雲夢澤南州為訪太史嘗淹留東坡寒碧最佳處恨不得子同遨遊今年廬山深且窅感君忽來慰枯槁溪月嵓雲亦有情昨夜為君顔色好飄飄緑髮方妙年圖史滿腹皆精研揮毫應敵風雨快咳唾落𥿄珠璣圓廣文英豪僅數千逸群驥子誰與肩男兒窮通故有命勸子未冝嗟蹭蹬丈夫蓋棺事始定他日雄飛鵰鶚徑草草論文未有涯匆匆别我却還家秋風更約通玄府共訪仙人卧彩霞㑹於太平觀折邠老嘗約余重酬周元翁推官見贈南來濟濟多俊良聲問逸發推周郎詞場較藝一戰捷筆陳獨掃千人強炯然眉目行且貴驥足萬里看騰驤吟詩作賦不媚俗期與往者同芬芳斷璋殘璧忽我贈把玩溢目驚輝光自嗟行李久蕭瑟安得置之雲錦囊又聞跨馬欲過我此意想君非渺茫山中草木最冝夏雨餘一一含幽香雛鶯乳燕學飛舞葉砥啞咤調圎吭䦨干笋蕨雖巳老璀錯梅杏猶可嘗隂崖碧洞不受暑谷風習習吹衣凉提携為子掃盤石談笑共坐莓苔蒼宣毫越楮須盛載吟取佳句還巾箱南康與曽子宣內翰神林浦因以詩寄之折相别抵暮大風聞泊舟旗亭方喜㑹髙標𣏌國天崩促去橈星渚風花朝冉冉神林雨腳暮蕭蕭飛流濺沫江翻怒拆岸頽沙蜃倚驕遙想英雄濟川手壯懷寧復畏傾搖曾子開吏部服闋赴召觀子固舍人題名一首折道過廬山與余宿偣東林驛騎駸駸破夕煙西來遇我虎溪前征途乍即應勞止陳迹重窺更泫然天上歸瞻新日月山中行覩舊林泉感時撫事情何極且伴幽人此夜禪過公擇藏書室我公昔未仕託蹤此山阿牙籖列圖史萬卷堆嵯峨披剝得精要卷衣辭薜蘿一住三十年功名歎蹉跎公今陟臺省壯志應未磨出處獨不謬紛紛當奈何脫身早來歸挂冠舊庭柯松窗展故帙炯炯臨曦娥豈復求甚解聊將寄天和勿憂野馬集勿念蟲網羅山祇善守護早晚潜揮訶雙溪曉步懷少遊子實亭午炎威劇風溪破曉行紆餘憐野彴錯落見長庚翻藻魚呈媚梢林露獻清二豪俱二闕此樂與誰并參寥子詩集卷第五
