front:
  text: 參寥子詩集卷第三
  hash: sha256:64f11b30660998af9e3a1250d8f2df414d0953b14d40007d52fc51708a0883f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_003-1a}
body:
  text: 法孫法頴再賦温泉赭落峰前與世分溶溶湯井翳深雲月生滋穴流寒影風入華清皺碧紋暗引石池波宛轉暖蒸苔壁氣氤氲解衣盤礴南䆫下骨肉都融到日曛次韻莘老㳺龍洞曈曨杲日破林埛杖筞相將馬暫停路與猿猱争險磴身隨鴻鵠入青冥巉嵓曲穴疑無底盤屈蒼虬信有靈能使謝公詩興動宛如㳺刃發新硎次韻莘老贈顯之盤盤秀嶺遶曾簷方丈門開挹翠嵐風激松梢聲間發月留泉厎影相涵大機清曉猊臺震險句窮宵虎穴探白傅異時修故事杖藜應許到雲庵虚樂亭誰搆新亭近翠微似教陶令洽天機池光引月來簷廡竹影踈風到客衣愛酒有時携玉斝無絃聊自拂金徽人間樂事還能幾肯向良辰與物違次韻朱伯収主簿觀雪朝來密雪蔽天涯坐目丘園發素華初著敗梧驚擁腫久霑庭竹見欹斜水精不動垂千筯雲母無聲落萬家安得曾穹返収拾莫教狼藉渾泥沙隂風何事吼簷牙夜半䆫前變物華夢断只疑蟾影在褰幃俄駭練光斜苦侵陋巷凌寒士強入髙樓媚酒家霽後請看庭下草蕙蘭含緑出晴沙次韻姜伯輝朝奉宿九曲池當時樓闕巳桑麻陳迹何湏置齒牙宛轉頽城圍緑野嶔崟孤塔背眀霞山雲度晚飛瓊葉海月生秋墮桂花圎嶠方壷同笑語終宵疑在水仙家刋溝絶句隔屋蕭蕭風度竹當空粲粲斗翻芒峥嶸嵗月人間暮目断雲山歸興長過新開湖寄李端叔大夫新開湖邊秋夢曉雞犬無聲人悄悄試揭踈篷覘日華水面殘星猶繚繞甞聞眀珠藏巨浸光焰一出輝群草篙師爲我暫停櫓冈象終期入幽討波間宛轉興方豪依然别恨生懐抱故人離群東海頭徇禄摧眉事枯槁菰梢蘋末翠猶在蕙蘭憔悴青楓老浪㳺不知嵗月徙舊約無端失天杪目羨南鴻兩兩飛安得身同羽翰小㳺胥堂在吾必行一榻數椽應預掃都下曉霽千門昨夜雨萬木曉生光御水浮紅蘂宫雲麗粉墻轉樓遲日静縈草亂絲長想像西池路濃隂覆緑楊酬邵彦瞻朝奉見寄楊州從事多文章新詩組織如朝霞髙懐忽念朔方客秋風一𥿄來天涯都城官蓋屬休沐解后過我森如麻開緘傳讀不知厭愕立圎視相驚誇上言音形闊川路下言杖屨埋風沙蹲䲻正熟邀我返城南古寺無諠譁我今翩然巳東下輕舟早晚從公家平山堂西百尺井請公爲汲烹露芽訪彭門太守蘇子瞻學士眉山鬰茀眉水清清淑之氣鍾群形精璆羙璞不能擅散發宇内爲豪英煌煌蘇氏挺三秀豫章𣏌梓參青冥少年著書即稽古經緯八極何崢嶸未央宫中初射筞落筆㳺刃揮新硎翰林醉翁發竒歎臺閣四座爭相驚逡廵傳玩騰衆手一日𥿄價増都城同時父子擅芳譽芝蘭玉樹羅中庭風流浩蕩播江海粲若髙漢懸眀星前年聞公適吴㑹五漿跪道人争迎浮雲流水付幽討下視世網鴻毛輕野人弱齡不事事白首丘壑甘忘情神仙髙標獨未識暫棄蘿月人間行朝吴暮楚失邂逅惝怳夜夢還惸惸迩來旅食寄梁苑坐歎白日徒虚盈彭門千里不憚逺秋風疋馬吾能征鈴齋吏退属幽欵一看揮麈銀河傾彭門書事寄少㳺我思君處君思我此語由來自謫仙欲借野人傳𥿄尾待慿新鴈寄遼天戯馬臺邊駐馬蹄囬廊曲院揔攀躋秦郎前日曽來否試拂凝塵覔舊題百尺黄樓拂杳冥樓前風物極崢嶸東州詞客渾争詠獨恠相如賦未成虚白齋瞻瞻遣放之遂命賦是詩折與子瞻共坐有客跪魚於子嘉魚滿盤初出水尚有青萍㸃紅尾銀腮戢戢畏烹煎掘強有時俄自起彼客殷勤贈使君願向中厨薦醪醴使君事道不事腹𣏌菊終年食甘美傳呼慎勿付庖人百歩洪邊放清泚囬首無欺子産淳謾道悠然泳波底子瞻席上令歌舞者求詩戯以此贈底事東山窈窕娘不將幽夢囑襄王禪心巳作沾泥絮肯逐春風上下狂陪子瞻登徐州黄樓黄花離披秌日短使君無事邀僧飯飯餘軟語爇香幽共坐圎庵不知晚燭籠持火報黄昬使君愛客還留連前登脩徑歩超逸後却從御來聮翩城頭隂隂未上月城下激激鳴潺湲漁燈照舡沙岸近賈客夜唱聲清圎徘徊始轉黄樓側銀箭銅壷知幾刻欄竿倚遍惜分携泣泣芙蓉珠露滴逍遥堂書事呈子瞻尋常卧雲林往往厭闤闠今朝郡齋裏岑寂反可愛曦和破簾櫳幽鳥語庭際開門面脩圃珍木羅翠盖蕭踈舊菊叢裛露有餘態主人事天和萬慮屏身外勞生一斷梗何處考根柢安能從物役擾擾空卒嵗脫巾每相從頗得資傲睨次韻子瞻飯別鈴閣追隨半月強葵心菊腦厭甘凉身行異土老多病路憶故山秋易荒西去想難陪蜀芋南來應得共吴薑白雲出處元無定只恐從風入帝鄉次韻少㳺寄李齊州畫舡京口見停橈蕭洒渾疑謝與陶但把好山供勝踐不將餘論挂塵勞諫垣天上經焚草藩國年來屢夢刀北客近傳新政羙未甞因物強吹毛次韻少㳺和子理梅花朔風蕭蕭方振槁雪壓苑齋欲欹倒門前誰送一枝梅問訊山僧少病惱強將筆力爲摹冩麗句巳輸何遜早碧桃丹杏空自妍嚼蘂齅香無此好先生携酒傍玉叢醉裏雄辭驚電掃東溪不見謫仙人江路還逢少陵老我雖不飲爲詩牽不惜山衣同藉草要看陶令挿花歸醉卧清風軼軒昊自彭門囬止淮上因寄子瞻朅來淮上卧蕭宫囬首人間萬事空院静水沈銷薄幔睡餘寒日耿脩桐南山訪古思杯渡北海談經憶孔融寂寞蒹葭霜雪後何時重倚玉青葱與曾逢原寺丞相别落葉追奔卷地飛淮流轉處楚山稀君騎黄鵠朝天去我憶青松舊壑歸道在不湏驚契闊情親聊用惜分違嵓居禄隠都如夢莫向秋風歎式微夜泊淮上復寄逢原黄沙白草滿淮垠逆旅蕭條思不禁風約亂雲歸隴首角催明月出波心槎頭湧處潮初上斗柄移時夢未沈遥想故人投宿地畫舡應在碧榆林曉發桃源渡寄端叔桃源渡頭雞一鳴舟子夜起趨南行泯泯河流浮落月蕭蕭岸木警秋聲依人翡翠霜翎重拂棹芙蓉露點輕爲報舊㳺朝士說天街何似此中清贈鄒毉君不見宋清市藥長安西衆工就取資刀圭瘡痬疾病一皆往所應不必黄金賫度未能酬輒焚劵耻學庸生憂噬臍人人徳清莫肯負日獲逺利豊子妻公侯餽遺日相属螘食華衣乗駃騠羅池神人爲作傳至今名譽横雲霓鄒君業毉世淮海㵼盛補衰知徑蹊玉函金匱恣探討拏以自副能不迷頃年西㳺抵京室逹官貴吏争品題歸來鄉縣頗蕭瑟湖水粘雲芳草萋怜余寢瘵古佛刹每辱珎劑相扶携傾囊倒槖願爲贈唯有圎蒲并杖藜君聞掉頭不我顧止索詩句光衡圭夜披陳編見清事重嗟此道今如泥君誠有意嗣前躅篋笥不憂無錦綈寄蘇子由著作先生道德若為容曾向南都幕下逢拔俗髙標驚萬丈凌雲逸氣藹千重低梧暫宿張家鳯濁水難藏許氏龍嵗晚雪霜雖更苦未應憔悴碧嵓松贈子固舍人文章煒燁動當時雋乂雖多不並馳解激頽波旋往古獨憐夫子抱青規山川淑氣真能感宇宙雄名豈浪垂未信長途老天馬行看蹴踏上瑶池吏部遺編久寂寥頴濵居士亦蓬蒿支流盡屈江湖闊衆阜爭隆㤗華髙落落千章揮琬琰湯湯萬頃起波濤玉堂鵷鷺遲公久何事﨑嶇尚夢刀宿乹眀五更風雨閙秋堂夢斷篝燈尚有光眀日又爲湖上客舡頭雲水正茫茫寄莘老十年手把使君麾一日歸來践赤墀偶爾夢中成故事凛然霜後見竒姿枯荄在昔甞叨廕微蚋于今頼附馳况有雲庵閟深谷他時香火與君期寄李公擇侍郎髙城夜寂起清風月下清霜墮曉空澤國巳驚黄橘柚省垣應對老梧桐青錢舊數文才妙碧落新㳺問望隆四海倚公調鼎鼐佇瞻和氣洽冲融俞公達待制挽辭金鐸哀傳静列營將星飛墜漢蕃驚森森氣與秦山在奄奄魂隨隴水傾塞路簫笳悲部曲海天風雨濕銘旌堪嗟未勒燕然石遽失連雲萬里城東吴佳氣久氤氲果見雄才出海濵屢試干將羗破膽忽摧梁木士霑巾人間夢斷黄粱熟天上樓成白玉新零落山丘今古事情鍾我軰謾傷神卷終
