body:
  text: 參寥子詩集卷八宋釋道潛撰次韻才仲試院夢中夢事見寄夢入秋山知幾層霜風吹骨正稜稜蒼崖犖确難安足自說徒余授杖藤事見才仲叙中朱甍碧瓦礙雲浮共躡層梯最上頭一餉䦨干變風雨凛然毛髪便驚秋怪獸胡為出巨津昻然激水忽翻身魚龍贔屭何妨事莫作風波謾恐人一川修竹映疎花川上時聞響釣車似到秦人種桃處誰知夢斷却還家崖根烏宻已先嘗從此知君鬢不霜應笑吾曺事枯槁山中危坐獨休糧贈吴子野先生麻田老仙心烱烱少有髙風慕箕潁枕流潄石三十年眸子瞭焉神更静忽然杖䇿海上来至人道妙同塵埃達官貴侯競招致往無所欲誰嫌猜邇来一志從吾黨跡與孤雲共天壤曺溪有路更攀躋徑躡毘盧髙頂上子野将出家事見東坡詩中送庠上人㸃檢行装拂與巾灑然輕别故山春家家門底長安道舉目何須更問津次韻才仲山行幕府文書一掃空何妨行樂醉春風想聞笑語千山外正在烟雲萬叠中哢日鳥聲喧細碎照溪花影静玲瓏苦吟只恐凋肝腎夫子還宜少黜聰與神智師話別昔我年始壮託身靈鷲峰主人大𨗳師鼔舞揚真風四方依絳帳雜遝象與龍嗟余扵此時已識大士蹤紛紛論議場頭角出羣雄如何三十載慧刄藏其鋒端居肄業地了不為世通邇獨念西湖聿来将誰從情隨山水逺興與魚鳥同平生方外姿自在如冥鴻明朝復回首飄灑一孤蓬暉暉堂堂上何為絶㸃埃堂前翠箒掃空堦遥憐薄日暉暉静影入髙人燕坐懐次韻嵩陽陳叔易先生見訪知君挟册未嘗閒一志端䏻事孔顔千里扁舟下吴㑹眼中收拾只溪山枯槁長専一壑閒權豪殊未少低顔風雲他日超騰去莫畏移文到北山曉霽雲擁茅簷水拍渠曉来新雨過吾廬蔫紅宿蕚莓苔滿觧事長揚自掃除次韻龔堯佐帳勾晨起感懐造物紛紛自變更達人何用校前程芭蕉身世榮枯久蝴蝶夢魂来往輕隔屋相驚銅漏盡開扉猶愛玉繩横應嫌百吏鳬行進簿領文書與案平逺齋為玉上人作君不見崑崙之河與天通源深發逺人莫窮回溪轉壑隨折衝末勢演溢流扵東東溟無旁下無底浩蕩足以家魚龍嗟哉吾徒雖好學詎肯著意推所從淵停富滀有若是孰謂世上無豪雄法師名齋意且逺張皇幽𦕈見爾聰西来竺書五千軸期子嵗月如磨礱離騷楚辭亦漫讀言語黼黻何必工禪餘習氣如未盡時倚澗石吟松風懐仙閣瀛洲仙人騎皓鶴珮玉鳴風度寥廓錦溪南望九仙岑笑指烟霞憇層閣閣中清絶無纎塵銅鑪著香夜夢真平眀跨鶴出山去澗草巖花空自春山僧問我入何地令作玉皇香案吏挟持造化幾時還搔首臨風聊一喟華亭道中白水茫茫天四空黄昏小雨濕春風五更百舌催殘夢月到官河桞影中同周元翁著作范眀逺秘校西湖夜泛各賦一首薄雲疎雨作還休白帝撩人巧變秋天地此身均逆旅江湖幾度共離憂暮聲斷續鐘連磬夜氣浮沉浦與洲圓嶠方壺吾未羨敢煩騷客為𡨕搜和元翁髙論每逢賢友生還如講武得竒兵了無鄙吝胸中物尚有風流世外情破海玉蟾初未躍灑空珠露已先傾回橈轉柁行三鼔始見波瀾百頃明和明逺二客風神瑩石泉觧衣同緩夜歸船已殘巾子峰頭日猶認吾廬竹外烟水怪有名殊未見犀燈無事不須然月眀幽渚蒹葭静珍重沙禽穏睡眠次韻月上人秋夜見寄𡨕鴻振想鷺儀形數日新秋入夢清丹壑流泉依舊否碧崖叢桂幾時生風来玉户凉初集露泫銀河色漸眀黽勉酬君無妙語夜光魚目愧相并送逺上人還金華千林脫葉送殘秋一舸南歸興莫留富渚江平非白馬子陵灘穏異黄牛吟懐覽勝宜無倦才力如君豈易求他日殷勤為細字盡傳佳句到東州宿天竺夕陽山氣藹葱葱路轉松隂複幾重行過石橋人未見數聲先聽寺樓鐘稽留峰北好林泉珍重幽棲得所便柏子烟中能宴坐想無餘習可攀縁霜壓簾櫳露泫條銀河影轉斗垂杓清言共失三更夢錯恨芙蓉漏易消晨起𤣥鶴驚呼曉樓鐘動翠㣲楓林墮清月疎影亂人衣喜不群不疑見訪鵲啅庭梧喜滿懐懸知二子下崔嵬山中爽氣知多少半逐風流杖屨来送桐江眀上人之都下窈窕孤雲下翠岑帝鄉閑去本無心紅塵滿眼急回首莫遣空山鶴怨深送定上人還㑹稽西風警羣木蕭瑟散秋聲病客有歸思孤雲無戀情月當千里共人恨四難并苦學誰如子他年在一鳴次韻劉蔡仲秀才雪後登竹閣檻前君子舊虚心雪後相㸔意更深暗日暖風吹鳥語翠梢髙處囀柔音君㸔楚嶠聳㠝岏圭壁千層間翠嵐山後一峯尤秀㧞依稀還落剡溪南次韻黄仲閔主簿見訪㳺寳雲諸寺吾廬附層阿松竹蔚行路平生土木軀羞為折腰具蓼䖝甘苦澁雖死那求遇黄香諸父賢傾葢有如素相将山水行所適得佳趣觀臺深且靚縞壁懸清句雲巢倚空端下覽宜細顧樓臺霽雪初碧瓦塵未涴籃輿指頺景長揖還辭去怳如山隂集俛仰已成故重来竟何時相望碧雲暮蘓世美夫人挽辭夫子剛中早數竒閨門髙節聳當時淵眀晚欲歸三徑徳曜能從賦五噫不見莱衣華髪事空驚薤露昔人悲故知造物酬隂施玉立諸郎富白眉重居夜坐懐蘓伯達昆仲狂風吹林聲怒號隔垣洶洶如秋濤夜来稍覺群動息星斗挂簷霜月髙東隣書生勤且勞粲然文彩真鳯毛遥想下帷應未寝短檠相對課離騷慕容居士䨇楠軒陽羨溪山名浙右氤氲淑氣無時有遂令比屋慕絃歌甲第殊科争㨗手先生讀書三十年數竒不偶真可憐閉門陋巷聊自隠簞瓢屢空心晏然南軒前頭兩佳木先生撫玩長不足尤愛薫風五月初白銀開花光照屋故人觧后相逢遇指㸃婆娑索新句君不見少陵壮叟有長吟莫作凡材等閒賦次韻蘓端定武雪浪齋孔眀氣宇白玉温忠義勇决踰玉尊葛巾羽扇傳號令塞垣徹警無塵昏良辰往往挟将佐射雕走馬循烟村歸来飲酒坐堂上賔從如雲填㦸門一朝郡圃得竒石雪浪觸眼驚神魂旁求蒼珉琢巨斛偃然卧土知無根三牛曵歸置堦圯錯磨不許留纎㾗興来作詩寄臺閣雄詞妙筆爭考論将軍今謫窮海外㑹見羲娥窺覆盆殷勤寄與朔方客佳致勿毁宜長存無為堂無為豈不動無念非刳心至人均道妙與物相浮沉青銅一寸眀萬象了自分何須苦機械擾擾亂冲襟晴窓裊馥篆衣祴蒙餘薫超然曠士懐所得踰古今示法穎兒曺汝既識薫蕕卓犖應須力自修一志徑從齊客語萬端無受楚人咻卑飛燕雀宜深逺髙舉鸞凰可並逰莫負謫仙當日語十年名譽滿東州清聚軒之子唫懐欲稱情故穿幽沼滀清泠倘逢来客議深淺但道淵源通北溟次曉師見别欲逰京洛春波漲南浦霽色媚澄鮮扁舟駕兩槳行矣子所便岸花開迤邐紅紫交相妍詩情發浩蕩輸㵼萬壑淵清新逼庾信雅徤追樊川相儔得鴻鵠翔集固超然衣裓暫塵土他時洗雲泉幽姿復烱烱不羨玉池蓮㳺徑山懐司馬才仲柔桑蔽野麥初齊布穀催耕雨一犂畧彴時横溪上下薔薇間發水東西重尋勝䖏追前賞無復斯人手共携回首春風増感慨綿綿黄鳥更悲啼雲巢環湖相望百招提髙棟層軒亦屢躋未若道人基構勝䦨干清與白雲齊九江秀色可攬結謫仙愛彼巢雲松寂寞風流三百載此軒竒觀躡前蹤碧瓦朱甍冠翠微鬰葱佳氣繞窓扉人間塵土紛阡陌不到藜床燕坐衣清明日湖上呈秦少章主簿水邉花霧曉氤氲春入西湖両岸深冶葉倡條他自媚朽株枯木我何心鞦韆索轉朱樓角博塞聲喧碧桞隂年少故人方感慨未應從俗強浮沉時少章喪耦送誠無上人還洞山文禪師席下上人妙齒遺樊籠嗜好豈與稠人同巖棲水飲有餘裕期以至道超鴻䝉少林人正僅千載末路鼔舞誰為雄西江老褐真望士蟻趨雲合争所從羨君服役事且久誠専志苦迷春冬心珠磨錯稍精瑩彷彿水月含冲融去嵗扁舟下呉㑹溪山勝踐情所鍾芒鞵竹杖霜露入始知莭物徂秋風朝来興盡挽不住飜然又逐南征鴻他年相逢定廬嶽與子終老巢雲松燕黙堂萬彚乾坤裡誰何識道真喧卑憎末俗燕黙羨髙人漏轉芙蓉永香銷栢子頻他年揮玉麈堂上挹芳塵送嚴上人還永嘉道人出䖏孤鴻儔詎肯低囘受羇絆飄風轉日厯九州不羨騎鯨逰汗漫我生與君幾相逢窮幽摘勝時乃同胷中妙道未容扣又引髙興辭秋風君家住在孤嶼側此别何時見顔色欲識相思一寸心冷月依依挂空碧吴門獄中懐北山舊隠六首江湖堂北是吾廬繚繞杉篁蔚有餘欲問山中近消息鱗鴻不寄獄中書誅茒投老卜栖遲雲雨相翻豈易知夜鶴曉猿休悵望回車復路可無時數畝檀欒古道邉亭亭氣槩上㕘天未應霜雪䏻摧抑不用行人嘆可憐東崦扶疎一樹梅繁英辜負嵗時開殷勤寄語蘭兼蕙他日春風我亦来甘冷宜茶石縫泉得名初自玉堂仙蒼苔滓穢聊疏治照月涵星復粲然一徑縁雲入夀星竹間窕窕見疎櫺䦨干數曲觀臺上幽草靚花常滿庭吴門懐錢塘何彦時仙尉英妙何郎藴徳光不隨人世事炎涼麒麟歩武開天上他日青雲道路長英㳺閣前官桞行柔枝嫋嫋弄鵞黄多情春色還依舊獨有離人天一方湖岸茸茸細草生芳洲杜若想縱横去年問桞尋花地誰伴穿雲渡水行劉咸臨秀才挽詞四首道源學士之子劉子江南英韻勝不友俗閉門誦詩書户外無来躅昔我寄匡山巖扉屏幽獨君聞跨蹇驢迢迢訪深谷忘懐去畦畛結好比松竹浮雲事忽空逝水難再復徒有箧中文千秋成鬼録異材擢陽阿秀色方蔚然侵尋掩衆阜屹屹上造天驚颷忽摧殞中道虚棄捐顔淵古稱夭道徳今獨妍何求擁腫為無用徒永年平生本家學恥作干時語著書以愚名綽欲慕前古紛紛詆迂濶黙黙君自許弱齡詠風騷其詞哀以苦先生歎竒作夀達終難與果為𡨕𡨕逰一往不可覩吾希李長吉異代不得友賴餘錦嚢篇把玩時在手斯人君並駕未易較先後肝脾褁陽秋落筆粲瓊玖當年觧后初宛在三峡右相携石橋行下瞰氷雪溜音容俄永隔山月空依舊銘詩得黄香知子垂不朽贈霍山人先生少年喜武事三畧六韜曽徧閱胷中雲夢吞八九氣勝萬夫真勇决防邉伊昔從都䕶欲取功名繼前烈臂弓腰箭事戎装逺出沙場恣㳺獵擒狐射雁狂且逸不覺歸途迷夜雪敗官遭譴失所志回首飄然辭魏闕挟持妙術當生涯放浪江河閑嵗月尋常得錢即沽酒笑與妻奴同飲啜樂天知命了無憂奕奕紅顔浮兩頬春風浩蕩魯城邉稠花亂蕊爭紛妍方将與君共携手騁懐㳺目相回旋興来别我汶陽去黄鵠一舉難留連村橋野店醉斜日路人誰識地行仙㕘寥子詩集卷八
