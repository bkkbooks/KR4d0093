body:
  text: 參寥子詩集巻九宋釋道潛撰送劉不已推官罷奉符尉入都注擬少年讀書破萬巻河朔聲名壓諸彦詞場百戰功不成晚得青衫非所願白頭況有北堂親斗禄強須甘冗賤三年一尉泰山下簿領區區事弓箭追窮㓂盜走山谷肯為風霜辭怯懦要功兾賞本無心脫去僅䏻逃所譴草枯蓬斷嵗将徂結束行装抵京縣達官貴吏急賢材一鶚君須預論薦投竿舍築去作相觧后風雲一朝變造物於人自有時未足為君生忿怨過彭城觀陳傳道知録所藏東坡公畫枯枝瘦石兩相望南北悠悠徑路長巻盡平岡三百里風枝雨葉更飄揚淮上觀水桐柏崑崙日夜傾役溪注壑本無情乍為含垢千尋濁不作矜人一掬清戯書誠師秋景小屏黄蘆敗葦兩三叢彷彿江湖在眼中雁鴨驚呼縁底事一時昻首立秋風過韞秀堂觀仲豫二詩因次其韻箕南斗北各殊方誰信相思去夢長蓬斷草枯常歳晏寥寥空對蕙爐香荆溪一别十年餘流竄何嘗定所居等與山河同幻質更将三界作蘧廬次韻聰師見寄三年東魯貶閉户寔超然静極通幽𦕈神㳺豈間焉獨全霜後操未異火中蓮不似沉湘客徒懐忿與悁夙學誰知子源流務所滋風騷追五桞襌寂擬長髭桂魄元昭晰浮雲自蔽虧險夷終一節吾以古為師次韻升師見招老去年光知幾尋無端華髪苦相侵獨憐碧眼平生舊未改青松一寸心欲扣禪關當嵗晏肯愁溪路隔雲深相逢試探梅花信應有香鬚擢碎金兒童牋管已䏻操書乏吟忩幾兎毫文囿垣墻増漸廣詞林枝葉勢方髙嗟余舊喜論周誥晚嵗無心諷楚騷羨子得時勤述作宛如秋浦漫雲濤殘菊霜摧露殞萬枝空叢菊鮮鮮尚見容細蘂冷香聊自媚無心引蝶更勾蜂滌軒隔雲穿竇引㳙㳙噴玉跳珠亦可憐心垢本無何用滌戯将瀟灑度流年千頃廨院觀司馬才仲遺墨次韻濛濛春雨暗村橋竹裏禽啼婆餅焦度谷勌聞車軋軋穿林愁聽馬蕭蕭細窺陳迹僧坊静黙想風流鄙吝消浮魂沉魄今已矣無人為作楚詞招唐昌王恱道桃竹軒餘杭門西山迤邐屹屹千峰挿天起窮幽摘勝過三邑隨䖏雲林皆可喜邇来杖䇿到君家始覺溪山逢骨髓爭流萬壑㑹目前競秀千巖對窓几丹楓洗雨秋霽餘白鳥出沒嵐光裏主人韻勝無塵埃翠竹紅桃相映栽良辰樽爼憑誰共友月朋雲自往来溪上紅蓼叢邉䨇鷺飛波㾗飜動碧琉璃須臾相趂却回首斜立垂楊烟外枝聽盛道人琴隂雲收雨閣層簷寂寂西風不動簾燒盡夜堂紅蠟炬髙山流水聽無厭有客浮㳺不定家玉琴三尺當生涯從来正始無人㑹棹首髙歌烏帽斜千頃山圎鏡堂呈應禪師兹山嵯峨冠天下一徑縈雲行兩舍始窮絶頂見招提碧閣丹樓屹如畫門前池水滀蜿蜒座上風雷驚晝夜峨眉五臺誇壮觀品目真不此為亞偉哉南師非世人開荒闢土初椎輪寥寥相望三百載廢興一一難具陳丹邱大士来鼔舞氣象煥發重増新投金輸贐走南北法雨所被無涯津虚堂選勝得佳䖏隆簷巨棟成逡廵窓扉洞達舒兩目異景錯出羅蓁蓁朝雲夜月常萬頃寒光烱烱如鎔銀堂中隠几人何似湛若玉毛懸秋旻榜名圓鏡示来客庶使方寸無緇磷沈道原養浩堂塵勞萬計日紛紛未礙堂中養浩心花草暗香来屋角溪山爽氣入衣襟樽中白酒無時有箧裏清詩不廢吟夜夜鄰家助幽致數聲羗管弄㣲音宣上人玉淵堂玉淵閟蒼崖源深杳難測但見㳙㳙附籜龍宛轉来投小池側小池方折餘兩尋鼃黽不㳺苔不侵青天無雲落寒影沈柔見底空人心妙哉支公營小築氣象蕭然真不俗夜吟朝講度流年何用崢嶸誇傑屋與定師話别六言客有来從東越示余滿把瓊瑶萬壑千巖鍾秀故知多士翹翹雪解松筠振色氣回蘭蕙含芳興動剡溪吟客夢先歸鳥飛翔山海濤雷方震横江雪陣如山一葉舟輕飛燕飄然掠水東還鳯咮山含暮靄西陵月破黄昏慣作江湖離别未應當此銷魂慧覺孜師緑筠軒緑筠蕭蕭含爽籟幽姿冷落人難愛壁間但有謫仙詞聲名自到江湖外當年剏軒非壮觀局促簾櫳日虧蔽一朝經畫有底難推倒墻頭了無礙坐挹西南十里山彩翠浮空屹相對開池鑿圃増氣象佳致真為一方最鳥聲鳴春春漸融蘭芽蕙茁初䝉茸我来正值新雨定弄日吹香聞座中主人散䇿邀我歩池南池北聊從容㑹待龍孫添夏䕃借君此地眠清風夏夜智果懐武康令毛澤民暮磬寥寥殷上方籠紗朱火影㣲茫窓虚竹净雨初闋雲潤星輝夜更凉落枕松聲驚瑟瑟撲簾香霧靄蒼蒼遥憐散髪東堂老正卧風漪六尺床澤民自號東堂老人寄宗室趙伯言朝請趙侯天人裔雅韻能㧞俗豈意江湖間解后識眉目髙談為余傾落落如轉轂端無富貴驕但有文字欲交㳺多望士頡頏爭馳逐艱難風義髙迹與古人續銅章領劇邑宛在江之曲鳴絃陶永日了不事鞭扑新詩擬建安簡逺詞不縟錦嚢有餘棄示我僅盈軸持還故山棲把玩時反覆美哉韶濩音鏘然落巖谷嗟余真淺陋學海無一掬仰君東溟深短綆不可觸讀東坡居士南遷詩居士胷中真曠夷南行萬里尚能詩牢籠天地詞方壮彈壓山川氣未衰忠義凛然剛不負瘴烟雖苦力何施往来慣酌曺溪水一滴還應契祖師讀聞復詩巻詩律久已廢宏綱誰與操斷絃那慮續吾黨有英髦氣穏侔彭澤詞幽近楚騷未輸湯從事獨詫碧雲髙次韻聞復廬山見懐匡廬三載恣徜徉肯憚衣裘弊雪霜學徹死生追粲忍力窮騷雅陋齊梁心源素與秋潭静定水寜同夏潦潢觧后逢余舊題墨蘚封苔駁不成行夏日寄愚坦二上人仙潭從古水雲鄉不羨西湖六月涼支港官河通市井採菱拾翠有舟航觚稜逈與星辰接鐵鳯疑參鸛鶴翔九夏登臨輸二子一時摹寫付詩嚢次韻聞復西湖夏日六言山水初無今古人間自有沉浮試問行歌野老桑麻用事何憂老葑年来席卷吴儂舊恨彌申昨夜馮夷皷吹遨嬉抵徹諸隣夜深一碧萬頃彷彿明河接天岸曲風篁成韻絶勝細筦危絃西湖清淺可泛湍險豈類瞿塘隨䖏菰蒲蓮芡櫛風沐雨尤香南窓寄傲一榻午帳風来卷舒懶躡子雲陳迹解嘲更續成書燒空火雲萬丈氣㷔信可流金嗟爾龜魚得計適然㳺泳滋深櫟杜侵堦美䕃鳴蟬託質初涼熏風正被草木莫作秋聲感傷柱礎爭流餘潤油雲忽改山容定有盲風恠雨曉来已聽鼉龍湖光宛同玉鏡隄桞閟若房櫳六月行人過此未輸仙客壺中河漢斗杓横七重城漏皷傳三露鶴一聲何許嘠然震響空巖夏夜偶興㣲陽墮層巘歸翼投空林龕燈閟古殿􅆊唄無餘音眷兹石壁下徐風散冲襟缺月如斷環依㣲挂松隂清暉婉相屬永夜諧吾心空生大覺中一漚示浮沉此身漚中客𡨕觀無古今昔我嬰世故紛紛那重陳且求華胥夢蝴蝶相追尋次韻古上人湖上歩月尋常西湖月雲霧多襲眀兹宵實昭晰似慰詩人情低昻見列宿戢曜非光熒起余二三子㣲咏哦新聲杖藜山前去雞犬寂不鳴蘭臯宿鷺羣回首時自驚君看南北山氣象真崢嶸參差烟樹藂一一含餘清上人江南秀解后意所傾夜䦨勸復路浩興殊未盈臨江月上人率同志為社誦法華經一萬部資其梵行作此以贈之䏻仁說教滿竺乾流入中國餘五千扵中妙經為最勝顗師所觧尤通𤣥化行吴㑹連海壖紛紛得法如雲烟見聞讀誦又其次隨類譬率無間焉嗚呼上人志且堅善邀佛子同法筵妙香炷爐馥旃檀十科勸進追昔賢旁行貝葉軸似椽巻舒朝暮往復旋利根㣲種聊窮研魚兔一獲忘蹄筌自餘區區顧未然瀾翻口舌如湧泉外物交錯心匪縁功成一朝晚受纒煜如紅蕖濯清淵俯仰千聖遽可肩茫茫苦海旁無邉不有舟栰誰䏻先烏蟾疾馳如走丸咨爾佛子無睡眠瑯琊山茶仙亭呈曽子開侍郎滁山雖僻左謫宦皆名臣後先聞數公卓然皆鳯麟憶昨紹聖初譴公俾省循盛徳忘怨悱虚懐隨屈信政成思覽眺興與烟霞親後車載鄒枚主客驚路人逶迤度山谷導從屏所陳漁樵許爭席解后全天真泠泠庶子泉味壓康王珍團團小圎月色冠閩山春白足相與飯溪毛擷青菁熊魚得兼美樂事無涯津花瓷勸引滿疏瀹貫百神危亭倚巖阿榜額獨朱新牧之擅風流茶仙誇絶倫相望三百載公䏻嗣芳塵送錢持王主簿西歸蘭陵號多士君實名家孫髙才糜筦庫枳棘棲鴛鸞一旦謝朱墨超然整歸軒迎秋餞伏初炎威尚歊煩松陵接苕霅迤邐皆清源舟子宜夜泛蘋風生夢魂回塘官桞行千樹如雲屯眀河挂桞外涼月低金盆兹行信有得他日為余言寄子開内翰天将有作㑹雲龍一徳君臣邂逅同表率衣冠真領袖羽衣臺閣舊家風詞林豈獨専周誥衮職深期補舜聰四海滯淹公可棄盡教鳬雁集庭中贈潛照月師吴興上人心志苦筆研十年耕學圃形癯骨瘦神獨清耿若霜鷗立秋浦錦嚢新詩殊汗漫妙語間發猶稽古銖鋤冗長更磨揉激濁䟽清導靈府自然韻勝遺島可逺跂淵眀追歩武瓶盂勸子適四方莫學匏𤓰甘墮窳崇山廣澤徧㳺覽始信慿髙極天宇蓺成技進蔚文采楚楚華身竟何補茫乎三界同傳舍而我與君俱逆旅不如回首依老褐妙精眀心求許與鳴蟬委蛻槁壌餘脫畧秋風即髙舉垂慈堂木樨花堂下髙花屹兩株繁英碎蕚巧連茹猛香匪占春園盛清烈仍分里巷餘長抱秋蟾滋夜氣偶揺風露墮階除根盤厚地知方壮封植何人考厥初此花乃都正慈化老師手披之次韻關子容晚霽小院回廊眀霽霞疎簾未捲尚横斜應憐碧砌無塵滓石竹紅薇靚有花飛簾初遣雨師回獨上江城百尺臺萬景横前方領畧越山仍欲送青来再和湖上晚歸漾舟歸路興何賖水樹低凉一道斜菱蔓蒹葭都巻盡芙蓉烱烱獨開花雲披霞卷仰昭回試望翻經古石臺應有秋香生桂樹吹風肯傍暮船来次韻子容同聖功見過檀欒小徑閟隂隂觧鞅停驂步更深知我山棲久寥落故留佳句比南金桃李君家世布隂棣花雍穆義還深浮雲百變何須恠張耳陳餘舊斷金參寥子詩集卷九
