body:
  text: 參寥子詩集巻十二宋釋道潛撰静舍與蔡秀如承事㑹話浮雲無根蔕合散不可拘忽然隨髙風千里各須臾吾生共天壤出處良亦如憶昔淮水濵與君傾葢初翹翹兩弟昆文彩照氷壺門䦨本世胄折節勝寒儒扁舟倚髙岸為我飯伊蒲清談落犀麈鄙吝驚掃除一别今四載相忘寄江湖朅来過汝潁弔舊投生芻夤縁訪山水嵗晚倦回車蕭蕭古寺底彷彿日已晡聞君户外音倒屣迎前趨胡為乎来哉吏牒頗馳驅髙材困所役何似林間樗清寒凛敗屋猛燄焚枯株胡牀坐相對氣貌温以舒眀朝各異縣那得同蘧廬無煩歎離索且盡一笑娱贈耿純叔秘校二令侄髙門知積慶堂上有諸郎禮樂非童子詩書見義方經營羞弱闕騰踏羨飛黄富貴由勤苦五車安可忘讀子蒼詩巻二首蜀國竒男子能文到古人淳源稽大雅妙曲和陽春節物驚揺落僧坊斷四隣看君新著述時與短檠親大冊雄文未許窺百篇先讀海陵詩疲駑伏櫪空驤首飛兎流星作麽追贈賢上人恒山道人棄妻孥壊衣祝髪從浮圗愛纒欲網豈易脫慧劍劃斷真須臾飄然雲水出鄉國力學生死来東都心猿意馬就羈束肯逐萬境爭馳驅回看舊事真一夢清渭濁涇良自殊楚山嵗晚俄觧后雪屋對語依圎蒲勸子南逰下吴越小航短棹尋西湖我家住䖏湖岸北如椽翠竹森千株竹間扣扉試訪我定有猨鶴聲相呼次韻髙夀朋殿直喜雪二首夀朋乃宣仁曽孫俄頃風雲變物華撒鹽飛絮鬭輕花只因陋巷無貧者玉户瑶階共一家挟風穿箔打窓紗窓裏人看窓外花噴玊流珠君豈羨從来自是五侯家書申正已秀才所藏雀竹圗後二首荒園古壍雪溟濛細竹枯條共一叢寒雀喧饑正無賴輸他孔翠食樊籠樊籠得食暫時優身世經年類楚囚何似東阡與南陌暖風晴日恣遨逰過韓氏荘登小閣二首繚墻千堵氣雄深小搆亭亭出數尋刈穫一空雲水白䦨干注目見遥岑玉秀蘭芬好弟昆時来挟冊視田園囷場古木千章合彷彿秦人避世邨鄭元䂓秀才内樂庵陳叔易命名内樂名庵誰所擇澗上文人題榜額想見風流庵内人定非紛華域中客紆朱懐金何足誇簞食瓢飲真生涯了無憂患到心境得失雞蟲良可嗟李榮期秀才杞菊軒草木􅂇盤飡紛紛固多品精英唯竹萌香軟獨楮菌杞菊扵其間甘清有餘韻達人忘口體道徳自滋潤天隨與東坡風味實相近窮通均一致了不見喜愠春苖共採擷秋英配蘭紉後先屬文詞金聲而玉振李子妙窮經屢遭有司擯奔軍未云怯再舉當决陣開軒植杞菊澹泊守定分回頭語世俗未用誚饑困二豪勉躋攀孔聖故許進長卿亦何人區區能慕藺寄潘仲升秀才漢唐誇汝南豪傑不勝數山川有靈蓄欝欝久不吐邇来見潘子秀色實眉宇是家賢伯仲學術本鄒魯他時俱侍立肯與噲等伍浪為葉城逰觧后得晤語異鄉逢嵗晏越鳥思南舉江湖結後期細與論今古次韻方平送李南仲赴試春闈四溟鳬雁集天池十目先看俊翮飛養氣有餘吞大敵窮經無繆識𤣥微塵埃舊服辭阿緆雨露新袍授楚衣拜命還家春尚好桃花流水漲漁磯劉福老長官佚老堂淵明未掛冠志已蹈方外何時辭五斗散髪從傲睨閑中氣味好至樂無與對黄香識君心機事勸早計古来軒冕事端受外物制有如纒蔓𤓰詎肯脫根葉一朝秋風至零落驚潰潰佚老得天和晚景期百嵗超然閭里間髙風邈難繼贈權上人兼簡其兄髙致虚秀才豫章山川足靈氣天與四時滋萬彚翹然䨇榦秀一門儒釋殊科道無異一操經術逰廣文一事瓶盂尋祖意功名生死兩俱徹論報君親各無愧上人餘力擅風騷三昧何妨間逰戯窮愁肯學郊與島髙瞻已能追晉魏文章妙䖏均製饌不放鹹酸傷至味少陵彭澤造其真運斤成風有餘地眉陽老人文所宗此語得之吾敢祕期君向上踏𤣥關奔逸絶塵那可跂孫傳師宻學輓辭四首淮海衣冠盛門䦨占一時朝廷矜棣蕚人物得熊羆暫倚軒裳貴還隨舟壑移新阡埋玉樹黄霧慘餘悲王畿初作邑終日坐鳴絃雅量能知變平戎在未然裕陵俄識㧞鵬路遽騰騫二十年間事凄凉付逝川逸氣凌崧華髙標藹縉紳經綸真漢将譚笑却邉塵白首遭㣲譴青雲阻要津功名關造物一語未能陳伯仲持哀日余方傾葢初炷香飜貝葉酌茗飯園蔬一作䢴溝别空傳桂嶺書升堂揖遺像回首意何如孫志甫主簿輓詞二首彼美荆岑玉斯人實可儔眉間見和氣皮裏識陽秋夫子常稱徳蓬山素並逰一官雖不夀撫已亦何羞君乃莘老龍圗之弟梅子眀學士之友篤學誰如子窮經志亦勤干将曽未試寳氣已沉淪天逺終難問眉酸謾自顰佇瞻蘭玉秀褒及墓中身次韻張敏叔工部題郭殿直逺趣軒髙棟曽軒何用為此軒雖小景無遺惜當麥壠堆青日不見波濤巻雪時眼底衣冠多觧后胸中貴賤少參差郭君美人倫問君卜築隋隄上幾見春光上桞絲䝉泉堂百尺蒼崖底䝉泉自我名滀涵滋造化汲引絶虧盈碧甃深仍固朱欄小易成慇懃中夜月長與照澄眀八月十七夜夢中作夜半秋江不見人翠荷擎出露華新江神水仙来共飲一掬遺我生精神哭休上人從来疑造物無䖏識其真好月難終夕名花不盡春青燈空照室白㲲謾遺巾泣血憐慈母悲酸動四隣䆳隠堂雅搆何幽𣺌真宜䆳隠名朝雲半峯秀夜月一簾明終嵗塵氛少無時爽氣清炷香翻貝葉安穏老餘生寜川西寺水閣呈周格非承議岧嶤畵棟與雲平一派寒流玉鏡清三島勝形方足擬千鈞筆力始能名鷗飜翠靄光中去山倚朱欄静䖏横令尹政閒勤把酒風流未減謝宣城僧首然師院北軒觀牡丹鳥聲鳴春春漸融千花萬草爭春工紛紛桃李自繚亂牡丹得體能從容琱欄玉砌昇曉日輕烟薄霧初𡨕䝉深紅淺紫忽爛熳如以蜀錦羅庭中姚黄貴極未易覩緑葉遮䕶藏深叢露華膏沐披正色肯事夭冶分纎穠從来品目壓天下百卉羞澁何敢同清浄老禪根道妙即此幻色談真空上人封植匪玩好庻敬先烈存遺風遨芳公子應未耳且樂樽爼怡歌鐘用法穎韻寄信上人懐素髙閑世罕追君今端與若人期龍蛇落紙驚飛電心手相忘豈所思驥子神駒天與俊朝燕莫越足難羈超然遽作䨇溪别肯學紛紛兒女悲昌化䨇溪堂呈府僉判徳茂宣徳吴㑹溪山總可憐此堂雄覽獨能全銀河兩派来天上黛色千峯落檻前樵斧聲沉蒼靄裏釣竿人立白鷗邉多才李賀知無敵妙句行看陋衆妍用法頴韻寄詵上人吾生出䖏異周顒猿鶴休驚蕙帳空木筍薦盤非世味胡麻供飯古人風時飜貝葉千行偈戰勝詩魔五字功杖屨儻来償素約與君同盡此生中山中書事身世從来薄所營晚歸邱壑更忘情隨眠煩惱何曽有無樹菩提本不生布襪青鞋供我老月溪沙路恣經行細炊雲子齋㕑飯要配香芹碧澗羮次韻孔天瑞秀才見寄䨇溪秋色最關情想見登臨爽氣生木落草枯山自瘦潦收沙白水偏眀眼中舊事烟雲散箧裏新詩早晚成来嵗如今好時節看君髙歩躡鵬程聽天竺慧照師琴太古淳音久已虧多君妙指善醫治髙山流水意雖在白雪陽春和者誰不放驚飈侵澗户只容眀月侍簾帷滿堂賔客俱傾耳共失芙蓉漏轉時寄伯言眀發御城東畔聽鳴珂公子當年為我過論議凛然無兩可文章妙絶具三多情親意合方傾倒雲散風流欲奈何倘附南鴻寄消息吾今蹤跡閟巖阿過玉師室觀霅川范生梅花桃李韻麤俗江梅清獨妍幽姿有時覩如揖姑射仙從来丹青手黙數三四賢徐熈擅江左趙子名西川中間復誰何絶特推老邉風流迨兹冺范子俄超然廼知苕霅勝秀氣常回旋斯人非畫師勢利不可鐫興来即揮毫㳺戯三昧前一枝豈易得荅子䏻拳拳横斜有餘態肌粉含霏烟我来玩几席歎賞徒留連恨無䖏士詩二妙相並傅䖏順齋生前不用驚毁譽身後何須千載名䖏順安時真曠達本無哀樂動幽情贈聖可證師吾道日凋喪末流殊可嗟師門互開闢學者如泥沙欲求超然姿駑廐搜渥洼子初為兒童岐嶷衆所誇長能逰學海宛轉窮津涯誰知蓬蒿底忽覩挺生麻向来挈瓶盂同我棲烟霞朝昏事禪恱神觀静不譁子今未三十涵養滋根芽行看覺苑中綽現優曇花次韻通守楊叔豐大夫逰狼山朱轓千騎擁郊埛政暇尋山固有名眼接青蒼心已喜身經曠野路尤平潮吞浦溆渾如海蜃吐烟雲謾作城欲訪真仙迷紫府空端依約歩虚聲吴楚封疆一望間時平無事可相關樂天標致元非俗靈運襟懐本愛山蠟屐斜穿横嶺上角巾相對野僧閑扁舟却恨南来晚勝事風流不預攀過都監趙思正崇班容膝庵公子居閒厭華屋一官江海辭羈束端能有志學淵眀數坂垣墻營小築榜名容膝雅所宜寄傲南窓聊自足祖宗承平逾百年冑緒蕃衍如雲烟敦詩說禮不勝數人物似君尤卓然論文講萟未易料虚己下士常折旋憶昔初逢大梁下風味向人如倒蔗若遭猨鶴促還山回首相望驚百舍誰言江路渺雲濤一舸春風重命駕酬王衮臣朝奉見寄吾聞終南山欝茀參斗牛其下多賢豪學術貫九流公生實異禀氣奪河漢秋妙齡升廣文岐嶷壓上㳺登科三十年仕宦真悠悠功名信有命富貴豈力求邇来居海上未觧鍾儀囚髙懐素聞道對客忘咿嚘相懽固傾倒不可即掉頭今我来自東觧后欣綢繆新詩激謬懦詞力勁且遒怳如聞武庫左右森戈矛便當偃旗皷罷戰為良謀與公從逍遥放浪追子休觀宗室伯山司户詩巻參軍暫輟簿書忙為我聊開古錦嚢玉骨已能含秀氣珠璣那觧不輝光王孫挟策真難事妙質如君豈易量他日讎書天禄閣聲名端可繼劉郎次韻思正雨中偶興招提岑寂古城隈海雨江風日日来但覺園林芳意盡不知紅紫為誰開花飛南陌渾空栁緑染中闕過我筍輿駝褐夜深回酬趙存道都曹見贈騷人久無聞風雅日浸衰河洲空蘭芷憔悴無芳姿叅軍妙述作鮑謝相並馳明珠不自耀光彩閟陸離聊因五斗粟暫寄東海湄官身雖簿領㳺刄能一麾寥寥古寺空轉砌春日遲閉關時却掃寂寂下書帷唐虞悉觀覽百氏了不遺論文慎許可紀律嚴自持昨朝發新詠落語皆瑰竒世無楊徳祖詎識黄絹詞次韻思正㳺南寺賞牡丹叢芳依小院妙色發纎穠綽約宜朝露温柔怯午風興隨懽宴盡事逐斷雲空應待酴醿放招携更與同贈思正令子堪愛君家小鳯雛烱然眉目照氷壺他年足逸詩書圃翰墨場中千里駒思正挈家㳺張氏園有詩俾余次韻邦人莫訝氣如虹生長皇家富貴叢陶冩年華樽爼外吟哦風物笑談中伶倫奏出千般巧錦彩纒頭一樣紅琴瑟獻酬還可樂牽衣兒女復相同維陽秋日西郊雨洗髙梧爽氣浮鳴蟬相喚作新秋翻空白鳥一行去目送岡巒欲盡頭𤓰花零落荳花繁秋入隋家舊苑看水調遺音今寂寞空餘壊道㵼哀湍潦水初收古澗清小橋斜倚數魚行神林社日傳簫鼓秋稼如雲嵗有成枯榆偃蹇若蒼龍影占荒郊半畝宫下有牧羊䨇稚子卧吹蘆管對秋風參寥子詩集巻十二
