body:
  text: 參寥子集别集𩔖二宋提要臣等謹案參寥子集十二卷宋僧道潛撰道潛於潛人蘇軾守杭州卜智果精舍居之墨莊漫録載其本名曇潛軾為改曰道潛軾南遷坐得罪返初服建中靖國初詔復祝髪崇寜末歸老江湖嘗賜號妙總大師國朝呉之振宗詩鈔云參寥集杭本多誤采他詩未及與析今所𫝊者凡二本一題三學院法嗣廣􅳃訂智果院法嗣海惠閲録前有參寥子小影即海恵所臨首載陳師道餞參寥禪師東歸序次載宋濓黄諫喬時敏張睿卿四序抄寫頗工一本題法嗣法潁編巻帙俱同而叙次迥異未知孰為杭本按集中詩有同法潁韻者則法潁本授受有緒當得其真惟所載陳師道序題曰高僧參寥集序與序語頗相乖剌豈傳寫者所妄改歟冷齋夜話稱參寥性褊憎凡子如讐今觀其詩如湖上二首之類頗嫌語少含蓄足為傲僻寡合之騐然其落落不俗亦由於此呉可藏海詩話曰參寥細雨云細憐池上見清愛竹間聞荆公改憐作宜又詩成暮雨邊秦少游曰雨中雨旁皆不好只雨邉最妙又云流水聲中弄扇行俞清老極愛之此老詩風流醖藉諸詩僧皆不及韓子蒼云若看參寥集詩則恵洪詩不堪看也云云盖當時極推重之曹學佺石倉厯代時選惟録其游鶴林寺一首夏日龍井書事詩一首以當北宋一家殆從他書採摭未見此本歟乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部三參寥子詩集目録别集類二宋巻一廬山雜興十五首陳季常靜菴何氏寒碧堂崔君草堂虚寂堂贈陶道人廖公挽辭絶句覽秀亭歸宗道中寄王慎中夏日山居秋江周郎中濓溪陶宣徳逸老堂夜渡採石秋日西園五首題楊君蘭軒送琳上人春日即事臨平道中寄辨才㳺鶴林寺江上秋夜過金山與元䂓三首春晚三首巻二邵伯道中平山堂觀雨建隆秋夜二首晚歩飲蜀井次永仁韻次何子温韻醉道士石懐孫莘老四柏堂次秦少㳺韻四首次黄子理韻三首次龍直夫韻三首次孫傳師韻春晴二首東園二首淮上三首冬夜㑹孫莘老三首曉出土山寄蔡彦規次太虚夜坐韻呈莘老次王通叟寄仲恭南樓書事懐裴學士呈慶禪師巻三再賦温泉㳺龍洞次莘老贈顯之韻虚樂亭朱伯收觀雪宿九曲池邗溝絶句寄李端叔都下晚霽酬邵彦瞻訪蘓學士彭門書事三首虚白齋贈子瞻歌妓登徐州黄樓逍遥堂書事子瞻飯别寄李齊州次子理梅花韻淮上寄子瞻别曽逢原寄逢原寄端叔贈鄒醫寄子由贈子固二首宿乾明寄莘老寄李公擇俞待制挽辭巻四春行次傳師韻淮上聞雁與怡然夜話鶴林寺寄舒堯文寄叔康講師登夀寜閣得端叔淮上書送慧悟還闕寄侍琪秀才鍾山夜月睡起曾舍人挽詩二首子瞻赴守湖州三首賦得岸字南溪泛舟吴興寄子瞻田居四時龍井書事四首寄俞伯謨二首夏夜送楚上人晚興下湖晚歸秋日西湖六首晨起巻五招李無悔寄彦瞻次彦瞻韻再次彦瞻韻寄張明甫探梅嵗寒與元䂓話别二首春日二首春詞三首駐景樓見程給事二首寄濟明寄俞仲寛春日雜興十首雪堂雨中春日赤壁二首别雪堂呈子瞻題徐徳之閑軒東坡話别贈潘邠老酬周元翁與曽子宣送曽子開過藏書堂懐少逰子實巻六寄王元均廬山雜興四首寄黄察院寄二學士寄東坡寄章仲釋梅花三首寄孫莘老寄子由和子由韻寄二居士三首廬山懐子瞻酬周亨叔訪王荆公三首謁天竺觀音次元翁韻病中呈劉景文四首入智果院辨才新亭次蘓仲豫韻辨才生日題觧頥堂送仲豫就省同蘓文饒泛西湖酬錢塘宰和景文兄夏夜懐景文次景文韻寒食日巻七别蘓翰林送景文贈林子中辨才夜坐贈聰道人送僧逰天台覽子理詩寄蘓太守次陳敏善韻都僧正挽詞次吴承老韻免充僧正送子中三首呈廖通判次王行甫韻同逰天竺次劉韋孟韻三首逰苕溪道場山夏夜送蘭花二首夏日竹閣送李仲益訪勤上人荅曉上人送俞伯謨次文饒韻陪人逰天竺呈章丞相謁荆公像二首曽子開話别二首寄妙懿觀恭師詩尋余清老不遇和劉伯昌韻次真禪師韻送文恵還金華題桐虚齋題停雲齋次智果韻二首次周開祖韻巻八次才仲韻贈吴子野送庠上人才仲山行神智話别暉暉堂次陳叔易韻二首曉霽次感懐韻逺齋懐仙閣華亭道中泛西湖和元翁韻和明逺韻秋夜見寄送人還金華宿天竺三首晨起喜人見訪送明上人之都下送定上人次劉蔡仲韻次黄仲閔蘓夫人挽辭懐蘓伯達題䨇楠軒次蘓端明韻無為堂示法穎清聚軒曉師見别㳺徑山雲巢三首呈秦少章送無上人燕黙堂送炎上人懐舊隱六首懐何彦時三首劉秀才挽辭四首贈霍山人巻九送劉推官觀東坡畫淮上觀水書秋景屏過韞秀堂二首聰師見寄升師見招二首殘菊滌軒觀司馬才仲題桃竹軒溪上聽琴二首呈應禪師題養浩堂題玉淵堂與定師話别四首題緑筠軒懐毛澤民寄趙伯言讀東坡南遷詩讀聞復詩次聞復見懐韻寄愚怛次聞復韻十首夏夜偶興次古上人韻率同志誦經呈曽子開送錢持正寄子開贈潜照木犀花次關子容韻二首湖上晚歸子容見過二首巻十弔許元裕二首湖上秋日十首贈趙明發二首樓試可見招次秦少㳺韻十首春隂登西樓二首送伯言贈歐陽季黙次延中見贈酬劉巨載觀明發圗次東坡韻代老人答子由書事二首次試可見訪揖仙亭同逰嶽寺試可喜雨夏夜觀曹夫人畫黄天選見寄秋聲次試可宿齋韻贈徳強哭少㳺次天選韻次試可韻巻十一寄王晉卿田承君話别呈試可送王彦齡次周臣韻題公震畫二首東坡畫枯木雪霽圗呈吴明甫王立之園亭十首送慈義東坡挽詞贈孔處度石菖蒲送處度試題孔方平齋壁十首行歌亭四首次孔處度詞次方平見寄題松堂張公碩不至用前韻松圗韓氏東園息軒巻十二與蔡秀如贈耿純叔讀子蒼詩二首贈賢上人喜雪二首書雀竹圗過韓氏荘二首内樂菴杞菊軒寄潘仲升送李南仲佚老堂贈權上人孫傳師挽詞孫智甫挽詞題逺趣軒䝉泉堂夢中作哭休上人䆳隱堂呈周格非觀牡丹寄信上人呈趙徳茂寄詵上人山中書事寄孔天瑞聽琴寄伯言觀梅花處順齋贈聖可游狼山二首容膝菴酬王衮臣觀伯山詩雨中偶興酬趙存道賞牡丹贈思正子次思正韻維秋日四首
