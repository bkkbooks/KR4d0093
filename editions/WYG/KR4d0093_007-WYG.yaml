body:
  text: 參寥子詩集卷七宋釋道潛撰别蘇翰林四海窺人物其誰似我公論交容末契許國見深衷漸逺吴天月行披禁殿風玉堂清夜夢觧后過江東送景文交逰盡四海厚我乃無幾劉侯軀七尺堂堂信英偉中剛冷如鉄萬事肯料理相逢傾盖餘眷眷極終始東南久徹警将領用儒士三年湖上逰屬得陪屐齒長謡傲雲壑草木俱披靡詞鋒剉萬象搜索泣山鬼珠璣溢錦嚢所得真富矣軒冕本倘来功名徒爾耳一㕓聞已卜視此猶脫屣嵗晚􅋌廬山髙棲踵前軌贈太守林子中待制拭目除書下九天邦人爭賀使君賢風流謝守宣城日愷悌龔公渤海年終作鹽梅均鼎鼐且慿觴豆樂山川一門棣蕚登臺省盛事駸駸海内傳四照閣奉陪辯才老師夜坐懐少㳺學士猿鳥投林已寂然芭蕉過雨小樓前雲依絶壁中間破月自遥峰缺處圎照坐不須紅蠟炬可人唯有蕙爐烟校讐御府圗書客疇昔還同此夜禪贈天竺聰道人完完明月珠蓄彼萬丈淵徑寸不可覩餘輝媚清川道人寔有道膠口黙不傳心閒氣自和眉宇常藹然邦人昔致師欲以居法筵文彩動帥府禮數端亦䖍𡨕鴻避網羅矯翼從髙騫朅来靈山隅圎蒲味深禪盛徳不自顯與物同周旋兒曺恃文采毫末爭醜妍相逢廣坐間肯顧斯人賢茫茫大化中浮名暫腥膻吾知道人意反汝生哀憐送僧逰天台梅邉孤起碧千尋俯仰應酬壮觀心峭壁斷崖當嵗晏冷雲疎雪上衣襟論懐此日能傾倒尺素他時嗣好音摘勝窮幽吾老矣杖藜無復伴登臨覽黄子理詩卷六載南官何所營百篇翻覆見髙情霜鷗露鵠元非俗雪竹風松本自清俊逸固宜凌鮑照優㳺真已逼淵眀微言㑹有知君者漫擬鍾嶸試一評梅花寄汝隂蘓太守湖山揺落嵗方悲又見梅花破玉蕤一樹輕眀侵曉岸數枝清瘦耿疎籬良辰易失空回首習氣難忘尚有詩所向皆公舊題墨肯辜魚鳥却来期次韻陳敏善秀才見過投老形骸真木偶水飲巖棲聊自守世事浮雲日變遷我亦何心預臧否故人新自廣陵来問我詩嚢近何有吾言淡薄非橄欖縱可咀嚼聊能久且開窓户話平生湖色山光翠相糾烘簷暖日氣味好相對蒲圑復支肘愛君年少擅才華詩律清妍無可醜却愁征棹促君還空聽陽關詞一首都僧正慈大師挽詞領袖吾家事由来二十春虚懐䏻應物真氣肯隨人逝水流方逺臨池墨尚新聲聞䨇樹子不見葉間身育王山大覺襌師以羅漢木贈蘓翰林蘓反以贈師凡植二十年葉間生青如比邱形謂之羅漢木師甞指此語余曰吾不復見此羅漢之生也故及之平生輕長物身世等鴻毛譽出東南早人驚節義高玩竒惟水石結客盡英豪来往元無迹情鍾漫鬱陶伏枕時無幾臨分若故常寸心䏻烱烱去路豈茫茫車馬門猶盛芝蘭室更香獨餘庭下竹冷韻起悲凉次韻吴承老推官觀開西湖偉人謀議不求多事定紛紛自唯阿盡放龜魚還渌净肯容蕭葦障前坡一朝美事誰能紀百尺蒼崖尚可磨天上列星當亦喜月眀時下浴清波列星事出教中都僧正既闕子中待制欲余補其位輒辭以小詩遂獲免佩徳懐恩豈易陳自嗟麋鹿性難馴流年日月無多子乞取山林放曠身送子中待制三首翹翹孤鳯凰安巢本阿閣偶来依澤國歸興遂淹泊江山廹嵗華草木正揺落霜空肅萬里纎翳無處着翻然整羽儀一舉在寥廓南山有佳木秀色何葳蕤封植不記年落落今百圍盤根雖自固烈風無時吹匠手營大厦衆材得施為偉哉梁棟姿取用不可遲平生長樂公聲華越三紀文章兩京齊學術㳺夏比螭頭足未安符竹已屢徙聨翩開幙府爛熳樹桃李鋒車入帝鄉天馬行九軌周旋有程度駑駕安足擬曉發苕溪将次徑山呈通判廖明畧學士明星耿耿出天東結束籃輿伴我公藹藹梅香侵曉陌斑斑旗脚轉春風勝㳺此日塵埃外回首他年夢寐中絶景小詩難壮觀當年醉筆吐長虹次韻王行甫奉議湖上晚歸遇雨妙齡公子嗜遨嬉永日湖山未肯歸酒幟曉人應慣識花枝拂帽不須揮輕紈細綺来何處青葢朱輪去似飛向晚薄雷催急雨清寒無奈襲裳衣同曽仲錫通判逰天竺諸山煌煌世胄餘夫子非碌碌由腹有詩書所以䏻㧞俗得官本河朔𤓰期未云促扁舟下東南逸興追鴻鵠遇勝即徜徉風飡兼露宿嗟余偶傾葢一笑外羇束杖䇿每過從相携訪山谷春風披鮮榮繡錯出林麓松門有時盡幽興無斷續崖轉聞鐘聲林疎見華屋銜山餘落景歸路猶躑躅誰云鄴下歡往事不可復吾曹二三子所樂亦云足願公紀新詩一一䏻見録船頭行北歸嚢箧有美玉塵埃京洛人示與洗心目次韻劉韋孟主簿湖上劉郎詞筆過康成詠遍湖山草木情禄隠太平真樂事莫思神武挂冠纓中流出沒一舟虚緩檝長謡彼自如聞說古来江海上達人多半寄樵漁老葑如雲既巻除風瀾百頃翠紆餘竒探險取各爭賦誰復能名造物初逰苕溪道場山東風吹雨過城闉日照河隄桞映津兩槳差差揺燕尾千山漠漠散魚鱗長縁絶境關幽夢尚喜兹㳺及暮春蘭蕙未衰桃李在蜂喧鳥􅍋莫愁人夏夜松室開孤定褰幃納夜涼嬋姢依翠竹無語過東墻送蘭花與毛正仲運使幽姿冷艷匪妖嬈曽伴靈均賦楚騷今日移根庭下植可無佳句與揮毫從来託迹喜深林顯晦那求世所聞偶至華堂奉君子不隨桃李鬬氤氲夏日竹閣沉水擢烟青繚繞風篁傳韻冷蕭騷楚山竹簟琉璃滑卧看炎雲檻外髙送李仲益赴襄陽幕襄陽古名都雄觀壓荆楚醉公誇文詞風物粲可數嗟余未厯覽彷彿已如覩人生㳺宦間得此亦佳遇李俊妙天姿文行兩自負少年志𡨕鴻千里輕一舉天風不借便造物暫淹阻既無負郭田黽勉依幕府賢哉彼方伯脫略髙韻度寜俾簿書役朱墨事朝莫爽氣對西山清譚共樽爼試問鹿門翁遺蹤今在否訪勤上人斷橋蒼壁倚溪斜赤葉楓林噪晚鴉可怕嶺雲埋徑路㑹尋流水到君家荅柯山曉上人風騷古人事而我豈所長兒曺嗜章句餘習未易忘根源本無有真若夏潦潢道人氣㧞俗吾黨稱俊良十年依叢林實以道自将禪餘喜賦咏妙語逾珪璋世眼獨未識深叢閟孤芳鋒錐必穎脫安肯久處嚢子宜力自勉聲問終揚揚吾言豈知子老大殊荒唐送俞伯謨宣徳赴辟成都我生落拓如虚舟萬里江湖隨演漾君今禄仕亦我同南北悠悠無定向故鄉回首海東頭兄弟十年官塞上才髙質美衆所竒杞梓豫章非冗長辟書交飛上廟堂肯使須臾事閑曠泰山崢嶸塹戎虜自古征人愁悵望劒門棧閣天下危去馬来車魂欲喪羨君年少勇攀躋足躡青冥身益壮舊逰陳迹想依然感物懐親情獨愴伯謨先公待制嘗為成都漕次韻文饒同自龍井出資國度泛舟以歸北山踞虎奔犀列萬形竒觀直已過南屏縈雲細路杳無盡落石飛泉靜有聲十里平湖初卷葑一天秋色共揚舲停橈共過孤山寺􅄫􅄫林僧半掩扃陪司馬仲才節推諸君逰天竺得青字西郊久不雨草木無餘青薄雲弄秋暉山色時晦𡨕超然五詞客文采披華星聨翩過吾廬車葢紛滿庭相携訪靈鷲細路通巖扃攀翻幽桂叢衣襟襲芳馨絶境異人世吾詩豈䏻名諸豪追鄴下妙語逾瓊英願言一揮寫樂事良難并髙空墮海日歸驂尚能停呈丞相章公時提舉洞霄大滌僊翁謝往還蕭然几席奉清閑胸中舊已吞雲夢人望從来重泰山書到鍾王方絶學文非典誥不須攀名言一一皆公語他日親聞廣坐間過定林謁荆公畫像古木蒼藤一徑纒我公疇昔屢回旋蕭蕭屋底瞻遺像傑氣英姿尚凛然壁間千字走龍蛇好事何人䕶絳紗一讀已䏻生感慨暮簷蕭瑟更啼鴉次韻曽子開侍郎話别二紀浮㳺踏世塵賢愚了了見情真行藏不昩如公少細聽名言實可人抗論儀曺肯折旋一麾江海去飄然他時開府餘杭郡来酌吾廬石縫泉書夢寄妙懿妙思堂深路屈盤夜来魂夢忽躋攀道人開户相迎處宛在修篁翠霧間觀恭師詩書以二絶勉之吾鄉英秀頗䏻文子復區區慕碧雲請用三多為祖式他時自與古人羣論書當亦似論兵軍律非嚴事不成行伍㑹須同比􅌨出竒方可語縱横過鍾山尋俞清老不遇霜風薄木韻含悲嵗晚尋君失後期夜鶴曉猿驚怨歇草堂人去已多時次韻劉伯昌長官見贈劉侯詩格殆天全初得西湖紀勝篇錦繡為腸供麗􅇨鯨鯢作氣吸長川静依北牖開樽爼醉掃寒梢雜雨烟嵗晚扁舟東去疾喜君髙調重遷延次韻法真禪師送曽敬之宣徳昆仲昔與乃翁相遇年始知有子生且賢爾来䨇榦已争秀屹屹欲上參髙天昨朝較藝偶不售他日奏賦聞甘泉方今廟堂喜人物收拾萬彚歸陶甄褭蹄麟趾終一出輝映左右無餘妍肯學孟生誇得意一日走遍春風前嗟余投老隠巖谷形若槁木心灰然扁舟追子僅千里彷彿夜夢遥相傳西湖風物行嵗晏歸賦梅花趂臘先送文恵師還金華脫略紛華自妙年秉心端喜事金僊終期象馭超三界不羨鵬程越九天考䟽窮經心尚壮依仁據徳節尤堅秋風陡起庭闈念聊寄修江一葉船證師聖可桐虚齋吾聞嶧山桐猗猗排秀榦栖鸞宿鳯信所竒衆木紛紛何足算嗚呼天相彼質復虚彼心故其聲之隠也無閡其動也無留有扣而鳴體佚而休嘉上人之妙齡兮無適俗之卑韻剛有儗于斯桐兮廓中虚以受訓異速成之朝榮兮培益厚而日敏悼像禾之寥寥兮蹇我道之不振續芳塵于祖席兮他日非桐虚上人者而復誰何哉規師方外停雲齋上人少脫畧出䖏非拘囚停雲倚空端舒巻良自由縱之千丈強歛附拳石幽超遥宇宙間孰與斯人儔銘詩善摹冩居士亦風流卜居智果方外以詩見寄次韻奉酬偶来湖上緝衡門桐長修柯竹有孫引䇿每從佳處去碧雲橋下是西村青燈殘篆夜寥寥門外秋風振葦蕭慚愧髙人䏻見憶為余西望立溪橋次韻周開祖大夫泛湖見訪漾漾清漪十里間畵船人似鏡中安雨催菡蓞幽香發風觸葡萄細浪寒髙岸烏紗来静院倒揮白羽傍層欄吟毫所遇無遺景天乞詞源比海寛參寥子詩集卷七
