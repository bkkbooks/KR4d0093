  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_WYG_005-1a, image: WYG1116/WYG1116-0034c.png}
body:
  text: 參寥子詩集巻五宋釋道潛撰戯招李無悔秀才淋漓一雨過秋山洗出西湖小霽天烱烱魚鱗含倒景飄飄羊角巻荒阡野塘白芡珠盈斗幽浦紅蕖錦繞船冷炙殘杯當已厭好来波際弄嬋姢西湖雪霽寄彦瞻西湖漫天三日雪上下一色迷空虚層巒沓嶂杳難辨彷彿樓觀疑有無饑雛乳獸失所食飛走阡陌空號呼中園却羨啄木鳥利嘴自解謀朝哺曉来鐘鼔報新霽天半稍稍分浮圗試慿髙樓肆逺目千里顛倒羅瓊琚逡廵夜月出海角光彩猛射来城隅方壺圎嶠只在眼綽約怳晤神仙居咄哉浩景似欺壓謂我不足為傳摸風流江左杜從事氣格豪贍凌相如安得飄颻跨鸞鵠手持栗尾来為書次韻彦瞻舟次三墪見寄雪消幽港漲漪漣草際晴絲罥細烟避槳輕鷗翻㸃㸃亞墻修竹静姢姢風流逺繼東山後詩句髙凌北斗邉何日去尋陽羨路相携青嶂弄雲泉次韻彦瞻樊良道中幾日官河凍不流朝来微暖始通舟江梅破蘂香猶淺汀草埋沙緑未浮修網横川魚乍集晴雲開野雪初收探珠既已從驪頷何用區區入海搜寄張眀甫朝奉昔公令吾鄉緑髪氣方壯鳴絃坐髙堂百里肅清曠良辰騁遨嬉繭足履青嶂當時陪杖屨笑語相頡頏論文希鄴都樂事敦可尚銅章既云觧余亦航海上悠悠亘六載天角空相望朅来石頭城邂逅慰離愴携手雨花臺俛仰得超放瓶盂徙京口冉冉抱微恙扁舟亂江来起我神益王浮雲共平生飄忽無定向去年客梁園塵土紛冗長狙􅆐失林木憔悴無優况獨有青桂枝氷雪不凋䘮恵然肯過從香積仍接餉秋風廹南還危㠶髙且張落日通津門轉盻増惋悵寝寐見髙標幽魂驚夜帳相忘同海魚千里各雲浪探梅問訊風篁嶺下梅疎枝冷蘂未全開繁英待得渾如雪霜曉無人我獨来嵗寒亭草枯蓬斷正紛紛翠榦排簷不改隂自是孤根難挫抑驕霜傲雪本無心與元規話别二首湖水蒼茫四接天短篷孤榜數回旋想君東海東頭夢猶在汀洲白鳥邉雷岫庵南千種梅含芳凖擬為君開冷香秀色誰為主趂取花時更一来春日二首蘭英蕙蕚競芳新左右吹香暗襲人江海久無騷客賦一枝唯可薦靈均清溪白石曉磷磷洗露桃花兩岸新欲覔劉郎家住䖏但聞雞犬不逢人春詞三首輕雲着地桞垂絲百尺髙臺獨歩時遥愛南隣紅杏樹曉来新有過墻枝濛濛小雨暗池塘逺樹依㣲不辨行可是晚来風更惡杏花香亂撲回廊氷開池面初浮緑日促花梢始破紅謾道春光来眼底茫然無意對芳叢駐景樓額額髙樓古道傍樓前風物鬰摐摐溪聲不斷来幽耳山色常時在小窓金鼎養丹嘗駐景玉罇傾酒屢空缸宋清賣藥長安市千載佳名與子䨇程公闢給事罷㑹稽道過錢塘因以詩見贈二首嘗聞鐘鼔過蓬莱席上無非八斗才刻燭揮毫公屢勝投壺飲釂客先頽老元格調真難繼短李風流不易陪鑑水稽山行樂處後車長是載鄒枚江干千騎送朱輪父老無縁借㓂恂吴國旌旂開白日越溪桃李失青春雄名素與珠星爛妙質長隨玉樹新當宁比聞思舊徳萬方行見入洪鈞寄濟眀茫乎一氣同渾淪瀰漫六合無邉垠吁哉破散幾千載被在萬物含其真清輕為天濁為地一一厚薄理自匀駑駘騏驥不並廐夜光魚目難相親錢郎少年禀清裔英姿綽欲揮等倫忠言讜論躡根本行義修篤無緇磷是家嚴君抱勁烈直筆曽預螭頭臣我昔浮㳺霅溪側傾葢遇子情彌欣炎雲燒空五六月漾舟南郭吟青蘋溪流寛圍野橋碧溪樹静嘯凉飈新竒探險取得佳句欲壓桞惲江南春瓶盂屬我暫行役樂事一跌成參辰使君旋亦報西去紛紛萬變難重陳南山暮冬厚積雪剛茂不死期松筠江行寄俞仲寛察院潮回沙浦寒月落山未曉駕言江上行行逺心亦悄茒屋兩三家雞聲聞縹緲輕風颭垂楊芳枝何裊裊上有䨇鳴禽下有蕙蘭草蒸蒸物已繁灼灼花更好時見頳尾鱗跳波泳紋藻即事起幽情情舍結懐抱故交如參辰咫尺曠烟島紅日已三竿回轅白沙道但聞蕭葦間拏音飛杳杳春日襍興十首池南池北日融融水荇風蒲各占叢幸有花枝能照眼可無詩句補春工城根野水渌逶沱颭颭風船掠岸過日暮蕙蘭無䖏採渚花汀草占春多栁外披烟舒逺目花邉植杖坐芳茵能言百舌深藏葉觧舞鵾雞不避人雨闋中庭暖日浮春禽百種聚喧啾粉腰蜂子尤無賴撓遍花鬚未肯休去嵗春風上苑行爛窺紅紫厭平生而今眼底無姚魏浪蘂浮花懶問名碧流如鏡轉春渠時送殘紅出雨餘可怕莓苔黏屐齒強扶笻竹過隣居雨洗樓頭碧瓦昏五更殘月墮金盆轆轤索轉玉繩曉花底宿禽無數喧梅梢青子大如錢慚愧春光又一年亭午無人初破睡杜䳌聲在桞花邉戢戢籬根紫筍長滿城桃李罷芬芳東風雖是無情物送謝迎繁亦更忙樹萱移菊􅂇春榮沐雨梳風擢翠莖童子新能理荒穢不教蕭艾並叢生雪堂雨中梢林急雨暮凄凄簾幙風燈暗欲迷向曉請看南陌上一畨紅素掩春泥春日赤壁二首灧灧春江水拍提䨇䨇出沒羨鳬鷖白沙青石無泥滓且遂東風進杖藜蕭瑟江梅樹樹空蘭芽猶短未成叢行窮赤壁山西路只有桃花一樣紅留别雪堂呈子瞻䇿杖南来寄雪堂眼看花絮老風光主人今是天涯客眀日孤㠶下渺茫寄題徐徳之先生閑軒建安自古多儁髦徐子磊落尤其豪論兵說劍走湖海身勤事左無所遭緑林五校已屠膾黒衣三衛羞徒勞歸来故山便卜築脫棄萬事輕鴻毛横前澗水潄哀玉傍舍老攊藏飛猱山蔬何用羨粱肉鶴氅未必輸青袍追雲弄月有真趣慎勿輕語傳兒曹九江與東坡居士話别霅水黄樓赤壁間勝逰長得共躋攀屠龍冉冉空三載窺豹悠悠愧一斑投錫雲林聊避暑絶江舟檝自東還求田問舍知何䖏杖屨他時訪小山贈潘邠老秀才去年雲夢澤南州為訪太史嘗淹留東坡寒碧最佳䖏恨不得子同遨逰今年廬山深且窅感君忽来慰枯槁溪月巖雲亦有情昨夜為君顔色好飄飄緑髪方妙年圗史滿腹皆精妍揮毫應敵風雨快咳唾落紙珠璣圓廣文英豪僅數千逸羣驥子誰與肩男兒窮通故有命勸子未宜嗟蹭蹬丈夫葢棺事始定他日雄飛鵰鶚勁草草論文未有涯匆匆别我却還家秋風更約通𤣥府共訪仙人卧彩霞邠老嘗約余重㑹于太平觀酬周元翁推官見贈南来濟濟多俊良聲聞逸發推周郎詞場較藝一戰捷筆陣獨掃千人強烱然眉目行且貴驥足萬里看騰驤吟詩作賦不媚俗期與往者同芬芳斷璋殘璧忽我贈把玩溢目驚輝光自嗟行李久蕭瑟安得置之雲錦嚢又聞跨馬欲過我此意想君非渺茫山中草木最宜夏雨餘一一含幽香雛鶯乳燕學飛舞葉底啞咤調圎吭䦨干笋蕨雖也老璀錯梅杏猶可嘗隂崖碧洞不受暑谷風習習吹衣涼提携為子掃盤石譚笑共坐莓苔蒼宣毫越楮須盛載吟取佳句還巾箱南康與曽子宣内翰相别抵暮大風聞泊舟神林浦因以詩寄之旗亭方喜㑹髙標杞國天崩促去橈星渚風花朝冉冉神林雨脚暮蕭蕭飛流濺沬江翻怒拆岸頽沙蜃倚驕遥想英雄濟川手壮懐寧復畏傾揺曽子開吏部服闋赴召道過廬山與余宿㑹東林觀子固舍人題名一首驛騎駸駸破夕烟西来遇我虎溪前征途乍即應勞止陳迹重窺更泫然天上歸瞻新日月山中行覩舊林泉感時撫事情何極且伴幽人此夜禪過公擇藏書室我公昔未仕託蹤此山阿牙籖列圗史萬巻堆嵯峨披剥得精要巻衣辭薜蘿一住三十年功名歎蹉􅋸公今陟臺省壮志應未磨出䖏獨不謬紛紛當奈何脫身早来歸挂冠舊庭柯松窓展故帙烱烱臨羲娥豈復求甚觧聊将寄天和勿憂野馬集勿念蟲網羅山祗善守䕶早晩潛揮訶雙溪晚步懐少㳺子實亭午炎威劇風溪破曉行紆餘憐野彴錯落見長庚飜藻魚呈媚梢林露獻清二豪俱二闕此樂與誰并參寥子詩集巻五
