body:
  text: 參寥子詩集巻一宋釋道潛撰廬山雜興十五首古帝論匡山南國之徳鎮邇来得躋攀此語始吾信雄雄壓九江矗矗排萬仞青天落飛瀑白日雷霆震石鏡俄忽開孤光舞而運異花無冬春瑶草亦芳潤逺公初渡江道譽藹東晉劉雷賛髙風遯世各無悶陳迹虎溪頭于今誰與訊衆峯勢連環萬疊不可窮香爐獨秀㧞佳氣常葱葱長風巻㳺霧曉壁開曈曨招提出其下樓觀排青紅回眸盼五老刻削金芙蓉宜哉謫仙子愛此巢雲松白鶴峯後原逶迤曠平陸道周問樵子古實青牛谷披榛得徑路曳杖驚麋鹿鮑生古騷人曽過鍊師宿明月古壇邉題詩記修竹兹焉廢耕隴嵗晏空菽粟薄日靜銜山驚湍㵼哀玉回首睇吾廬風幡隔林麓山南信美矣山北尤増竒春風錦繡谷紅素自相依梯空上絶巘雲日驚倒窺巖壁暈祥光五色成頗黎旁通大林寺松竹短且欹樂天當日逰四月桃始披餘齡願寄此永與人世違少文好山林毎往輒忘歸余生千載後獨與斯人違朅来爐峯下結宇聊棲遲長林拱茂木九夏遺炎曦溪雨晝忽破藤花照清漪黄鸝語深竹可聽不可窺暮峯騰𤣥雲飛雨来滂沲亂㸃灑蒼壁森森挂青蘿須臾漲前溪蕩蕩浮銀河中流轉巨石出沒如黿鼉天宇夜開霽星蟾瑩摩挲玲瓏辨崖樹宛轉照庭柯詠詩無傑句柰此佳景何中巖不知暑但覺晝景長朝来出孤定踽踽行西岡風泉潄石齒松雨飛蒼蒼猿鳥亦我喜鹿麋還相将喬林積翠下粲然矚孤芳冉冉抱絶格霏霏浮暗香山祇善守䕶每吐雲霧藏寄言樵蘓子慎勿輕摧傷龍湫亘三峡草木皆森竒禪餘得支徑别塢行逶迤上人吴門秀邈有方外姿芒鞵襯兩足筞筞欣相追秋田罷刈穫雲水明空陂䨇䨇林中禽文彩光陸離雍容事飲啄相顧忘驚飛鮮飇忽騰馥巖桂飄葳蕤峯端卧落日眷此忘還期霜清玉繩曉澗谷風未號澄潭不可極俛盻驚骨毛豈不有神物扵兹能遁逃海日射兩崖餘輝何昭昭逰鱗出岸穴翻覆如銀刀偶来殊不惡勝事俄所遭聊為五字詠逺愧謝與陶山深雲物清挹玩洗浮慮昨日行澗南飄然即芒屨風潭耿危彴晚與樵爭度隔水認梅花方驚嵗華暮幽人眇江海樂事期誰預山月獨多情娟娟遲歸路髙巖吐竒雲倐忽千萬丈援毫欲名貌巻縮非一状飛仙或遨逰隱隱出其上驚飈忽吹滅轉盻惟清嶂山中勝事多彼俗誰能亮圎月未出嶺衆峯環蒼蒼裵回倚修竹遲此清夜光俄驚衆木顛灧灧浮銀潢玉兔既且躍浮雲亦難妨須㬰經中天下矚被八荒却瞻中外官森森歛低昻一月廬山陽光風動林壑隂崖拆層氷隠隠飛溜落曦和闕化工萬彚欣並作忽忽鳥聲聒艷艷花霧薄痩骨喜攀躋芒鞵便犖确期遇山阿人賞心将共託五更山雨餘海月漏雲表流輝入庭户烱烱白如縞百舌語空林關關催欲曉衆禽亦和鳴為我釋孤抱杉松本竒姿洗滌看愈好惆悵桃李花東風捲如掃通𤣥接香谷夹道青松直髙秋得微雨秀色寒更碧林梢挂紅子照眼眀的的散䇿從所歡悠悠事遐厯僧坊媚烟篆笑語戀几席陶謝安在哉空山獨行迹陳季常靜菴龎公與少陵不肯入州府畏人嫌其真但喜歸茒宇先生豈其徒與世亦齟齬年来作菴榜以靜靜非對動黙即語閉門謝客親荷鋤秀甲珍芽春滿圃黄雞白酒厭妻孥醉以詩書相媚娬況復家傳侍郎後縹嚢玉匣收竒古寳刀錯落走金蛇至藥晶熒嘯鉛虎先生妙齡已絶人放浪江湖棄簮組居閒自不減前烈遇物隂施功不數我疑造物已收録富貴来尋君勿阻不然騎鶴扣𤣥關跨躒松喬攀佛祖何氏寒碧堂城東十畝春蕭瑟修竹漫山藹如櫛颼颼細浪鳴石齒黯黯蒼雲翳朝日虚堂正在無有處不惜千竿開翠宻鳴鳩野鵲亦觧喜頡頏穿林語啾唧但得涼隂過酒樽莫辭晚色侵書帙蓬莱仙人為書榜筆端矯矯龍蛇逸北觀南来無與倫千載風流君不失玉荆山人崔君草堂玉荆山蒼勢蜿蜒玉荆澗碧涵漪漣山人結廬占幽絶如使世俗来無縁窓前松竹交夏䕃砌下紅紫爭春妍清腸終日飽葵藿耳目久厭論腥膻山空月晝猿鳥寂象床拂拭翻朱絃冷然細韻發幽指妙意自得人誰傳烏巾席㡌事髙格蹇驢獨跨何翩翩行當近林就卜築與子来往聊窮年虗寂堂吾聞卓道士操節如冰霜學窺老荘本淵然閟光芒當時世莫識落魄依四方甞為京洛逰不踐聲利場衣裾巻塵土獨鶴翻南翔千里不駐足飄飄指潯陽潯陽多名山飛仙共徜徉晚嵗隠城郭古宫極凄凉千金售鄰壤増築成虚堂流塵斷四壁虚白浮中央惜哉今已往弔影空歎傷賴有賢弟子黄冠挺昻藏區區慕髙格綽欲傳芬芳逐客蘓太史堂堂國之良言為天下重墨妙逾珪璋為君易華榜庭户増輝光風流滿江左知子非尋常逰詠真洞贈陶道人淵眀骨已朽陳迹尚可求我復識其孫長鬛青兩眸相去僅千載猶能繼風流寄跡黄冠中神姿邈清修相携行洞天暝色藹已浮松寒語栖鶴潭静眠蒼虬蘭膏照深夜風磬鳴重樓吾廬閟三峽清浄亦此侔何時駕鹿車訪我西林邱廖司法挽辭吾聞廖夫子名大不得覩讀書盡五車行義㧞前古聚徒從妙齡所至變鄒魯身雖甘陋巷志欲望伊吕風雲茍超騰名教當有補蹉􅋸鬢毛改寸禄晚方取青衫適南營素幔歸湓浦秋原起新隴寂寞一抔土悲歌動閭里清血灑如雨蘭玉已含芳行看秀庭户絶句髙巖有鳥不知名欵語春風入户庭百舌黄鸝方用事汝音雖好復誰聽覽秀亭飛甍巨棟出髙墉覽秀開亭實有功湓水秋横簾幙外廬山晴落酒杯中俯窺城郭千艘轉仰見星河四面同江左元規存舊觀孟侯還此繼髙風歸宗道中朝日未出海杖藜適松門老樹暗絶壁蕭條聞哀猿迤邐轉谷口悠悠見前村農夫爭道来聒聒更笑喧數辰競一墟邸店如雲屯或携布與楮或驅雞與㹠縱横箕箒材瑣細難具論老翁主貿易俯仰衆所尊區區較尋尺一一手自翻得無筋力疲兩鬢埋霜根吾鄉東南㑹百貨常源源金鐶衣短後羣奴列崑崙通衢旅犀象顛倒同籬籓鮫綃與翡翠觸目亦已繁少壮供所役耆年卧髙軒翁今處窮獨未易聽我言且當具鹽米歸家飯兒孫寄王慎中教授髙人屏迹匡廬山不入州府今幾年煮葵烹藿日一飯目光烱烱明星懸行修道富神所憐絳帳弟子如雲煙憶昨秋風宿曽巘杖藜扣户君未眠堦松影月不到席耿耿惟有青燈然髙談一傾百慮洗似拂蒿艾披蘭荃清詩落筆有餘地頃刻百紙珠璣聨錦囊别後有新句勿惜東使聊相傳夏日山居十首杜宇鳴春已歇薔薇尚有餘花吾廬宛同彭澤遶屋美䕃交加苦笋爭抽豸角枇杷競吐驪珠午飯松間睡足茶甌滿泛雲腴紈扇輕裁孤月竹簟冷織䨇紋呼取凉襟幽吹拂開亂眼浮雲麥浪遥翻隴底雲峯忽起空端拄杖支頥松下直須細細吟看山月明含草木溪風暗度襟裳寂寂簾櫳夜半羽蟲相趂飛揚隂洞石床初掃誰来共飯胡麻鳥道新疏碧注為君沉李浮𤓰古徑斜依杉竹薫風永日無人噪鵲鳴鳩去後一聲幽磬南隣門外溪行碧玉林梢日墮黄金好景莫愁吟盡㑹看月出遥岑山雨洗開林幄梧桐日射荆扉傍砌榴花初吐照人特地光輝逺壑尚餘殘照飛蚊已閙前簷巢燕歸来何暮呼童為汝開簾秋江赤葉楓林落酒旗白沙洲渚夕陽微數聲柔櫓蒼茫外何處江村人夜歸周茂叔郎中濓溪蓮花峯下水東出其流長十里潄石齒鏘然韻珩璜坡陁滀野岸烱烱浮眀光衣冠有曠士眷此宜徜徉乞身不待老結屋棲其旁髙風慕箕潁不羨尚書郎松菊手自挿葱葱蔚連岡了無川澤營庶以亷自方禽魚出堦塹詎識矰繳防雲山侑几席風月非迎将萬事委空洞頹然寄壺觴詩書藂屋壁教子心獨强翹翹䨇鳯雛炳炳具文章婆娑刷勁翮雲漢期翺翔髙名與溪水千載同湯湯陶宣徳逸老堂二首湓浦城南舊隠淪一堂無地可栖塵石床春卧荼􅐘砌撩亂餘花墮酒巾歸来詩酒洽天機騷客無煩詠式微三徑就荒松菊在洗除蒿艾淨秋暉夜渡採石滄江夜半月沉輝客子行舟失𣺌瀰不用然犀剛照耀波間百恠惡人窺秋日西園五首日月更代顯光華難並留昔人尚行樂俯仰無暫休平居得君子出處常相求良辰援余臂共作西園逰極目瞰平野緬然見蒼洲千林澹霽色萬韻生涼秋露華溥菊英藹藹香可揉叅差間畦壠芋栗森相儔緑蔓無芳姿碧花茂牽牛低回曯籬落樹影環清流賞物志已諧何用登蓬邱山家無外營超然閉幽室蒲團北窓下黙坐終永日炎景忽差池涼飈動蕭瑟中林多橘柚粲粲垂華實凭髙試徘回幽興遽超逸雲霞散平岡太白空際出禽歸杳莫辨積翠鎻深蔚吁哉宇宙間䕶落竟一物胡為市朝客終嵗浪汩沒翳吾樂餘生勝事良可詰放懐在𡨕𡨕身世兩俱失甞聞晉支遁矯志歸沃洲千載激清風邈哉誰與儔余今雖不敏萬事非身謀朅来卧窮谷未覺慙先修一法尚無遣何勞問三休巻舒在至理賞詠歸優㳺採薇陟層阿濯足依澗流但驚桂花拆詎識江漢秋滄溟空汗漫無意狎羣鷗憶昔少壮時意氣摩雲霓㳺心黄巻間豈顧白日西由来昧根本旦旦從所迷邇獨悟無為文字如委泥物生豈髙下至道良自齊青山遶吾廬開户衆鳥啼曉日上喬木秋光媚回溪畸人長往来絶壁同攀躋遐天淨若掃曠目無端倪楚客一何苦登臨獨悽悽秋山夜来雨雲氣朝尚昏禪庭無来轍但見落葉繁石室暗燈火天容開霽痕耳目思逺適曠然啟層軒長謡緩輕䇿去去窮深源方塘灧清流鳬雁静不喧時遭羲皇翁容與諧笑言邈然採真賞嵗晏誰與論寄題濟源令楊君蘭軒昔人慕猗蘭偹服比修㓗往往卒嵗間山中行採掇吁哉昔人去已久此花憔悴今誰折濟源長官真好古王屋天壇馳逺歩陽崖月窟得芳叢滿握歸来誇所遇凈掃幽軒植蘚墀紫莖緑葉弄竒姿疎簾風軟日華薄芳馥滿懐君自知送琳上人還杭聚水作一雨多少近逺隨所遭或沾枯荄僅濡浃或入巨海成波濤少林真風今百紀悵惜至此何蕭條喜君齊志早寂寞同我十載淪芻樵含冲嗜漠不自厭更欲刺口甞羣餚師門祖席在在有得此失彼良自嘲朅来東南走千里但願刈楚逢翹翹駃浮長川不憚惡陟彼巨巘寜知勞誠専志苦若有相行斷西壌逢英豪金鎚扣天𤣥楗廓玉電激海眀珠髙星霜因循共千日誰爾使子先行包湖山蜿蜒湖水薄湖上幽人想如昨秋入芙蓉露已溥曉捲簾櫳暑初却明明潭底見行雲謾謾空中聞唳鶴此景從来吾已知異鄉寜羨君先歸由来出處元無隔同看明朝日上時春日即事呈定海尉葛叔忱層臺宿霞披滴瀝朝露濕有客獨登臨含情空佇立問君佇立何所為報言逺人甞有期菊花黄日出山去芳草緑時猶未歸萬壑千巖望何極願托孤鴻寄消息少年㳺衍易蹉跎翻恐歸来不相識滿目春暉花爛熳花㡳幽禽自相喚紛紛萬類皆有從獨我參差邈雲漢勸君不用長相思容顔消竭神空疲無情況有西樓月夜夜清光照不虧臨平道中風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲寄龍井辨才法師法師安逺徒我見常磬折頹綱製像運基搆甚宏達煌煌四十載說法傾吴越人天㑹方丈萬趾常雜遝藹然如邱山四座羞蟻垤投老倦揮麈毅然辭且决饑鷹得秋風轉聁俄一掣結茒南山陲雲蘿占幽絶昔我海上還相尋訪林樾夜闌叩㣲要猨鳥寂不聒慧風灑幽襟法雨濯枯枿别来今四載寒暑驚屢闋相望如星辰杳杳各天末何當從杖藜一笑龍泓月載逰鶴林寺招隠山南寺重来嵗已寒風林驚墜雪雨澗咽飛湍壁暗詩千首霜清竹萬竿東軒謫僊句洗眼共君看江上秋夜雨暗蒼江晚未晴井梧飜葉動秋聲樓頭夜半風吹斷月在浮雲淺處明邵仲恭許相過金山未至二月歸来江上居江流變渌江鷗去時移物改何足論身世悠悠本非固鳩鳴屋角山雨餘花苞破紅滿芳樹晴窓曉日幽興催振衣出户凌髙臺潮回浪死風色定縹緲沙岸煙中開故人佳期絶消息滿眼空看暮雲碧何日扁舟南渡来一灑髙風破吾臆淮王府園與王元規承事同賦三首年少王郎一幅巾杖藜呼我歩城闉紅泥亭子闌干外絶目遥看萬樹春一霎催花驟雨来雧芳堂下錦千堆浪紅狂紫渾爭發不待商量細細開藹藹春空宿霧披桃溪桞陌共逶迤阿戎莫道無才思細草幽花總要詩春晚三首疊穎叢條翠欲流午隂濃處聽鳴鳩兒童賭罷榆錢去狼籍春風漫不收曉風池沼水瀾翻春盡淮南麥秀寒院落無人日亭午桞花如雪滿䦨干恠雨盲風巻却春傍欄蕭瑟只青筠引雛燕子朝天去回首多情語更頻參寥子詩集卷一
