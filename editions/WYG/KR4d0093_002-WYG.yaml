body:
  text: 參寥子詩集巻二宋釋道潛撰邵伯道中二首一道河流逺接天兩行官桞復蕭然村舂厯厯鳴何䖏彷彿孤煙落日邉回首山光古寺基拂天寒木耿斜暉孤撑漸與鐘聲逺但見風幡竹外飛平山堂觀雨午枕藜床夢忽驚桞邉雷送雨如傾蜀岡西望蕪城路銀竹森森十里横建隆秋夜二首􅆊唄聲沉香霧銷月明金殿影岧嶢夜深惟有龕燈在風露滿庭人寂寥姢姢雲月照窓扉紙帳形開夢覺時庭下風篁自成韻吹簫安用玉人為晚歩叢薄蕭蕭朔吹飜瞑鴉遼亂欲投邨江南雪後山無數林表纔分翠一㾗次韻閻永仁博士同飲蜀井潭潭古甃閟髙岡修綆低懸百尺長庾語樂天推絶特第泉鴻漸許甘凉金盤謾說溥秋露玉盌休誇沃蔗漿更有碧梧盤爽䕃坐驚亭午失驕陽次韻永仁見贈憐君泣血依墳墓雖設衡門不妄開盈几貝多翻百遍同龕彌勒禮千回夜寒幽鳥窺香火嵗暮隣僧教往来何日為余重掃榻卧聽松韻落清哀次韻何子温龍圗見贈春破刋溝古驛旁揮毫邂逅沈東陽自慚擊壤無髙韻但愧投珠有異光曠達未應輸靖節風流可復羨知章我非照鏡迷頭客一接清歡亦似狂楊康功待制所藏醉道士石天官夜燕瓊樓春一官大醉頽穹旻飛光貫地若素練百里雞犬聲紛紛吹風洗雨嵗月古化此頑石良悲辛楚山之老頗知異濯以澗底清漪淪霓裳彷彿認羽客楮冠數寸横秋雲空齋晝間戲一擊琅然哀韻還清真我聞天官天所陳雖復暫屈終當伸烈風迅雷一朝作却上蒼蒼朝紫宸乾明夜坐懐孫莘老學士余生飄泊猶斷蓬詎肯低回附根柢兹焉得坎謾栖止一日從風即輕逝淮南十月寒未苦耿耿虚堂屬宵夜星辰錯落挂簷廡爽氣侵尋入衣袂桐葉聲飜玉露圎竹枝影掃金波碎安得南隣龎老翁揮麈堂堂坐相對維陽府學四柏堂鄒志完待制時為教官頖宫本凄凉庭户無冗長蒼然餘四柏終日清相向夫人擅所有髙懐益超放炎蒸五六月大厦如甕盎凉飈天外来披拂逾一餉怳如乗虚舟破月渡溟漲嚴冬衆木死薿薿獨無恙非永造化私故與氷雪抗宜亦有神明兹焉隂所相次韻少㳺學士送龔深之往金陵見王荆公四首春風隨意可嬉娱水有舟航陸有車應笑揚雄未忘我閉門猶著解嘲書夢幻皆輸古竺乾功名何用咤燕然羨君一棹江南去碧薺時魚暮雨邉虎踞龍盤亦漫雄城荒狐兔往来通可人惟有秦淮月出沒姢姢波浪中白下長干春霧披家家桃李粲朝暉懸知一見毗耶老心地如灰不更飛次韻黄子理宣徳田居四時四序自逶迤田園常局促春陽旋東臯廹我事銚鎒出種曝籬根驅牛飲溪曲暉暉明朝陽聒聒喧布穀頽齡惜筋骸曉睡謾云足蓐食出柴門荷篠赴幽谷搴條視柔桑宻葉已舒緑今年氣候蚤膏雨厭霡霂隣翁時一来畊耨每相屬離離小麥黄習習南風度桑棗暗蓬麻耘鋤困朝暮種𤓰屋東隅翠蔓已分布黄花引疎籬冉冉欲横路白水漫青秧聨翩下鷗鷺新絲換濁酒餚蓛羞薄具灑掃聚比隣環坐䕃髙樹稚子羨嬴餘牽衣傍翁嫗牛羊嶺外歸落日林梢去餉媍亦還家笑言隔烟霧邨落已徂暑蚊蠅尚喧啾衡門霽朝雨茒竹歸新秋機絲廹隣女軋軋無停休中田藹黄稼爛熳如雲浮緑蟻釀新甕嘉魴釣清流瓦尊遲来客禮數忘獻酬三杯未肯辭笑語方綢繆時平盜自隠場圃無宵憂兒孫漸束髪婚嫁廹所謀欵曲從我言歸途蹇淹留林端有月色相送前溪頭朔吹鳴髙林回堂氷已結牛羊卧茅屋原埜暗飛雪壮男臂雕弓短後事田獵饑鷹一號呼荒徑灑毛血歸来誇意氣隣舍呼飲啜明朝過南山更欲窮窟穴寒爐然豆萁光燄時起滅布被擁嬌兒從渠踏裏裂老翁寝不寐輾轉念鵞鴨籬落易穿窬狐狸恐驚發和龍直夫秘校細雨三首細雨連阡陌輕雲濕不飛池寒鷗自卧巢冷燕催歸慘澹疑沈樹飄蕭忽近幃簷花霑已久稍欲墮人衣薄霧兼寒雨凌晨靄未分細宜池上見清愛竹邉聞斗帳侵蘭夢虚櫺逼蕙薫晚来欣小霽鈎箔見疎雲傍砌飄纔斷從風強更来斑斑泣蛛網浥浥汗江梅薄日光時漏層隂意未開少陵心易感詩句寫清哀次韻孫傳師龍圗㳺醴泉寺楊林幾曲到城根中有招提氣象昏暝雀聚羣盤棟吻老藤垂蔓覆髙垣月生歸路無燈火巷轉人家有笑言却掩吾廬還寂寞冷風揺幔影翩飜春晴二首積雨久不破層隂蔽城闕曉来得春風掃蕩淨六合綽約墻頭花依㣲帶殘月少年誰家子驊騮飛蹀躞揚鞭出郊去逸興生林樾黄鳥弄柔音青梅已堪折行樂須及辰芳時易消歇寒食東城隅青楊夹馳道髙樓暖鳯笙絶曲聞縹緲晴日動鞦韆飛烟拂瑶草南鄰與北里良辰競為好人生逆旅間何必事枯槁仰首笑春風兹懐誰與造東園三首斜照眀眀射竹籬桑隂翳翳麥蛾飛蕭條一徑無来轍時見羸牛引犢歸曲渚回塘孰與期杖藜終日自忘歸隔林彷彿聞機杵應有人家在翠㣲雲峰缺處支笻立溪溜聲中弄扇行習習南風吹百草幽香知有蕙蘭生淮上三首蘆梢向曉戰秋風浦口寒潮尚未通日出岸沙多細穴白蝦青蠏走無窮今夜沙頭月上遲小螢零碎傍船飛可憐光彩雖無限何似嬋娟一寸輝天闊隂雲低抱樹沙寒鷗鷺欲親人小航泊處誰家住修竹疎花宛似春冬夜㑹孫莘老司諫書齋三首去馬来車聲已閳雪雲低壓暮簷寒地爐山枿燒初熟軟語聊為世外歡碧瓦爐焚裊裊香紅柑紫栗更分甞從来樂事人間少不惜歸途夜漏長多病山人能放曠忘縁居士觧逍遥蒲團疊足清相向誰道雲林勝市朝曉出土山遶山修竹曉參差葉葉塗霜墜碧枝日脚漸髙風乍起蕭蕭恰似雨来時寄蔡彦䂓主簿遶舍蒼烟晚更凝隔簾新月未多明棲烏著樹無餘噪老檜唫風有細聲客散愈憐真境好定回猶覺幻身輕可堪俗子能知味此語聊傳北郭生次韻太虚夜坐少㳺一字太虚古寺冬蕭瑟天寒色更冥捲幃延素月轉盻失流星爐底眠枯枿窓根立凍缾譚餘焚柏子一燧小煙清廣陵城外埜歩呈莘老林梢聒聒鳥聲繁積雪初消澗水渾老樹卧波寒影動埜烟浮草夕陽昏風回笛響山前路犬吠人行竹外村杖屨不知幽興逺歸来新月在柴門次韻王通叟寺丞見寄雕斵肝脾欲報功還如獻豖過遼東珠璣屢獲淵雲玅土木曽無粲忍風耿耿吟魂嗟異處迢迢桂魄謾相同錦嚢應有新詩在九曲池邉多塞鴻寄仲恭晚雨霽郛郭晴雲􅉍紛披曦和拆萬物初莖弄葳蕤儵魚泳弱􅇨漾漾動碧漪緬彼空際山黛影揺參差感此芳菲節羨人曠佳期音形眇何方莽莽天一涯長河泮春氷華浪激箭馳好憑三尺鯉寄我相思詩早秋南樓書事白帝初回天地秋井梧葉老隂尚稠森森爽氣入屏幔骨冷魂清無汗流覺来覽眺覔佳處挾册獨上西南樓崇山廣澤坐可挹逺水孤村横道周上窺青天堕海日下瞰白鶴盤庭楸誰令濃隂起層嶂撲撲亂眼如雲浮埋林漲壑只俄頃撫袂掩抑将誰儔眀星皎月邈難見絡緯蟋蟀空啁啾安得風生土嚢口萬里一掃無停留王孫未歸空碧草我思不見徒離憂和莘老經六合西門水亭懐裴學士折桞相從地重来失舊柯林光延晚照岸影動霜波碧圃檀欒宻朱簷翡翠過主人成異物搔首奈情何和莘老初至温泉呈慶禪師年華行已老林莽尚蒼蒼地勝連龍窟泉温注鬼湯人風逺城市鐘梵近僧房九夏来投錫棲心應更凉參寥子詩集巻二
