body:
  text: 參寥子詩集巻六宋釋道潛撰寄王元均奉議昆仲崇文學士後二子皆翹翹異哉荆山麓産此英瓊瑶婆娑翰墨場文彩相蔚饒頃我未知識寸心徒揺揺前年廣陵城㑹合如有招名都冠淮海氣象古所豪林園若棊置佳處遺塵囂良辰肯浪負杖䇿同嬉遨清譚落玉麈亹亹如聞韶嵗晏樂未闋離羣復蕭蕭扁舟𦕈一葉出沒隨江潮雲山列千里廬霍尤岧嶢孤懐喜自放跨躒豈憚勞所嗟無二陸相我吟風騷廬山雜興四首溪石斑斑舞碎光巖花冉冉馥幽香當時吴猛逢山處金闕横開在上方隔崖垂蔓蔚蒼蒼隠見莓苔舊石牀定有飛仙集其下月明時復度笙簧髙松夾道夕陽明抱葉風蟬引細聲勸爾行人聊駐足出山無物更䏻清星渚江邉月已生石橋歸路夜崢嶸西風散入松千樹飜覆銀河秋浪聲宿回峰院寄黄擇中察院秋堂立四壁物色夜蕭然藜床抱孤影起坐未成眠層飈激髙梧萬動接虚警感至情先謝理𡨕神預領銅壺漏未央扶杖起彷徨方塘溢繁荇冷月下疎篁躑躅歩空除風帶裊霜裾冺余契幽獨悵子隔川途短短袖中書眀發欲誰寄梁上木鯉魚儻能将此意古亦有相思吾今何所遺浩歌望雲水期子與同歸寄史院王正仲曽子開二學士太史久不作千秋想前人朝廷理故事董職須絶倫青錢兩學士班馬相並隣婆娑金閨中婉孌得所親學海揚波瀾詞林藹芳春青編炳金雘允顯無曲陳翹翹茂令徳諤諤䂓縉紳玉堂行見躋清切凌紫宸野人蹈江海放浪無邉垠相思邈何許共此青桂輪寄東坡昆仲江南十月天未霜木梢冉冉猶青蒼烟沙篁竹媚兩岸亭午氣候如春陽吴檣楚柂自紛擾花鴨鸕鷀殊未忙深灣野浦望不劇葦間隠隠聞漁桹黄昏無雲桂魄滿一川秀色傾銀潢何人隔岸弄長笛吹風渡水聲悲涼蘭臺故人天一方美景樂事誰相将船窓欹枕夜未央沓沓孤雲空飛揚梅花寄章仲釋法曹蕙死蘭枯驚嵗晏玉蕤初發照溪寒從来吴苑墻頭見不似匡廬谷底看月浸繁枝香冉冉露浮紅蕚曉團團㕘軍詩格追何遜應笑山人自考槃梅花三首雲英粲粲笑相重結子能㕘鼎鼐功茜杏妖桃縁格俗含芳不得與君同造化推排力自強非關着意占年芳繁霜亂雪虚埋沒傾國人知有此香枝頭灼灼爛生光弄日驕寒倚短墻欲賦却慙無妙手使人操筆憶何郎寄福州太守孫莘老龍圗公子自淮海弱不游羣兒良哉白玉質烱烱無磷緇澡身以道徳餘棄為文詞端䏻處庠序邈有孔孟姿一朝擅髙名卓然動京師餘輝耀天末􅂱􅂱如斗箕校讐芸閣中精義無㕘差同時鵷鷺行半已翔鳯池兩登諫官室抗疏犯天威揚舲去江海曠嵗成流離朱輪擁苕霅五馬從合肥編氓仰遺愛堕泪存豐碑歸来遘風樹憔悴不展眉藉苦一室中四壁無重幃南隣有古刹而我方棲遲杖藜時過公泣血聞嗟咨從容勸我坐一飯常共為蒸蒸沸古鼎䔩䔩投園葵客来慵應門客去知為誰禮䘮事云既始領吴門麾瓶盂走梁苑恨不相追隨秋風函東下旌斾俄已暌浮川與遵陸多病亦云疲七閩富名山空翠相逶迤在昔慕仁智扵今慰遨嬉棠隂想初坐吏案紛交馳庖刀一為觧往往無孑遺麥秋薦丹實梅雨裁纎絺黄金燕佳客柔指鳴哀絲萬事不芥蔕羨公能自怡聞子由舟及南昌以寄之髙安居士實人龍五載南遷道愈豐域外城池剛自守人間膏火詎能攻屢嗟江海星霜隔行喜雲林笑語同五老峰前佳氣象待君一醉吐長虹和子由彭蠡湖遇風雪夫子經濟材妙質静而黙當年大廷中如堵觀射策雄哉賢父兄一日並輝赫勲業望䕫龍寧論二千石扶揺吝不惜困此垂天翼五載貶筠陽區區校尋尺鹽車厄驥足道路行歎惜脫身當嵗晏行李唯典籍髙懐久達觀不見憔悴色悠悠東下船晚次彭蠡側江風忽崩騰江水飜且黒飄風斷黄蘆落雁委砂磧鵞毛飛雪片滿野来無極龍驤飛萬斛欲進不可得淹留向汀灣蕭瑟日將夕黄昏勢漸壮夜半已堆積魚龍亦悲嘯凛氣増几席青燈冷不眠坐潄元和液危檣飜曉鴉霽日動窓隙搴幃望廬山萬仭絶寸碧茫茫銀世界蕩蕩月閫域順流復前趨百里俄頃刻暫停篙櫓喧却着登山屐五老笑相迎千巖委圭璧紛紛林下士洗眼兾一識松門共邀迓香霧浮羃羃相将擁寒爐軟語同夙昔堂堂赤眼師既往有遺跡惸然窣堵波縹緲根石壁清晨陪拄杖緩歩躡山肋徘回憇蒼嶺左右抗松􅌴猿猱侮僮僕上下或戯劇巴僧眉半雪觧后語鄉國却返朱砂峯招提更岑寂中藏李氏書盛事誇絶特東坡老居士邇亦有題墨一覽慰君心都忘逺行役寄俞秀老清老二居士三首風溪雲巘雪消初鳥變春聲滿屋除安得故人同蠟屐石樑斜日看逰魚落星江水接天流花絮飛時暮雨收波底鯉魚東去否尺書煩汝到揚州慚愧君家好弟兄風流宜與晉人并青鞋布襪䏻從我共入廬山深處行廬山道中懐子瞻谷口晴雲散曉光鳥聲呼我渡横塘輕明獨愛桃花静撩亂偏嫌桞絮狂處處叢祠起簫鼔家家籬落動耕桑去年今日東坡路拄杖相将探海棠酬周亨叔主簿見贈廬山百里蟠穹蒼絶頂隂雲常下覆晴日天風忽掃除翠壁千層開錦繡我来廬山初得君愛君面有廬山秀長篇險韻使我驚忽獲風流雲散後氣味清新滿牙頰如入洞庭甞橘柚梅子如錢桞絮飛杜䳌哀號山雨晝念君眀當京邑行馬蹄蹴踏春泥縐黄陂新息道路逈埜飯藜羮須強齅天街到日夏漸熱車轂如摩汗如溜丈夫功名非茍取勸子未用輕藍綬山中五月早歸来澗底清泠當共潄訪荆國王公三首浩蕩經綸志已行北山歸老思𡨕𡨕可妨渡水穿雲客拄杖芒鞵到户庭博辯舊聞輕孟子談經早不愧揚雄恵能伎倆元無有還許從容廣座中若嫌榮禄早收身歸與漁樵共隠淪白下門西山迤邐興来長是岸烏巾謁上竺觀音大士十年江海去飄然魂夢長依鷲嶺邉月地雲堦重到䖏殷勤稽首白衣仙次韻元翁見寄十載離羣歎𣺌茫良辰無地可相羊何時却入蓮花社軟語重焚柏子香藹藹春風揺几席紛紛啼鳥滿林塘欲慿海燕傳消息徑入君家舊屋梁病中四絶句呈劉景文左藏一室寥寥北嶺隈午窓孤枕夢初回無端自是風驚竹錯認旁人問疾来西風薄木晚颼颼古屋無人夜更幽童子未閑煎藥火隔窓燈影漫悠悠髙梧挂月照床頭聒砌寒螀似怨秋我病尚能安静黙爾曹無事苦啁啾竹裏鳴鴉曉欲飛遽褰疎箔望朝暉莫嫌山色經秋瘦我亦秋来减帶圍余初入智果院蘓翰林率賔客相送者十六人各賦詩一章泰山屹天下四海同仰止我公命世英突兀等扵是胷中廓秋漢皎絶微雲滓當年事危言軒冕如脫屣正貴知我希寜慚不吾以風雲果再符六翮挑空起一昨厭承眀抗章求迤邐餘杭右雄籓比屋富生齒立談政即成興不負山水雍容敦末契訪我頑且鄙大斾輝松門禽猿亦驚喜森森門下士左右燦朱履使君道徳姿圭角非所恃軟語如春風薫然著桃李今朝真勝事千載足遺美安得筆如椽磨崖為公紀龍井辯才老師新亭初成有詩呈府帥翰林俾余繼和輒次元韻逺公吾家傑道妙非壺邱徳傾龍象侣貌葢江湖秋平生經綸學不為名相留滔滔若懸瀑下注萬丈湫昔年謝講事衆輓不轉頭刳心老巖穴百念本不浮東南多望士唯見此老優翰林天下公方外寔軰流旌旗虎溪路竟日泉石㳺衆生病未已師意可忘憂次韻蘓仲豫承務寄伯達推官蘓子真豪英氣貌嚴且重㓜無兒女姿嗜好百不動唯餘讀書事乃與古人共文章造深淳詞力寛不縱樂哉賢父兄道義日相從昨朝西湖外目極孤鴻送髙㠶去百里山水乏吟弄作詩投置郵但述鴒原夢辨才生日像末真風恐不傳故生豪傑為人天慈航横截三千界法雨均沾四十年獨鶴精神秋始徤長松根節老彌堅莫将有物觀無象唾霧氷輪處處圎寄題觧頥堂道人還家今幾時築室構堂名觧頥尺書三遣要我賦我獨老矣何能為塵埃筆硯試料理肝肺枯槁源不滋為君苦思強抽軋詞慳氣廹無逶迤東陽自古號多士文采風流世有之堂成往往獻佳句羅列四壁皆瑰竒譬如鈞天已九奏安用擊筑鳴參差又如玉石厭方丈葵藿欲進旁必􅅓他年但約訪君去借君几席聊偃欹堂中挿架足書史牙籖玉軸當細窺送仲豫叔黨二承務赴試春闈烱烱䨇黄鵠雍容振羽儀風髙辭澤國嵗莫及天池文彩非凢近周旋競陸離眀年翺集䖏九萬是君期同蘓文饒主簿西湖夜泛鳯咮山頭暮靄空月娥飛出廣寒宫初登桂檝横湖去似覺銀河有路通掠草飛螢星㸃㸃眠沙宿鷺玉叢叢從来江捴文才妙請付毫端刻畫中酬錢塘宰王昭叔朝奉令尹胷中萬斛寛簿書堆案豈相關揮毫手過庖刀疾訪勝心同止水閑竹日映簷光破碎雪雲開嶺翠連環自嗟不及􅋌山逺坐對淵明秪愧顔景文寵示四月十七日翰林公過龍山真覺院賞枇杷五言一章景文已和之復使余繼其後脫畧今山簡能吟舊子春偶因尋勝出不為採芳人紅紫千葩盡甘酸萬顆新江雲浮翠壁靄靄散魚鱗夏夜懐景文路分層欄霽晚雨餘響猶滴􅅹天風吹浮雲入夜已無迹月波泛修竹灧灧流几席蘭膏滅衆炬凉氣滿四壁蕙烟擢銅爐暗觸鼻端息藜牀但危坐萬想本空寂肺肝既冷然紈扇亦暫釋将軍不吾期樂事空自得願言賦長謡為我記此夕次韻景文㑹朱充仁大夫魏敏中朝奉扵望湖樓長句髙樓冠浮雲下瞰百頃湖清漪照両岸秀色含菰蒲騷人富筆力領畧驚須臾短長隨萬象肯議鶴與鳬二客各英妙温温右為徒從公文字飲所樂非歌呼酒酣挹諸山髙下如迎趨籃輿復迤邐逺訪飛来孤炎蒸近亭午天地如大爐石泉飲吾廬快意猶過屠松門徹九里始見靈山隅佳名自開皇籍甚聞中區幽芳不時艶地勝乃滋濡招提數四海雄觀宜且無歸途憇夀星寒碧森萬株蕭騷聒衆響孰辨笙與竽擡眸瞩新榜蔚蔚氣自殊将軍戀清絶歡容頽玉壺道人烹露芽滿盞浮雲腴儻無方外姿未可同此娱寒食日蘓翰林同馬仲玉提刑過訪有詩示怡然并余余次韻使君薄珪組富貴良易足一麾下東南千里爭拭目援毫賦山水詞力㵼溪谷勝逰便杖履聒耳厭絲竹西湖破春氷曉漲翻晴緑相将二使軺導從還屏逐後先度巖壑頡頏追鸞鵠樂事殊未央酒行宜局促風流俄醉舞坐客瞻頽玉嵇阮真達生秦唐謾歌哭斜陽絶湖去兩槳凌波速却尋元龍居隠隠隔喬木到門呼主人展畫滿髙屋夕鼓来逺近雨聲飄斷續籃輿入城市夹道閙燈燭盛事在餘杭他年見圗録參寥子詩集巻六
