body:
  text: 參寥子詩集巻三欽定四庫全書參寥子詩集巻四宋釋道潛撰春行朝入春山千萬重莫歸溪上漫匆匆白沙岸口長回首無數漁燈翠靄中次韻傳師見過孫郎瀟灑逼人衣咫尺塵埃隔蕙帷陋巷有時過佛刹談經還共惜秋暉百年空果𡨕中謝一寸靈珠象外歸久矣此情人不諭援毫聊復為君揮淮上聞雁寄仲恭欹枕船舷夜櫓停數行南去雁如繩起来欲寄相思字髙拂銀河喚不應與怡然夜話雲埋碧瓦寒侵户榻照青燈夜色空故國十年無限事笑談如在夢魂中鶴林寺宛轉回廊漫布金蕭條寒日墮墻隂門前合抱松千尺黄鶴不来年已深寄舒堯文教授經綸滿腹貯雲霓卓犖邱門道可躋絳帳開時霞影亂青衿立䖏雁行齊憶親麈尾焚香夜共惜筠梢落月低别後鳯毛知更長五車應已識詮題次韻順上人寄叔康講師少年好詩書齷齪開門户有若丹青徒秉筆學畫虎法師當是時聲價久已負籍籍東州人髙譚慕支許余時跡四方浪渉川陸苦昨夜北山翁挑燈同軟語因論鄉里賢悵師成獨阻南徐號名都興發厯漢楚崢嶸江上山王氣埋千古至今風前笛夜夜怨江浦感慨易成吟安得君来伍次韻順上人登夀寜閣昔過廣陵日兹樓亦盤桓飛甍切星斗鴻鵠爭危䦨怳若隨扶揺九萬直上摶下視古帝基蕭條空漫漫當時競豪華人物鏤綺紈孰謂千載後故宫半畊殘城西舊輦道繚繞猶屈盤咫尺見螢苑枯桑生晝寒閻閭豈復隘狐兔穴已寛楚楚但喬木萋萋無寸山茍非壮士懐往往不忍看青旗催畫角回首送飛翰得端叔淮上書云長淮秋色清曠順風揚舲恨不得與君俱之飛鴻從西来有客遺我書開緘識逺意字字情有餘報言厯長淮泛泛乗舳艫天開滅逺霧水碧涵空虚超然忘端倪身世疑有無徜徉極幽致恨我失之俱我昔與曽子兹㳺頗躊蹰風髙當白帝露冷凋紅蕖扁舟僅半月厯覽窮朝晡伊人亦才華俊逸千里駒結交慕豪彦倜儻非迂儒當時欲相從恨子隔海隅今朝子獨往我軰還星疎邂逅亦有分夤縁非強圗茫然臨西風俛首良自吁庶㡬有至理去彼形跡拘相望雲漢間皎潔同蟾蜍送慧悟大師還闕下道人本丘壑浪為京華居一往二十年嵗月驚須臾禪餘挾妙術出入卿大夫飛揚動天子聲聞傾九衢紛彼户外屨泛如水中鳬髙懐勌酬應逸賞思江湖春風巻衣裓千古隨舳艫中冷湧樓觀圎嶠連方壺杖䇿歩鰲頭直上窮﨑嶇超然萬象外所得良有餘興盡乗白雲飄飄還帝都将之金陵寄侍琪服之秀才黄昏落㠶牛渚磯蒼石岸黒行人稀漁燈夜深逺近沒水鳥月眀来去飛瓶盂漸與南斗濶身世東去将焉為鍾山咫尺行可及㑹當與子同遨嬉鍾山夜月禹壑千巖夜未央月華松色共蒼蒼上方已覺無人語金殿誰焚柏子香睡起紅芳落盡踏青青啞咤黄鸝隔樹鳴午睡覺来聽不足杖藜重過竹隂行曽子固舍人挽辭二首命世髙標見實難狂瀾既倒賴公還學窮㳺夏淵源際文列班揚伯仲間落落聲塵隨逝水㴞㴞論著在名山凄凉四海門人泪想對秋風為一澘雄詞大冊破幽昏返覆難窺斧鑿痕投老雍容歸法從銜哀倉卒去都門雲泉已負髙秋約江渚空悲靜夜魂誰與朝廷終太史君王應待􅜇鴒原子瞻赴守湖州少㳺與余回載因㳺恵山覽唐處士王武陵竇羣朱宿詩追用其韻各賦三首山煙弄滅沒山木含葱蒼刺舟傍遥岸理䇿升虚堂周遭矚層巘矯矯如翺翔下瞰平田流澹然浮日光青簩觧初籜洗兩聞清香雖云廹前途真賞豈易忘松門暗朝雨寂厯無行人隆曦忽穿漏卉木蔚以新堦泉潄石齒照眼光磷磷使君美無度卓犖遺囂塵風標傲竹柏談笑凌穹旻何愧沈冥子卧霞吞結隣揚㠶渡江来洗眼驚翠樾雲姿既容裔鳥哢更清絶凌梯訪前蹤琬琰亦未滅嗟我魚目光疇能綴眀月狂墨掃琅玕風烟坐中發殊勝區中人茫茫走飛轍吴江垂虹亭同賦得岸字蜿蜒誇長虹吴㑹稱傑觀淪漣幾萬頃放目失浪岸倒影射遥山青螺㸃空半從来夸震澤勝事無昏旦破浪湧長鬐排空度飛翰肺肝入清境劃若春氷泮安得凌九垓從公㳺汗漫同吴興尉錢濟明南溪泛舟枇杷弄實梅欲黄海氣𡨕𡨕錯昏晝僧房亭午隘可鄙畫舸從君逐溪溜斗欣紛翳眼前失但覺波光翻縠縐蘋花洗雨白雪香荷柄吹風青玉瘦回看行人走南北蠢蠢岸傍如蟻鬭一竿落日麗樵明繞郭雲山相倚搆嶄嶄青壁映彤霞轉盻忽驚開錦繡好将傑句為余寫天乞君才多穎茂錦嚢玉刻厭傳玩燕尾蠶頭吾未究輕橈欲動蹇淹留城上哀笳凄已奏吴興道中寄子瞻與少㳺同賦弱性嗜幽散出門隨所便蓮房紛可襲林幄正髙褰羣木含晨景孤撐破宿烟逶迤屯秀㠋宛轉滀清漣岸匝藤花暗崖垂桂影圓引雛鳴鴶鵴觧籜露嬋姢怳若經愚谷渾疑渡輞川葑田青泛泛石葛蔓綿綿緬想醉山簡相從狂謫仙援毫更妙韻愧乏碧雲妍田居四時原隰春風暖池塘雁北翔曉耕雲塢潤午飯野芹香燕子依茒棟花枝過土墻東阡與南陌生事日皇皇五月梅爭熟村村桑柘稀茜裙蠶婦瘦粉翅乳鵞肥菱蔓滋溪雨藤花鎻釣磯呼兒行採去亭午候荆扉刈穫終吾事田園日向閑晚香増橘柚潦水耗汀灣聚噪棲鴉定孤吹牧竪還兒童驚野燒一片起前山汩汩防濃霧窮冬亦謾勞茒簷催日午籬落聽雞號臘近還移竹宵閑更索綯春風歸早晚行見事東臯夏日龍井書事呈辨才法師兼寄吴興蘓太守并秦少㳺少㳺時在越翠􅌴髙蘿結晝隂驕陽無地廹吾身石崖細聽紅泉落林菓初甞碧柰新揮麈已欣從恵逺談經終恨少遺民何時暫着登山屐夹岸烏紗漉酒巾雨過千巖爽氣新孤懐入夜與誰隣風蟬故故頻移樹山月時時自近人禮樂汝其攻我短形骸吾已付天真露華漸冷飛蚊息窓裏吟燈亦可親自憐多病畏炎曦長夏投蹤此最宜青石白沙含淺瀨碧梧蒼竹聒涼颸雲中雞犬聽難辯谷口漁樵問不知斑杖芒鞵隨歩逺歸来幽火認茆茨朅来人外慰棲遲谷逺山長萬事遺好鳥未嘗唫俗韻白雲還解弄竒姿藤花冉冉青當户竹色姢姢碧過籬不羨故人探禹穴短橈孤榜逐漣漪寄俞伯謨宣義昆仲二首謝家蘭玉競芬芳千里南来未易忘猶憶娑羅䨇樹院月眀相對坐胡床多病侵尋鬢已霜昔年交友半殊方吴臺松柏今何似想見龍蛇數尺長夏夜斗帳昬昬夜氣蒸移牀趂月卧中庭紫㣲花露霑衣冷飜覺華胥夢易醒送楚上人還廣陵慶禪師法席吾鄉少年多齷齪投老家山猶戀着何異醯雞舞甕天肯信十方無壁落羨君壮懐慕逺舉萬里雲山行犖确荆江洞庭虚浩𣺌歛裓浮杯心自若去年臘月過湓城聆我幽蹤卧雲壑朅来相從慰契濶笑語逸發驚􅆐鶴春風又復巻征衣問子東去将何為廣陵城西古佛刹中有老禪吾所師當年與君共伏役妙道彷彿窺籓籬别来星霜歎已久夜夢往往神魂馳真金雖已出頑鑛鍜錬豈厭増鉗鎚縱横法縛斷除盡了了方為獅子兒晚興墻角風欺竹影斜數聲啼盡欲棲鴉重門已閉斷還往獨巻疎簾進月華下湖晚歸屈曲莎隄引興長肯辭芒屨踏秋霜歸来已奏孤城角撩亂梅花落粉墻秋日西湖六首兩山斜抱翠逶迤一水中間似漾陂孤榜獨来還獨往鸕鷀鸂鶒莫相疑琤然一葉墮空庭似喚幽人夢欲醒斜倚素屏褰翠幔沉香烟吐博山青南山爽氣對朝扉竹露吹風更濕衣可是吟魂怯清景何妨着屐歩苔磯飛来雙鷺落寒汀秋水無痕玉鏡清疎蓼黄蘆宜掩映沙邉危立太分眀欲跨髙樓曠逺情無端秋雨苦𡨕𡨕峥嶸日脚漏雲䖏瞥見遥山一抹青西風夜半捲庭槐卧聽隣翁曉圃開稚子相呼入林去應知病菓落莓苔晨起窓扉曉闢對平湖爽氣侵尋冷入膚林逈霜黄垂橘柚渚清沙碧老菰蒲忘機鷗鷺元相狎得食猿猱不用呼㳺目騁懐心正逸更慿髙䖏立須臾參寥子詩集巻四
