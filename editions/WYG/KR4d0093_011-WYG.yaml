front:
  text: 嶙峋休言白日壺中勝且看紅顔鏡裏春富貴羣爭雖有路山林獨住豈無人恐君未識陶彭澤故約籃輿訪米真
  hash: sha256:99532061c87ebec2d3d34f462a9721a66cb9f9b7e022919ec6833dfe699e25ad
  markers:
  - {type: page-break, offset: 9, content: '', id: KR4d0093_WYG_010-12b, image: WYG1116/WYG1116-0075b.png}
body:
  text: 次韻試可同謁子晉祠古柏連岡三萬株朝烟破日翠扶疎投鞭下馬得幽徑共謁賔天帝子居遺榮少海徑無䨇便逐浮邱出帝鄉可笑而今居富貴亦思髙舉上蒼蒼參寥子詩集巻十欽定四庫全書參寥子詩集巻十一宋釋道潛撰寄王晉卿都尉主第耽耽冠北城位居侯伯固尊榮肯将踏月趨朝脚来伴穿雲渡水行池上紅渠應漸老山中紫笋尚抽萌嵩陽迤邐川原勝聞說他時卜釣耕與田承君宗丞話舊赤日下西谷松門歛餘暉蕭蕭征馬鳴客子来者誰故人田子方六月并州歸﨑嶇千里道問子来何為君命不俟駕詎敢辭炎曦禪庭梵唄歇軟語同逶迤梧桐挂凉月清潤含裳衣人生實萍梗同附一𣺌瀰驚風或蹔先波定還相依昔我在南兖識君英妙時軒軒勇氣節凛凛如熊羆聲名固已早時命殊淹遲今兹向魏闕驥足将騰夷聖君隆至治諫諍求瑕疵甞聞至人語子可補拾遺一言開堯聰四海風俗移無為外重失蹇諤當自持贈言古者事吾豈忘前規登嶽頂呈試可邦直偉哉中國擅五嶽巍巍嵩髙據其尊四時百辟盡朝㑹雲幢烟葢来追奔自餘衆阜何足數擾擾羅列真兒孫秋霖乍開原野凈隆曦破海浮朝暾淵眀曠達不事事勝日結客逰山樊山腰下馬躡風磴杖履詰曲躋㠝岏窓經玉女猨鳥􅄫石潄飛瀏鳴潺湲長松吟風和哀響肌膚凛栗凄神魂行窮絶頂已晡側雲烟為我開餘昏昻頭去天驚尺五星斗厯厯俯可捫超然擬與人世絶彷彿有路通崑崙洛陽竒峰三十六領畧併入一眼吞平生方寸喜壮觀兹㳺氣豁殊軒軒二豪詞筆有餘地請賦傑句留山巔風流便可付千載歐梅尹謝相與傳送王彦齡承務還河内武陵王郎髙韻度鞍馬四方無定住眼逢泉石便吟哦咳唾珠璣不論數我亦悠悠事不羇浪萍風梗隨安之少室山前古蘭若觧后便與同襟期興来岸幘一長嘯清聲邀越穿雲嶠竹林故事獨未冺人物如君亦髙調秋風獵獵促鳴蟬歸路千山入馬鞭白袍烏袖宜圗畫不羨襄陽孟浩然寄宗室周臣觀察帝胄天孫多茂良似公人物更難方詩書自負青雲噐風月能收古錦嚢科斗雷文陳几席鱗衣蟻食耀杯觴都城解后傾遲素崧少歸来一夢長題宗室公震防禦畫後錯莫江雲結瞑隂歸飛宿翼半浮沉毫端領畧無遺種想見雍容物外心蒹葭照雪含餘潤古木攙天氣老成山谷不来居士死何人為子一題評同趙伯充防禦觀東坡所畫枯木經綸志業終不試晚嵗收功翰墨林偶向僧坊委陳迹每經風雨聽龍吟蕭然素壁倚枯枝行路驚嗟況所思惆悵騎􅚪天上去却来人世恐無期大年觀察許作從駕出南薫門雪霽圗因以詩督之南薫門外照初陽寳馬雕鞍從玉皇千丈雪雲開逺野萬枝瓊樹鬭新粧筆端妙䖏君先得老去閑情我未忘乞與山林資玩好髙懸素壁爛生光與廖明畧學士賦餘干縣白雲亭一首呈吳眀府白雲翔太虚時来傍孤城超然此榮觀常恐鸞鶴迎能賦自疇昔騷人遺典刑嗣音竟有屬異代逢淵明揮毫無停綴臨流有餘清光風轉洲渚爽氣生軒楹况復廖常州吐辭皆正聲跂予浪續貂坐想徒揺旌賦王立之承奉園亭十首大裘軒經綸志四海齟齬不得申大裘縱千丈姑覆洛陽春載酒堂子雲草𤣥時載酒客常滿君今慕若人竹户誰来欵潄醉亭潭潭百尺井汲引鳴飛瀾驚回午醉客一漱齒頰寒介庵一庵容宇宙介意安在哉珍重庵中人空洞無纎埃頓有亭君家十亭觀棊置宛相望是中富墨妙偉哉蘓與黄亦愛亭扶疎䕃佳木五月風来徐淵眀方偃卧亦是愛吾廬永日亭長安富貴人嵗月馬上遷岸巾怡永日心事獨翛然求定齋南華鑑止水烱然見鬚眉夫子果能定物豈逃妍􅎀冷然齋虚室晝生白清風襲衣屨圓蒲燕坐人冷然欲仙去賦歸堂王郎英妙年功名固堪勉浩然賦歸歟持操真可羨送慈義偁師㳺嵩少道人家住錦溪頭衣裓常含爽氣浮偶踏塵埃經北闕却尋雲水過西州氷銷隂壑蘭芽動岸長條春意柔少室峯前無異路莫将陳迹苦追求東坡先生輓詞造物周千載真材得豫章經綸等伊吕辭學過班揚徳厚傾蠻貊名髙震虜羌數竒終不偶難與問蒼蒼博學無前古雄文冠兩京筆頭千字落詞力九河傾雅量同安石髙才類孔眀平生勲業志欝欝閟佳城少年持國論不羨洛陽人抗疏忘機骩危言駭縉紳丹衷那有謂康濟在斯民竟謫江湖去端居寂寞濵初復中原日人爭拜馬蹄梅花辭庾嶺甘溜酌曹溪梁木傾何速椿年竟不齊靈輀向崧洛行路亦悽悽一時英俊附門墉兄弟從来號兩龍雄辯未饒端木賜題評肯下郭林宗精神烱烱風前鶴操莭稜稜雪後松無復勝逰參杖履追雲弄月更雍容羣賢投老竄炎荒瘴雨蠻烟豈易當燾氣内全真自葆鐵心無動亦何妨海山出䖏慿誰共蜑叟追隨樂末央凖易著書人不見㣲言分付有諸郎羽扇綸巾擁帥權髙牙大纛拂雲烟初聞父老誦嘉語綽有風流似昔賢定武人謂公下車施設宛如韓魏公謫籍數年居瘴海功名無分勒燕然空餘雪浪齋中石留與邦人萬古傳當年吳㑹友名緇大覺海月辨才盡是人天大導師㧞俗髙標元自悟妙眀真覺本何疑籃輿行䖏依然在蓮社風流固已衰他日西湖弔陳迹斷橋堤桞不勝悲西湖新堤六橋皆公所剏徳政從来主意寛奮髯時怒豈容姦倘逢大事䏻談笑未必風流劣謝安峩冠正笏立談叢凛凛羣驚國士風却戴葛巾從杖履直将和氣接兒童大河當日决澶淵横被東徐正渺漫城上結廬親指顧敢将忠義折狂瀾文登五日召公歸海市竒觀與願違已蟄魚龍能再起人間異事古来稀西湖巻葑拓漪漣十里横呑碧玉天自謂前身真白傅至今陳迹尚依然公生平出䖏多與樂天同樂天在杭治湖築堤為政十六箇月公亦如之臨淮大士本無私應物長于險䖏施親䕶舟航渡南海知公盛徳未全衰鄒至完言在嶺外甞聞人傳慧州太守方君家人素奉佛一夕夢泗洲大聖来别云将送蘓某過海遂詰之曰幾時當去荅曰八日去矣後果如期公得命移儋耳至完始未信後遇方君問之信然畫圗雖未上凌烟道徳芬芳滿世間遼鶴已歸東海去列仙風骨若為攀孔子韶方平與其姪䖏度相訪于香山作此詩以贈之洙泗芬芳逺髙材尚可求二難俱韻勝小阮更風流語欵時容接詩豪未易酬平生喜人物觧后此相投孔平子書閣所蔵石菖蒲寒溪之濵沙石之竇産之靈苖蔚然而秀有美君子採持而歸文石相并滀涵清漪根盤九節霜雪不稿置之幽齋永以為好送處度赴試異哉曲阜幾世孫白玉受性良且温詩書禮義祖家學擾擾自餘何足論良辰往往専吟誦逺壓曹劉攀屈宋肯與齊梁作後塵秋月春花恣嘲弄我方杖䇿過西州指㸃雲山結勝逰已有詔書催去興豈肯泉石更淹留征車曉送登長陌月沒參横河漢白期君安穏上龍門不怕臨流遭㸃額次韻李端叔題孔方平書齋壁萬事年来即罷休心縈雲水尚追求草堂早晚投君宿紙帳蒲團不用收菊叢稍稍敷金蘂蕎麥芃芃放雪花榆桞繚墻蒼靄宻誰知中有隠人家白頭幕府尚﨑嶇南畝歸休盍早圗􅓳上山川要佳句安排風月待相如舍南舍北盡雲山此䖏躬耕有底難社飲雞豚好隣里一盃相屬百憂寛馬蹄逐逐走埃塵官府寜容自在身夜宿南溪孔居士青燈相對話悲辛愛君簷外蕭蕭竹翠榦扶疎一様齊莫道此君無俯仰驚風墮雪亦須低端居終日少逢迎佳客時来一座傾不見諸郎事絃筦幽窓惟有讀書聲肝膽未應分楚越髙曽元共水雲鄉方平五世祖避亂居錢塘愛君善作離騷語清警殊非俗肺腸仲尼道徳髙千古老子㣲言冠百家餘澤風流俱擅美那云玉樹倚蒹葭吾黨從来迹易親只縁同是箇中人􅓳川魚鳥渾相識来往沙頭肯厭頻行歌亭孔寜極先生所居自古山林浪得名欲要人爵謾逃名惟餘􅓳上行歌者獨免移文勒户庭先生本自負經綸志在邱園世莫親不信請看門下客盡為金馬玉堂人故相范忠宣韓持國滕達道王仲儀諸公皆禮敬甚嘗聞箕潁卧巢由振蕩髙風冠九州欲識當年孔寜極依稀堪與若人儔􅓳川勝氣靄葱葱逺訪先生舊隱風說禮敦詩見猶子故知餘澤未終窮次韻孔處度李榮期同逰汝陽城西等慈寺溪堂汝陽介崧洛郡邑古且幽出郭纔數里招提據清流千章欎古木中有百尺樓循梯到朱欄眼接萬象㳺二豪俱才華筆力勝九牛佳辰同覽眺髙懐肯悲秋軒渠發笑語繚亂驚鳬鷗平生讀書要取用不假鈎想當援毫初應手如見投挹子眀月光冷然洗吾眸次韻方平見寄黄花弄色近重陽山菓紅藜迥得霜節物撩人興不淺交情如子味何長終期霧豹棲巖穴且作賔鴻寄野塘他日西湖能過我胡麻共飯煮芹香寄題南陽劉氏松堂南陽自古誇雄都山川淑氣無時無中間豪傑相間出卧龍光武興王圗有唐昌黎百世士布衣奮起為師儒風流異代骨雖朽餘澤尚可濡焦枯劉郎先子挺竒質志業文史稱鄉閭詞場較萟一不售掉頭便卜溪山居朋雲友月終嵗事挟册教子猶區區青松寸根手自植氣槩今已凌凡株虬髯龍甲拂天籟䬃若風雨来江湖悲哉孝思論罔極新搆永與甘棠俱西州騷人競與賦盛事相詫無賢愚續貂自昔人所誚詩成出袖増躊躇同韓子蒼㳺黄山觀約髙夀朋張公碩不至駝裘躍馬去翩翩一舍逡廵箭脫弦仙事未須窮傳記勝㳺聊為好山川寄林絡石驚寒瀏繚白縈青對篆烟惆悵能文二三子操觚安得共周旋子蒼見和二篇再用前韻酬之渉世伊余實強顔傷弓因翼尚驚弦論文已失李太白採藥行尋葛稚川請置黄公新石研此山出研歸磨潘子古松烟幽窓冩就經綸志他日風雲去斡旋次韻王潜翁題王孝孫所藏摩詰聼松圗輞川竒䖏固難評眼裏瞳人要自眀落落信為霜後操蕭蕭那慮世間聲忘言我已輸三士妙曲渠寕羨九成此去黄塵沙漠底時時開匣覩餘清時孝孫有塞上之行逰葉城韓氏東園曽䑓累榭蔚相望古木連雲出繚墻可但陶朱能計畧須知猗􅉐亦材良松風菊露滋清夜楚舞吴歌奉宴觴好在諸郎俱挟册起家儒術未應忘過張公碩廷直息軒公碩乃張施州仲謀子此軒實黄魯直名之涪翁六萟學力可當萬人施州亦英特文武備一身風味真頡頏宛然喜相親詩壇甞屢戰妙譽傾縉紳涪翁往播遷風義頗凋淪施州奮不顧伏臘賙且勤霜雪槁羣木凛然見松筠施州歸夜䑓遺編照青春嗟我獨不識覽巻徒悲辛有子紹門户飄飄氣方振能文得父風作語殊不陳流源日疏鑿豈易量涯津結廬依通衢隔墻閙蹄輪頺然小軒上息偃全天真男兒功名志蠖屈終一申誰䏻効急急俯仰車馬塵涪翁為子名髙意庶可循參寥子詩集巻十一
