front:
  text: 參寥子詩集明刻夲余向亦有之若宋刻本於数年前曾聞池上書堂有之然未之見也比来家事攖心置買書籍頗不易易非特宋刻書日少一日即有之而余収書之力亦日難一日也遷居縣橋以来葺小廬屬南雅庶常題曰百宗一厘日坐其中撿點古刻成一簿錄謂之百宋一厘書目盖余好書之心不因力歉而稍衰焉余友陶君藴輝雅善識古并稔知余之所好在古刻昔余所收者大半岀其手兹復以宋刻參寥子詩集相示索直白鏹三十金余亦無如之何勉購以增書目之光云尔世行夲向傳有二以法嗣法潁編者為勝此其是也惜余明刻夲尋訪未淂無􅀙證其同異至于卷端亭文雖係鈔補而以貴與經籍考證之當不謬若以為此序是餞參寥禪師東歸序而非高僧參寥集序是并通考而昩之奚􅁕與論古哉嘉慶崴在􅢦亥閏二月望後一日荒翁黄丕烈識參寥子詩集緫目第巻一
  hash: sha256:4d1e7418f2c95c87de618a3be606159fadc4a54dc7f435c83286e3a92603b072
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_000-1a}
body:
  text: 廬山雜興陳季常靜庵何氏寒碧堂崔君草堂虚寂堂贈陶道人廖公挽辭絶句覽秀亭歸宗道中寄王慎中夏日山居秋江周郎中濂溪陶宣德逸老堂夜渡採石秋日西園四首題楊君蘭軒送琳上人春日即事臨平道中寄辯才㳺鶴林寺江上秋夜過金山與王元䂓三首春晚三首第二卷邵伯道中二首平山堂觀雨建隆秋夜二首晚歩飲蜀井次永仁韻次何子温韻醉道士石懐孫莘老四栢堂次秦少㳺韻四首次黄子理韻三首次龍直夫韻次孫傳師韻春晴二首東園三首淮上三首冬夜㑹孫莘老三首曉出土山寄蔡彦規次太虚夜坐韻呈莘老次王通叟韻寄仲恭南樓書事懐裴學士呈慶禪師第三卷再賦温泉游龍洞次莘老贈顯之韻虚樂亭朱伯收觀雪宿九曲池䢴溝絶句寄李端叔都下晚霽酬邵彦瞻訪蘇學士彭門書事三首虚白齋贈子瞻歌妓逍遥堂書事子瞻飯别寄李齊州次子理梅花韻淮上寄子瞻别曽逢原寄逢元寄端叔贈鄒醫寄蘇子由贈子固二首宿乹明寄莘老寄李公擇俞待制挽辭第四卷春行次傳師韻淮上聞鴈與怡然夜話鶴林寺寄舒堯文寄叔康講師登壽寕閣得端叔淮上書送慧悟還闕寄侍其秀才鍾山夜月睡起曽舍人挽詩二首子瞻赴守湖州賦得岸字南溪泛舟吴興寄子瞻田居四時龍井書事四首寄俞伯謨二首夏夜送楚上人晚興下湖晚歸秋日西湖六首晨起第五卷招李無悔寄彦瞻次彦瞻韻梅花三首寄孫莘老寄子由和子由韻寄二居士三首廬山懐子瞻酬周亨叔訪王荆公三首謁天笁觀音次元翁韻病中呈劉景文入智果院辯才新亭次蘇仲豫韻辯才生日題解頥堂送仲豫就省同蘇文饒泛西湖酬錢塘宰和景文見示夏夜懐景文次景文韻寒食日第七卷别蘇翰林送景文贈林子中辯才夜坐贈聦道人送僧㳺天台覧子理詩寄蘇太守次陳敏善韻都僧正挽詞次吴承老韻免充僧正送子中三首呈廖通判次王行甫韻同㳺天笁次劉韋孟韻三首㳺苕溪道場山夏夜送蘭花二首夏日竹閣送李仲益訪勤上人荅曉上人送俞伯謨次文饒韻陪人㳺天笁呈章丞相謁荆公像二首曽子開話别二首寄妙懿觀恭師詩尋余清老不遇和劉伯昌韻次真禪師韻送文惠還金華題桐虚齋題停雲齋次智果韻二首次周開祖韻第八卷次才仲韻五首贈吴子野送庠上人才仲山行神智話别暉暉堂次陳叔易韻二首曉霽次感懐韻逺齋懐仙閣華亭道中泛西湖和元翁韻和明逺韻秋夜見懷送人還金華宿天笁三首晨起喜人見訪送明上人之都下送定上人次劉蔡仲韻次黄仲閔韻蘇夫人挽辭懐蘇伯達題􅀟柟軒次蘇端明韻無為堂示法潁清聚軒曉師見别㳺徑山雲巢三首呈秦少章送無擇燕黙堂送嚴上人懐舊隱六首懐何彦時三首劉公挽詞贈霍山人第九卷送劉推官觀東坡􅀞淮上觀水書秋景屏過韞秀堂二首聦師見寄升師見招二首殘菊滌軒和司馬仲逹題桃竹軒溪上聽琴二首呈應禪師題飬浩堂題玉淵堂與定師話别四首題緑筠軒懐毛澤民寄趙伯言讀東坡南遷詩讀聞復詩次聞復見懐韻寄愚坦次聞復韻十首夏夜偶興次古上人韻率同志誦經呈曽子開送錢持正寄子開贈潜照木犀花次關子容韻湖上晚歸二首子容見過二首第十卷弔許元裕二首湖上秋日十首贈趙明發樓試可見招次秦少㳺韻春隂登西樓二首送伯言贈歐陽季黙劉延中見贈酬劉巨載觀明發圗次東坡韻代老人荅子由書事二首次試可見訪揖仙亭同㳺嶽寺試可喜雨夏夜觀曹夫人􅀞二首黄天選見寄次試可宿齋韻贈德強秋聲次夭選韻次試可韻二首哭少㳺二首第十一卷寄王晉卿田承君話舊呈試可送王彦齡次周臣韻題公震畫二首東坡畫枯木雪霽圗呈吴明府王立之園亭十首賦歸堂送慈義東坡挽詞贈孔處度石菖蒲送處度試題孔方平齋壁行歌亭次孔處度韻次方平見寄題松堂張公碩不至用前韻松圗韓氏東園息軒第十二卷與蔡秀如贈耿純叔讀子蒼詩二首贈賢上人喜雪二首書雀竹圗二首過韓氏莊二首内樂庵􅂎菊軒寄潘仲升送李南仲佚老堂贈􅁠上人孫傳師挽詞孫智甫挽詞題逺趣軒蒙泉堂夢中作哭休上人䆳隠堂呈周格非觀牡丹寄信上人呈趙德􅌗寄詵上人山中書事寄孔天瑞聽琴寄伯言觀梅花處順齋贈聖可㳺狼山二首容膝庵酬王衮臣觀伯山詩雨中偶興酬趙存道賞牡丹贈思正子次思正韻維陽秋日四首參寥子詩目録終
