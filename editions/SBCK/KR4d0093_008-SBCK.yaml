body:
  text: 次韻才仲試院夢中夢事見寄夢入秋山知幾層霜風吹骨正稜稜蒼崖犖硧難安足自說從余授杖藤事見才仲叙中朱甍碧瓦礙雲浮共躡層梯最上頭一餉䦨干變風雨凛然毛髪便驚秋恠獸胡為出巨津昻然激水忽翻身魚龍贔屭何妨事莫作風波謾恐人一川脩竹映踈花川上時聞響釣車似到秦人種桃處誰知夢断却還家崖根烏蜜已先嘗從此知君􅁂不霜應笑吾曺事枯槁山中危坐獨休粮贈吴子野先生麻田老仙心烱烱少有髙風慕箕潁枕流漱石三十年眸子瞭焉神更静忽然杖筞海上來至人道妙同塵埃達官貴侯競招致往無所欲誰嫌猜迩來一志從吾黨跡與孤雲共天壤曹溪有路更攀躋徑躡毗盧髙頂上見東坡詩中折子野將岀家事送庠上人㸃撿行装拂與巾洒然輕别故山春家家門底長安道舉目何湏更問津次韻才仲山行幕府文書一掃空何妨行樂醉春風想聞笑語千山外正在煙雲萬疊中哢日鳥聲喧細碎照溪花影静玲瓏苦吟只恐凋肝腎夫子還冝少黜聦與神智師話别昔我年始壯託身靈鷲峰主人大導師皷舞揚真風四方依絳帳雜遝象與龍嗟余於此時已識大士蹤紛紛論議場頭角出群雄如何三十載慧刃藏其鋒端居肄業地了不為世通邇獨念西湖聿來将誰從情隨山水逺興與魚鳥同平生方外姿自在如􅁳鴻明朝復回首飄洒一孤篷暉暉堂堂上何為絶㸃埃堂前翠箒掃空堦遥憐薄日暉暉静影入髙人燕坐懐次韻嵩陽陳叔易先生見訪知君挟􅁽未嘗閑一志端能事孔顔千里扁舟下吴㑹眼中収拾只溪山枯槁長專一壑間權豪殊未少低顔風雲他日超騰去莫畏移文到北山曉霽雲擁茅簷水拍渠曉來新雨過吾廬蔫紅宿蕚莓苔滿解事長揚自掃除次韻龔堯佐帳勾晨起感懐造物紛紛自變更達人何用較前程芭蕉身世榮枯久胡蝶夢魂來往輕隔屋想驚銅漏盡開扉猶愛玉繩横應嫌百吏鳬行進簿領文書與案平逺齋為玉上人作君不見崑崙之河與天通源深發逺人莫窮回溪轉壑隨折衝末勢演溢流于東東溟無旁下無底浩蕩足以家魚龍嗟哉吾徒雖好學詎肯著意推所從淵停冨滀有若是孰謂世上無豪雄法師名齋意且逺張皇幽􅆌見尔聦西來竺書五千軸期子嵗月如磨礱離騷楚詞亦謾讀言語黼黻何必工禪餘習氣如未盡時倚澗石吟松風懐仙閣瀛州仙人騎皓鶴珮玉鳴風度寥廓錦溪南望九仙岑笑指煙霞憇層閣閣中清絶無纎塵銅鑪著香夜夢真平明跨鶴出山去澗草嵓花空自春山僧問我入何地今作玉皇香案吏挾持造化幾時還搔首臨風聊一喟華亭道中白水茫茫天四空黄昏小雨濕春風五更百舌催殘夢月到官河桞影中同周元翁著作范眀逺祕校西湖夜泛各賦一首薄雲踈雨作還休白帝撩人巧變秋天地此身均逆旅江湖幾番共離憂暮聲断續鐘連磬夜氣浮沈浦與洲圓嶠方壷吾未羡敢煩騷客為􅁳搜和元翁髙論每逢賢友生還如講武得竒兵了無鄙吝胷中物尚有風流世外情破海玉蟾初未躍洒空珠露已先傾囬橈轉柂行三皷始見波瀾百頃明和明逺二客風神瑩石泉解衣同緩夜歸舡已殘巾子峰頭日猶認吾廬竹外煙水恠有名殊未見犀燈無事不湏然月明幽渚蒹葭静珍重沙禽穏睡眠次韻月上人秋夜見寄􅁳鴻振鷺想儀形數日新秋入夢清丹壑流泉依舊否碧嵓藂桂幾時生風來玉户凉􅀄集露泫銀河色漸清僶俛酬君無妙語夜光魚目愧相并送逺上人還金華千脫葉送殘秋一舸南歸興莫留冨渚江平非白馬子陵灘穏異黄牛吟懷覽勝冝無倦才力如君豈易求他日殷勤為細字盡傳佳句到東州與愚上人宿天竺夕陽山氣藹葱葱路轉松隂􅃨幾重行過石橋人未見數聲先聽寺樓鍾稽留峰北好林泉珎重幽棲得所便栢子煙中能宴坐想無餘習可攀縁霜壓簾櫳露泫條銀河影轉斗垂杓清言共失三更夣錯恨芙蓉漏易消晨起猿鶴驚呼曉樓鐘動翠㣲楓林墮清月踈影亂人衣喜不群不疑見訪鵲啅庭梧喜滿懷懸知二子下崔嵬山中爽氣知多少半逐風流杖屨來送桐江明上人之都下窈窕􅀌雲下翠岑帝郷閑去夲無心紅塵滿眼急囬首莫遣空山鶴怨深送定上人還㑹稽西風警群木蕭瑟散秋聲病客有歸思孤雲無戀情月當千里共人恨四難并苦學誰如子它年在一鳴次韻劉蔡仲秀才雪後登竹閣檻前君子舊虚心雪後相看意更深晴日暖風催語鳥翠梢髙處囀柔音君看楚嶠聳㠝岏圭壁千層間翠嵐山後一峰尤秀拔依稀還落剡溪南次韻黄仲閔主簿見訪游寳雲諸寺吾廬附曽阿松竹蔚行路平生土木軀羞為折腰具蓼虫甘苦澁雖死那求遇黄香諸父賢傾蓋如有素相將山水行所適得佳趣觀臺深且靚縞壁懸清句雲巢倚空端下覽冝細顧樓臺霽雪􅀄碧瓦塵未涴籃輿指頽景長挹還辭去怳如山隂集俛仰已成故重來竟何時相望碧雲暮蘇世羙夫人挽辭夫子剛中早數竒閨門髙節聳當時淵眀晚欲歸三徑德曜能從賦五噫不見萊衣華髪事空驚薤露昔人悲故知造物酬隂施玉立諸郎冨白眉重居夜坐懷蘇伯達昆仲狂風吹林聲怒號隔垣洶洶如秋濤夜䦨稍覺群動息星斗挂簷霜月髙東隣書生勤且勞粲然文采真鳯毛想遥下帷應未寢短檠相對課離騷慕容居士䨇柟軒陽羡溪山名浙右氤氲淑氣無時有遂令比屋慕絃歌甲第殊科争捷手先生讀書三十年數竒不偶真可憐閉門陋巷聊自隠簞瓢屢空心晏然南軒前頭兩佳木先生撫玩長不足尤愛薫風五月􅀄白銀開花光照屋故人解后相逢遇指㸃婆娑索新句君不見少陵杜叟有長吟莫作凢材等閑賦次韻蘇端定武雪浪齋孔眀氣宇白玉温忠義勇決踰王尊葛巾羽扇傳號令塞垣徹警無塵昏良辰往往挾將佐射鵰走馬循煙村歸來飲酒坐堂上賔從如雲填㦸門一朝郡圃得竒石雪浪觸眼驚神魂旁求蒼珉琢巨斛偃然卧土知無根三牛曳歸置堦圯錯磨不許留纎㾗興來作詩寄臺閣雄詞妙筆争考論將軍今謫窮海外㑹見曦娥窺覆盆殷勤寄語朔方客佳致勿毁冝長存無為堂無為豈不動無念非刳心至人均道妙與物相浮沉青銅一寸眀萬象了自分何湏苦機械擾擾亂冲􅁭晴䆫馥煙篆衣祴蒙餘薫超然曠士懷所得踰古今示法頴兒曹汝既識薫蕕卓犖應湏力自修一志徑從齊客語萬端無受楚人咻卑飛燕雀冝深逺髙舉鸞凰可並㳺莫負謫仙當日語十年名譽滿東州清聚軒之子唫懷欲稱情故穿幽沼滀清泠儻逢來客議深淺但道淵源通北溟次韻曉師見别欲㳺京洛春波漲南浦霽色媚澄鮮扁舟駕兩槳行矣子所便岸花開迤邐紅紫交相妍詩情發浩蕩輸㵼萬壑淵清新逼􅁃信雅徤追樊川相儔得鴻鵠翔集固超然衣祴暫塵土它時洗雲泉幽姿復烱烱不羡玉池蓮㳺徑山懷司馬才仲柔桑蔽野麥􅀄齊布􅂖催耕雨一犂略彴時横溪上下薔薇間發水東西重㝷勝處追前賞無復斯人手共携回首春風増感槩綿綿黄鳥更悲啼雲巢環湖相望百招提髙棟曽軒亦屢躋未若道人基􅌟勝䦨干清與白雲齊九江秀色可􅄃結謫仙愛彼巢雲松寂寞風流三百載此軒竒觀躡前蹤碧瓦朱甍冠翠㣲鬰葱佳氣繚䆫扉人間塵土紛阡陌不到藜床燕坐衣清明日湖上呈秦少章主簿水邉花霧曉氤氲春入西湖兩岸深冶葉倡條他自媚朽株枯木我何心鞦韆索轉朱樓角博塞聲喧碧桞隂年少故人方感㮣未應從俗強浮沉喪耦折時少章送誠無上人還洞山文禪師席下上人妙齒遺樊籠嗜好豈與稠人同嵓捿水飲有餘􅁉期以至道超鴻蒙少林人亡僅千載末路皷舞誰為雄江西老􅄄真望士蟻趨雲合争所從羡君伏􅃥事且久誠專志苦迷春冬心珠磨錯稍精瑩彷彿水月含冲融去嵗扁舟下吴㑹溪山勝踐情所鍾芒鞵竹杖霜露入始知節物徂秋風朝來興盡挽不住飜然又逐南征鴻它年相逢定廬岳與子終老巢雲松燕黙堂萬彚乹坤裏誰何識道真喧卑憎末俗燕黙羨髙人漏轉芙蓉永香銷栢子頻他年揮玉麈堂上挹芳塵送嚴上人還永嘉道人出處孤鴻儔詎肯低囬受覉絆飄風轉日歷九州不羡騎鯨游汗漫我生與君幾相逢窮幽摘勝時乃同胷中妙道未容扣又引髙興辭秋風君家住在孤嶼側此别何時見顔色欲識相思一寸心冷月依依挂空碧吴門獄中懷北山舊隠江湖堂北是吾廬繚繞杉篁蔚有餘欲問山中近消息鱗鴻不寄獄中書誅茒投老卜栖遟雲雨相翻豈易知夜鶴曉猿休悵望回車復路可無時數畒檀欒古道邉亭亭氣槩上參天未應霜雪能摧抑不用行人歎可憐東崦扶踈一樹梅繁英辜負嵗時開殷勤寄語蘭兼蕙它日春風我亦來甘冷冝茶石縫泉得名􅀄自玉堂仙蒼苔滓穢聊䟽治照月涵星復粲然一徑縁雲入夀星竹間窈窕見踈櫺䦨干數曲觀臺上幽草靚花常滿庭吴門有懐錢塘何彦時仙尉英妙何郎藴德光不隨人世事炎凉麒麟歩武開天上他日青雲道路長英㳺閣前官桞行柔枝嫋嫋弄鵝黄多情春色還依舊獨有離人天一方湖岸茸茸細草生芳洲杜若想縱横去年問桞尋花地誰伴穿雲渡水行劉咸臨秀才挽詞道源學士之子劉子江南英韻勝不友俗閉門誦詩書户外無來躅昔我寄匡山嵓扉屏幽獨君聞跨蹇驢迢迢訪深谷忘懷去畦畛結好比松竹浮雲事忽空逝水難再復徒有篋中文千秋成鬼録異材擢陽阿秀色方蔚然侵尋掩衆阜屹屹上造天驚飈忽摧殞中道虚棄捐顔淵古稱夭道德今獨妍何求擁腫為無用徒永年平生本家學耻作干時語著書以愚名綽欲慕前古紛紛詆迂闊黙黙君自許弱齡詠風騷其詞哀以苦先生歎竒作夀達終難與果為􅁳􅁳㳺一往不可覩吾希李長吉異代不得友賴餘錦嚢篇把玩時在手斯人君並駕未易較先後肝脾褁陽秋落筆粲瓊玖當年邂逅初宛在三峽右相携石橋行下瞰冰雪溜音容俄永隔山月空依舊銘詩得黄香知子垂不朽贈霍山人先生少年喜武事三略六韜曽徧閱胷中雲夢吞八九氣勝萬夫真勇决防邉伊昔從都護欲取功名繼前烈臂弓腰箭事戎裝逺出砂場恣㳺獵擒狐射鴈狂且逸不覺歸途迷夜雪敗官遭譴失所志回首飄然辭魏闕挾持妙術當生涯放浪江湖閑嵗月尋常得錢即沽酒笑與妻奴同飲啜樂天知命了無憂奕奕紅顔浮兩頰春風浩蕩魯城邉稠花亂蘂争紛妍方將與君共携手騁懷㳺目相回旋興來别我汶陽去黄鵠一舉難留連村橋野店醉斜日路人誰識地行仙參寥子詩集卷第八
