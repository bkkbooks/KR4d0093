front:
  text: 參寥子詩集明刻夲余向亦有之若宋刻本於數年前曾聞池上書堂有之然未之見也比來家事攖心置買書籍頗不易易非特宋刻書日少一日即有之而余收書之力亦日難一日也遷居縣橋以來葺小廬屬南雅庶常題曰百宗一厘日坐其中撿點古刻成一簿録謂之百宋一厘書目蓋余好書之心不因力歉而稍衰焉余友陶君藴輝雅善識古并稔知余之所好在古刻昔余所收者大半出其手兹復以宋刻參寥子詩集相示索直白鏹三十金余亦無如之何勉購以增書目之光云爾世行夲向傳有二以法嗣法潁編者為勝此其是也惜余明刻夲尋訪未淂無從證其同異至于卷端亭文雖係鈔補而以貴與經籍考證之當不謬若以為此序是餞參寥禪師東歸序而非高僧參寥集序是并通考而昧之奚足與論古哉嘉慶崴在􅢦亥閏二月望後一日荒翁黃丕烈識參寥子詩集總目第卷一
  hash: sha256:7a06496dffab64581e7e5b4eb1bf12da4b98ac9f35bdf3191284915286b08ea9
