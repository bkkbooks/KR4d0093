body:
  text: 廬山雜興陳季常靜庵何氏寒碧堂崔君草堂虛寂堂贈陶道人廖公挽辭絶句覽秀亭歸宗道中寄王慎中夏日山居秋江周郎中濂溪陶宣德逸老堂夜渡採石秋日西園四首題楊君蘭軒送琳上人春日即事臨平道中寄辨才遊鶴林寺江上秋夜過金山與王元規三首春晚三首第二卷邵伯道中二首平山堂觀雨建隆秋夜二首晚步飲蜀井次永仁韻次何子溫韻醉道士石懷孫莘老四柏堂次秦少遊韻四首次黃子理韻三首次龍直夫韻次孫傳師韻春晴二首東園三首淮上三首冬夜㑹孫莘老三首曉出土山寄蔡彥規次太虛夜坐韻呈莘老次王通叟韻寄仲恭南樓書事懷裴學士呈慶禪師第三卷再賦溫泉游龍洞次莘老贈顯之韻虛樂亭朱伯收觀雪宿九曲池䢴溝絶句寄李端叔都下晚霽酬邵彥瞻訪蘇學士彭門書事三首虛白齊贈子瞻歌妓逍遙堂書事子瞻飯别寄李齊州次子理梅花韻淮上寄子瞻别曽逢原寄逢元寄端叔贈鄒醫寄蘇子由贈子固二首宿乾明寄莘老寄李公擇俞待制挽辭第四卷春行次傳師韻淮上聞鴈與怡然夜話鶴林寺寄舒堯文寄叔康講師登壽寧閣得端叔淮上書送慧悟還闕寄侍其秀才鍾山夜月睡起曽舍人挽詩二首子瞻赴守湖州賦得岸字南溪泛舟吳興寄子瞻田居四時龍井書事四首寄俞伯謨二首夏夜送楚上人晚興下湖晚歸秋日西湖六首晨起第五卷招李無悔寄彥瞻次彥瞻韻梅花三首寄孫莘老寄子由和子由韻寄二居士三首廬山懷子瞻酬周亨叔訪王荆公三首謁天笁觀音次元翁韻病中呈劉景文入智果院辨才新亭次蘇仲豫韻辨才生日題解頥堂送仲豫就省同蘇文饒泛西湖酬錢塘宰和景文見示夏夜懷景文次景文韻寒食日第七卷别蘇翰林送景文贈林子中辨才夜坐贈聰道人送僧遊天台覽子理詩寄蘇太守次陳敏善韻都僧正挽詞次吳承老韻免充僧正送子中三首呈廖通判次王行甫韻同遊天笁次劉韋孟韻三首遊苕溪道場山夏夜送蘭花二首夏日竹閣送李仲益訪勤上人答曉上人送俞伯謨次文饒韻陪人遊天笁呈章丞相謁荆公像二首曽子開話别二首寄妙懿觀恭師詩尋余清老不遇和劉伯昌韻次真禪師韻送文惠還金華題桐虛齊題停雲齊次智果韻二首次周開祖韻第八卷次才仲韻五首贈吳子野送庠上人才仲山行神智話别暉暉堂次陳叔易韻二首曉霽次感懷韻逺齊懷仙閣華亭道中泛西湖和元翁韻和明逺韻秋夜見懷送人還金華宿天笁三首晨起喜人見訪送明上人之都下送定上人次劉蔡仲韻次黃仲閔韻蘇夫人挽辭懷蘇伯達題雙柟軒次蘇端明韻無為堂示法潁清聚軒曉師見别遊徑山雲巢三首呈秦少章送無擇燕默堂送嚴上人懷舊隱六首懷何彥時三首劉公挽詞贈霍山人第九卷送劉推官觀東坡畫淮上觀水書秋景屏過韞秀堂二首聰師見寄升師見招二首殘菊滌軒和司馬仲逹題桃竹軒溪上聽琴二首呈應禪師題飬浩堂題玉淵堂與定師話别四首題緑筠軒懷毛澤民寄趙伯言讀東坡南遷詩讀聞復詩次聞復見懷韻寄愚坦次聞復韻十首夏夜偶興次古上人韻率同志誦經呈曽子開送錢持正寄子開贈潜照木犀花次關子容韻湖上晚歸二首子容見過二首第十卷弔許元裕二首湖上秋日十首贈趙明發樓試可見招次秦少遊韻春隂登西樓二首送伯言贈歐陽季默劉延中見贈酬劉巨載觀明發圗次東坡韻代老人答子由書事二首次試可見訪揖仙亭同遊嶽寺試可喜雨夏夜觀曹夫人畫二首黃天選見寄次試可宿齊韻贈德強秋聲次夭選韻次試可韻二首哭少遊二首第十一卷寄王晉卿田承君話舊呈試可送王彥齡次周臣韻題公震畫二首東坡畫枯木雪霽圗呈吳明府王立之園亭十首賦歸堂送慈義東坡挽詞贈孔處度石菖蒲送處度試題孔方平齊壁行歌亭次孔處度韻次方平見寄題松堂張公碩不至用前韻松圗韓氏東園息軒第十二卷與蔡秀如贈耿純叔讀子蒼詩二首贈賢上人喜雪二首書雀竹圗二首過韓氏莊二首內樂庵𣏌菊軒寄潘仲升送李南仲佚老堂贈權上人孫傳師挽詞孫智甫挽詞題逺趣軒蒙泉堂夢中作哭休上人邃隱堂呈周格非觀牡丹寄信上人呈趙德茂寄詵上人山中書事寄孔天瑞聽琴寄伯言觀梅花處順齊贈聖可遊狼山二首容膝庵酬王衮臣觀伯山詩雨中偶興酬趙存道賞牡丹贈思正子次思正韻維陽秋日四首參寥子詩目録終
