front:
  text: 參寥子詩集巻第十一
  hash: sha256:2245932db6678b9bde2f6ecb2d223ba02af403771a3fb549bcd46ce64e245944
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_011-1a}
body:
  text: 寄王晉卿都尉主第耽耽冠北城位居侯伯固尊榮肯將踏月趨朝脚來伴穿雲渡水行池上紅蕖應漸老山中紫筍尚抽萌崧陽迤邐川原勝聞說它時卜釣耕與田承君宗丞話舊赤日下西谷松門歛餘暉蕭蕭征馬鳴客子來者誰故人田子方六月并州歸﨑嶇千里道問子來何爲君命不竢駕詎敢辭炎曦禪庭𣑽唄歇軟語同逶迤梧桐挂凉月清潤含裳衣人生實萍梗同附一渺瀰驚風或暫先波定還相依昔我在南兖識君英妙時軒軒勇氣節凛凛如熊羆聲名固已早時命殊淹遟今兹向魏闕驥足將騰夷聖君隆至治諫諍求瑕玼甞聞至人語子可𥙷拾遺一言開堯聦四海風俗移無為外重失蹇諤當自持贈言古者事吾豈忘前規登嶽頂呈試可邦直偉哉中國擅五岳巍巍崧髙據其尊四時百辟盡朝㑹雲幢煙蓋來追奔自餘衆阜何足數擾擾羅列真兒孫秋霖乍開原野净隆曦破海浮朝暾淵眀曠達不事事勝日結客遊山樊山腰下馬躡風磴杖屨詰曲躋㠝岏䆫經玉女猨鳥寂石漱飛瀏鳴潺湲長松吟風和哀響肌膚凛粟凄神魂行窮絶頂已晡側雲煙為我開餘昬昻頭玄天驚尺五星斗歷歷俯可捫超然擬與人世絶彷彿有路通崑崙洛陽竒峰三十六領略併入一眼吞平生方寸喜壯觀兹㳺氣豁殊軒軒二豪詞筆有餘地請賦傑句留山巔風流便可付千載歐梅尹謝相與傳送王彦齡承務還河内武陵王郎髙韻度鞍馬四方無定住眼逢泉石便吟哦咳唾珠璣不論數我亦悠悠事不羇浪萍風梗隨安之少室山前古蘭若邂逅便與同襟期興來岸幘一長嘯清聲激越穿雲嶠竹林故事獨未泯人物如君亦髙調秋風獵獵促鳴蟬歸路千山入馬鞭白袍烏䄂冝圗畫不羨襄陽孟浩然寄宗室周臣觀察帝胄天孫多茂良似公人物更難方詩書自負青雲噐風月能収古錦嚢科斗雷文陳几席鱗衣蟻食耀杯觴都城邂后傾遟素崧少歸來一夢長題宗室公震防禦畫後錯莫江雲結暝隂歸飛宿翼半浮沈毫端領略無遺種想見雍容物外心蒹葭照雪含餘潤古木攙天氣老成山谷不來居士死何人為子一題評同趙伯充防禦觀東坡所畫枯木經綸志業終不試晚嵗収功翰墨林偶向僧坊委陳迹每經風雨聽龍吟蕭然素壁倚枯枝行路驚嗟况所思惆悵騎􅚪天上玄却來人世恐無期大年觀祭許作從駕出南薫門雪霽圗因以詩督之南薫門外照𥘉陽寳馬琱鞍從玉皇千丈雪雲開逺野萬枝瓊樹闘新粧筆端妙處君先得老去閑情我未忘乞與山林資翫好髙懸素壁爛生光與廖明略學士賦餘干縣白雲亭一首呈吴眀府白雲翔太虚時來傍孤城超然此榮觀常恐鸞鶴迎能賦自疇昔騷人遺典刑嗣音竟有属異代逢淵明揮毫無停綴臨流有餘清光風轉洲渚爽氣生軒楹况復廖常州吐辭皆正聲跂予浪續貂坐想徒揺旌賦王立之承奉園亭大裘軒經綸志四海齟齬不得申大裘縱千丈姑覆洛陽春載酒堂子雲草玄時載酒客常滿君今慕若人竹户誰來欵潄醉亭潭潭百尺井汲引鳴飛瀾驚囬午醉客一漱齒頰寒介庵一庵容宇宙介意安在哉珍重庵中人空洞無纎埃頓有亭君家十亭觀棊置宛相望是中冨墨妙偉哉蘇與黄亦愛亭扶踈䕃佳木五月風來徐淵眀方偃卧亦是愛吾廬永日亭長安貴冨人嵗月馬上遷岸巾怡永日心事獨翛然求定齋南華鑑止水烱然見湏眉夫子果能定物豈逃妍媸冷然齋虚室晝生白清風襲衣屨圓蒲燕坐人泠然欲仙去賦歸堂王郎英妙年功名固堪勉浩然賦歸歟持操真可羡送慈義偁師遊嵩少道人家住錦溪頭衣祴常含爽氣浮偶踏塵埃經北闕却尋雲水過西州冰銷隂壑蘭芽動栁岸長條春意柔少室峰前無異路莫將陳迹苦追求東坡先生挽詞造物周千載真材得䂊章經綸等伊吕辭學過班楊徳厚傾蠻貊名髙震虜羗數竒終不偶難與問蒼蒼博學無前古雄文冠兩京筆頭千字落詞力九河傾雅量同安石髙才類孔眀平生勲業志鬰鬰閟佳城少年持國論不羡洛陽人抗䟽忘機骩危言駭搢紳丹衷那有謂康濟在斯民竟謫江湖去端居寂寞濵𥘉復中原日人争拜馬蹄梅花辭庾嶺甘溜酌曹溪梁木傾何速椿年竟不齊靈輀向崧洛行路亦悽悽一時英俊附門墉兄弟從來號兩龍雄辯未饒端木賜題評肯下郭林宗精神烱烱風前鶴操節稜稜雪後松無復勝游參杖屨追雲弄月更雍容群驚投老竄炎荒瘴雨蠻煙豈易當燾氣内全真自葆鐵心無動亦何妨海山出處慿誰共蜑叟追隨樂未央凖易著書人不見微言分付有諸郎羽扇綸巾擁帥權髙才大纛拂雲煙𥘉聞父老誦嘉語綽有風流似昔賢施設宛如韓魏公折定武人謂公下車謫籍數年居瘴海功名無分勒燕然空餘雪浪齋中石留與邦人萬古傳當年吴㑹友名緇月辯才折大覺海盡是人天大導師技俗髙標元自悟妙眀真覺本何疑籃輿行處依然在蓮社風流固已襄它日西湖吊陳迹斷橋隄桞不勝悲橋皆公所剏折西涬新隄六徳政從來主意寛奮髯時怒豈容姧儻逢大事能談笑未必風流劣謝安峩冠正笏立談叢凛凛群驚國士風却戴葛巾從杖履直將和氣接兒童大河當日决澶淵横𬒳東徐正渺漫城上結廬親指顧敢將忠義折狂瀾文登五日召公歸海市竒觀與願違已蟄魚龍能再起人間異事古來稀西湖卷葑拓漪漣十里撗吞碧玉天自謂前身真白傳至今陳迹尚依然治湖葉隄爲政十六箇月公亦如之折公平生岀處多與樂天同樂天在杭臨淮大士夲無私應物長於險處施親護舟航渡南海知公盛徳未全衰一夕夢泗洲大聖來别云將送蘇某過海折鄒至完言在嶺外甞聞人傳慧州太守方儋耳至完始未信後遇方君問之信然折當去荅曰八日去矣後果如期公得命移畫圗雖不上凌煙道德芬芳滿世間遼鶴已歸東海去烈仙風骨若為攀孔子韶方平與其姪處度相訪於香山作此詩以贈之洙泗芬芳逺髙材尚可求二難俱韻勝小阮更風流語欵時容接詩豪未易酬平生喜人物邂逅此相投孔平子書閤所藏石菖蒲寒溪之濵沙石之竇産此靈苖蔚然而秀有羙君子採持而歸文石相并滀涵清漪根盤九節霜雪不槁置之幽齋永以為好送處度赴試異哉曲阜幾世孫白玉受性良且温詩書禮義祖家學擾擾自餘何足論良辰往往專吟諷逺壓曹劉攀屈宋肯與齊梁作後塵秋月春花恣嘲弄我方杖筞過西州指㸃雲山結勝游已有詔書催去興豈冝泉石更淹留征車曉送登長陌月沒參横河漢白期君安穏上龍門不怕臨流遭㸃額次韻李端叔題孔方平書齋壁萬事年來即罷休心縈雲水尚追求草堂早晚投君宿紙帳莆團不用収菊叢稍稍敷金蘂蕎麦芃芃放雪花榆桞繚墻蒼靄宻誰知中有隠人家白頭幕府尚﨑嶇南畒歸休盍早圗􅘷上山川要佳句安排風月待相如舍南舍北盡雲山此處躬耕有底難社飲雞豚好鄰里一盃相属百憂寛馬蹄逐逐走埃塵官府寜容自在身夜宿南溪孔居士青燈相對話悲辛愛君簷外蕭蕭竹翠幹扶踈一様齊莫道此君無俯仰驚風墜雪亦湏低端居終日少逢迎佳客時來一座傾不見諸郎事絃筦幽䆫唯有讀書聲肝膽未應分楚越髙曽元共水雲鄉避亂居錢塘折方平五丗祖愛君善作離騷語清警殊非俗肺腸仲尼道徳髙千古老子㣲言冠百家餘澤風流俱擅羙那云玉樹倚蒹葭吾黨從來跡易親只縁同是箇中人􅘷川魚鳥渾相識來往沙頭肯厭頻行歌亭孔寜極先生所居自古山林浪得名欲要人爵謾逃形唯餘􅘷上行歌者獨免移文勒户庭先生本自負經綸志在丘園世莫親不信請看門下客盡為金馬玉堂人王仲儀諸公皆禮敬甚厚折故相范忠宣韓待國滕達道甞聞箕潁卧巢由振蕩髙風冠九州欲識當年孔寜極依稀堪與若人儔􅘷川勝氣藹葱葱逺訪先生舊隱風閱禮敦詩見猶子故知餘澤未終窮次韻孔處度李榮期同㳺汝陽城西等慈寺溪堂汝陽介崧洛郡邑古且幽出郭纔數里招提據清流千章鬰古木中有百尺樓循梯到朱欄眼接萬象㳺二豪俱才華筆力勝九牛佳辰同覽眺髙懷肯悲秋軒渠發笑語遼亂驚鳬鷗平生讀書要取用不假鈎想當楥毫𥘉應手如見投挹子眀月光冷然洗吾侔次韻方平見寄黄花弄色近重陽山菓紅棃逈得霜節物撩人興不淺交情如子味何長終期霧豹栖嵓穴且作賔鴻寄野塘它日西湖能過我胡麻共飯煑芹香寄題南陽劉氏松堂南陽自古誇雄都山川淑氣無時無中間豪傑相間出卧龍光武興王圖有唐昌黎百世士布衣奮起為師儒風流異代骨雖朽餘澤尚可濡焦枯劉郎先子挺竒質志業文史稱郷閭詞場較蓺一不售掉頭便卜溪山居朋雲友月終嵗事挾冊教子猶區區青松寸根手自植氣槩今已凌凢株虬髯龍甲拂天籟䬃若風雨來江湖悲哉孝思論罔極新構永與甘棠俱西州騷人競與賦盛事相詫無賢愚續貂自昔人所誚詩成出䄂増躊躇同韓子蒼㳺黄山觀約髙壽朋張公碩不至駝裘躍馬去翩翩一舍逡廵箭脫弦仙事未湏窮傳記勝㳺聊為好山川寄林絡石驚寒瀏繚白縈青對篆煙惆悵能文二三子操觚安得共周旋子蒼見和二篇再用前韻酬之渉世伊余實強顔傷弓因翼尚驚弦論文已失李太白採藥行尋葛稚川請置黄公新石研岀研折此山歸磨潘子古松煙幽䆫冩就經綸志它日風雲去斡旋次韻王潜翁題王孝孫所藏摩詰聽松圗􅦿川竒處固難評眼裏瞳人要自眀落落信為霜後操蕭蕭那慮世間聲忘言我已輸三士妙曲渠寧羨九成此去黄塵沙漠底時時開匣覩余清塞上之行折時孝孫有㳺葉城韓氏東園曽臺累榭蔚相望古木連雲出繚墻可伹陶朱能計略湏知猗頓亦材良松風菊露滋清夜楚舞吴歌奉宴觴好在諸郎俱挾冊起家儒術未應忘過張公碩廷直息軒此軒實黃魯直名之折公碩乃張施州仲謀子涪翁六蓺學力可當萬人施州亦英特文武備一身風味真頡頏宛然喜相親詩壇甞屢戰妙譽傾縉紳涪翁往播遷風義頗凋淪施州奮不顧伏臘賙且勤霜雪槁群木凛然見松筠施州歸夜臺遺編照青春嗟我獨不識覽卷徒悲辛有子紹門户飄飄氣方振能文得父風作語殊不陳流源日䟽鑿豈易量涯津結廬依通衢隔墻閙蹄輪頽然小軒上息偃全天真男兒功名志蠖屈終一申誰能効急急俛仰車馬塵涪翁為子名髙意庶可循參寥子詩集巻第十一
