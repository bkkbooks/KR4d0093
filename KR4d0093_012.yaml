front:
  text: 參寥子詩集卷第十二
  hash: sha256:4b9fd5a8672832d3ca695191b688e616470dc7951420bf23e908a641fa9995eb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_012-1a}
body:
  text: 靜舍與蔡秀如承事㑹話浮雲無根蒂合散不可拘忽然隨髙風千里各須臾吾生共天壤出處良亦如憶昔淮水濵與君傾蓋初翹翹兩弟昆文彩照冰壷門䦨夲世胄折節勝寒儒扁舟倚髙岸為我飯伊蒲清談落犀麈鄙吝驚掃除一别今四載相忘寄江湖朅來過汝頴吊舊投生芻夤緣訪山水嵗晚倦回車蕭蕭古寺底倣佛日已晡聞君户外音倒屣迎前趨胡為乎來哉吏牒頗馳驅髙材困所役何似林間樗清寒凛敗屋猛焰焚枯株胡床坐相對氣貌溫以舒眀朝各異縣那得同蘧廬無煩歎離索且盡一笑娛贈耿純叔祕校二令姪髙門知積慶堂上有諸郎禮樂非童子詩書見義方經營羞弱羽騰踏羡飛黃富貴由勤苦五車安可忘讀子蒼詩卷二首蜀國竒男子能文到古人淳源稽大雅妙曲和陽春節物驚搖落僧坊斷四鄰看君新著述時與短檠親大冊雄文未許窺百篇先讀海陵詩疲駑伏櫪空驤首飛兔流星作麼追贈賢上人恆山道人棄妻孥壞衣祝髮從浮圗愛纒欲網豈易脫慧劒劃斷真須臾飄然雲水出鄉國力學生死來東都心猿意馬就羈束肯逐萬境爭馳驅回看舊事真一夢清渭濁涇良自殊楚山嵗晚俄邂逅雪屋對語依圎莆勸子南遊下吳越小航短棹尋西湖我家住處湖岸北如椽翠竹森千株竹間扣扉試訪我定有猿鶴聲相呼次韻髙壽朋殿直喜雪俄頃風雲變物華撒鹽飛絮鬪輕花只應陋巷無貧者玉户瑶階共一家挾風穿箔打窗紗窗裏人看窗外花噴玉流珠君豈羡從來自是五侯家仁曾孫折壽朋乃宣書申正已秀才所藏雀竹圗後荒園古塹雪溟濛細竹枯條共一叢寒雀喧飢正無賴輸他孔翠食樊籠樊籠得食暫時優身世經年類楚囚何似東阡與南陌暖風晴日恣遨逰過韓氏莊登小閣繚墻千堵氣雄深小搆亭亭出數尋刈穫一空雲水白䦨干注目見遙岑玉秀蘭芬好弟昆時來挾冊視田園囷場古木千章合倣佛秦人避世村鄭元規秀才內樂庵陳叔易命名內樂名庵誰所擇澗上文人題榜額想見風流庵內人定匪紛華域中客紆朱懷金何足誇簞食瓢飲真生涯了無憂患到心境得失雞蟲良可嗟李榮期秀才𣏌菊軒草木助盤餐紛紛固多品精英唯竹萌香軟獨楮菌𣏌菊於其間甘清有餘韻達人忘口體道德自滋潤天隨與東坡風味實相近窮通均一致了不見喜愠春苗共採擷秋英配蘭紉後先屬文詞金聲而玉振李子妙窮經屢遭有司擯奔軍未云怯再舉當决陳開軒植𣏌菊淡泊守定分回頭語世俗未用誚飢困二豪勉躋攀孔聖故許進長卿亦何人區區能慕藺寄潘仲升秀才漢唐誇汝南豪傑不勝數山川有靈蓄鬱鬱久不吐邇來見潘子秀色實眉宇是家賢伯仲學術夲鄒魯他時俱特立肯與噲等伍浪為葉城遊邂逅得晤語異鄉逢嵗晏越鳥思南舉江湖結後期細與論今古次韻方平送李南仲赴試春闈四溟鳬鴈集天池十目先看俊翮飛養氣有餘吞大敵窮經無繆識玄微塵埃舊服辭阿緆雨露新𫀆授楚衣拜命還家春尚好桃花流水漲漁磯劉福老長官佚老堂淵明未掛冠志已蹈方外何時辭五斗散髮從傲睨間中氣味好至樂無與對黃香識君心機事勸早計古來軒冕事端受外物制有如纒蔓瓜詎肯脫根葉一朝秋風至零落驚潰潰佚老得天和晚景期百嵗超然閭里間髙風邈難繼贈權上人兼簡其見髙致虛秀才豫章山川足靈氣天與四時滋萬彚翹然雙幹秀一門儒釋殊科道無異一操經術游廣文一事瓶盂尋祖意功名生死兩俱徹論報君親各無愧上人餘力擅風騷三昧何妨間逰戲窮愁肯學郊與島髙贍已能追晉魏文章妙處均製饌不放醎酸傷至味少陵彭澤造其真運斤成風有餘地眉陽老人文所宗此語得之吾敢祕期君向上踏玄關奔逸絶塵那可跂孫傳師密學挽辭淮海衣冠盛門䦨占一時朝廷矜棣蕚人物得熊羆暫倚軒裳貴還隨舟壑移新阡埋玉樹黃霧慘餘悲玉畿𥘉作邑終日坐鳴絃雅量能知變平戎在未然𥙿陵俄識拔鵬路遽騰騫二十年間事凄凉付逝川逸氣凌嵩華髙標藹搢紳經綸真漢將談笑郤胡塵白首遭微譴青雲阻要津功名關造物一語未能陳伯仲持哀日余方傾蓋𥘉炷香翻貝葉酌茗飯園𬞞一作䢴溝别空傳桂嶺書升堂揖遺像回首意何如孫志甫主簿挽詞彼美荆岑玉斯人實可儔眉間見和氣皮裏識陽秋夫子常稱德蓬山素並遊一官雖不夀撫已亦何羞梅子明學士之友折君乃莘老龍圖之弟䔍學誰如子窮經志亦勤干將曽未試寶氣已沈淪天逺終難問眉酸謾自顰佇瞻蘭玉秀裒及墓中身次韻張敏叔工部題郭殿直逺趣軒髙棟曽軒何用為此軒須小景無遺惜當麥壠堆青日不見波濤卷雪時眼底衣冠多邂逅胸中貴賤少參差人倫折郭君善問君卜築隋隄上幾見春光上桞絲䝉泉堂百尺蒼崖底䝉泉自我名滀涵滋造化汲引絶虧盈碧甃深仍固朱欄小易成殷勤中夜月長與照澄眀八月十七夜夢中作夜半秋江不見人翠荷擎出露華新江神水仙來共飲一掬遺我生精神哭休上人從來疑造物無處識其真好月難終夕名花不盡春青燈空照白折室㲲謾遺巾泣血憐慈母悲酸動四鄰邃隱堂雅構何幽眇真冝邃隱名朝雲半峰秀夜月一簾明終嵗塵痕少無時爽氣清炷香翻貝葉安穩老餘生寧川西寺水閣呈周格非承議岧嶤畫棟與雲平一派寒流玉鏡清三島勝形方足擬千鈞筆力始能名鷗翻翠靄光中去山倚朱欄靜處橫令尹政間勤把酒風流未減謝宣城僧首然師院北軒觀牡丹鳥聲鳴春春漸融千花萬草爭春工紛紛桃李自撩亂牡丹得體能從容雕欄玉砌升曉日輕薄煙霧初冥䝉深紅淺紫忽爛熳如以蜀錦羅庭中姚黃貴極未易覩緑葉遮護藏深叢露華膏沐披正色肯事夭冶分纎穠從來品目壓天下百卉羞澀莫敢同清淨老禪根道妙即此幻色談真空上人封植匪玩好庶敬先烈存遺風遨芳公子應未耳且樂樽俎怡歌鍾用法頴韻寄信上人懷素髙間世罕追君今端與若人期龍蛇落紙驚飛電心手相忘豈所思驥子神駒天與俊朝燕暮越足難羈超然遽作雙溪别肯學紛紛兒女悲昌化雙溪堂呈府簽判德茂宣德吳㑹溪山揔可憐此堂雄覽獨能全銀河兩派來天上黛色千峰落檻前樵斧聲沉蒼靄裏釣竿人立白鷗邉多才李賀知無敵妙句行看陋衆妍用法頴韻寄詵上人吾生出處異周顒猿鶴休驚蕙帳空木筍薦盤非世味胡麻供飯古人風時翻貝葉千行偈戰勝詩魔五字功杖屨儻來償素約與君同盡此生中山中書事身世從來薄所營晚歸丘壑更忘情隨眠煩惱何曽有無樹菩提本不生布襪青鞋供我老月溪沙路恣經行細炊雲子齊㕑飯要配香芹碧澗羮次韻孔天瑞秀才見寄雙溪秋色最關情想見登臨爽氣生木落草枯山自瘦潦收沙白水偏明眼中舊事煙雲散篋裏新書早晚成來嵗如今好時節看君髙步躡鵬程聽天竺慧照師琴太古淳音久已虧多君妙指善醫治髙山流水意雖在白雪陽春和者誰不放驚飈侵澗户只容明月侍簾帷滿堂賔客俱傾耳共失芙蓉漏轉時寄伯言明發御城東畔聽鳴珂公子當年為我過論議凛然無兩可文章妙絶具三多情親意合方傾倒雲散風流欲奈何儻附南鴻寄消息吾今蹤跡閟嵓阿過玉師室觀霅川范生梅花桃李韻粗俗江梅清獨妍幽姿有時覩如揖姑射仙從來丹青手默數三四賢徐熙擅江左趙子名西川中間復誰何絶特推老邉風流逮兹泯范子俄超然乃知苕霅勝秀氣常回旋斯人非畫師勢利不可鐫興來即揮毫遊戲三昧前一枝豈易得答子能拳拳橫斜有餘態肌粉含霏煙我來玩几席歎賞徒留連恨無處士詩二妙相並傳處順齊生前不用驚毀譽身後何須千載名處順安時真曠達本無哀樂動幽情贈聖可證師吾道日凋喪末流殊可嗟師門互開闢學者如泥沙欲求超然姿駑廄搜渥窪子𥘉為兒童岐嶷衆所誇長能遊學海宛轉窮津涯誰知蓬蒿底忽覩挺生麻向來挈瓶盂同我捿煙霞朝昏事禪恱神觀靜不譁子今未三十涵養滋根芽行看覺苑中綽現優曇花次韻通守楊叔豐大夫遊狼山朱轓千騎擁郊埛政暇尋山固有名眼接青蒼心已喜身經曠野路尤平潮吞浦溆渾如海蜃吐煙雲謾作城欲訪真仙迷紫府空端依約步虛聲吳楚封疆一望間時平無事可相關樂天標致元非俗靈運襟懷本愛山蠟屐斜穿橫嶺上角巾相對野僧間扁舟却恨南來晚勝事風流不預攀過都監趙思正崇班容膝庵公子居間厭華屋一官江海辭羇束端能有志學淵眀數板垣墻營小築榜名容膝雅所冝寄傲南窗聊自足祖宗承平逾百年胄緒蕃衍如雲煙敦詩閲禮不勝數人物似君尤卓然論文講藝未易料虛己下士常折旋憶昔初逢大梁下風味向人如倒蔗若遭猿鶴促還山回首相望驚百舍誰言江路渺雲濤一舸春風重命駕酬王衮臣朝奉見贈吾聞終南山鬱茀參斗牛其下多賢豪學術貫九流公生實異禀氣奪河漢秋妙齡升廣文岐嶷壓上遊登科三十年仕䆠真悠悠功名信有命冨貴豈力求邇來居海上未解鍾儀囚髙懷素聞道對客忘咿嚘相歡固傾倒不可即掉頭今我來自東邂逅欣綢繆新詩激謬懦詞力徑且遒恍如開武庫左右森戈矛便當偃旗鼓罷戰為良謀與公從逍遙放浪追子休觀宗室伯山司户詩卷參軍暫輟簿書忙為我聊開古錦囊玉骨已能含秀氣珠璣那解不輝光王孫挾策真難事妙質如君豈易量它日酬書天祿閣聲名端可繼劉郎次韻思正雨中偶興招提岑寂古城隈海雨江風日日來但覺園林芳意盡不知紅紫為誰開花飛南陌渾空栁緑染中庭半是苔有客衝泥能過我筍輿駝褐夜深回酬趙存道都曹見贈騷人久無聞風雅日浸衰汀洲空蘭芷憔悴無芳姿參軍妙述作鮑謝相並馳明珠不自耀光彩閟陸離聊因五斗粟暫寄東海湄官身雖簿領遊刃能一麾寥寥古寺空轉砌春日遲閉關時却掃寂寂下書帷唐虞悉觀覽百氏了不遺論文慎許可紀律嚴自持昨朝發新詠落語皆瑰竒世無楊德祖詎識黃絹詞次韻思正遊南寺賞牡丹叢芳依小院妙色發纎穠綽約冝朝露溫柔怯午風興隨歡宴盡事逐斷雲空應待酴醿放招携更與同贈思正令子堪愛君家小鳯雛炯然眉目照氷壷他年足逸詩書圃翰墨場中千里駒思正挈家遊張氏園有詩俾余次韻邦人莫訝氣如虹生長皇家冨貴叢陶寫華折年樽爼外吟哦風物笑談中伶倫奏曲千般巧錦綵纒頭一樣紅琴瑟獻酬還可樂牽衣兒女復相同維陽秋日西郊雨洗髙梧爽氣浮鳴蟬相喚作新秋翻空白鳥一行去目送岡巒欲盡頭瓜花零落豆花繁秋入隋家舊苑看水調遺音今寂寞空餘壞道㵼哀湍潦水初收古澗清小橋斜倚數魚行神林社日傳簫鼓秋稼如雲嵗有成枯榆偃蹇若蒼龍影占荒郊半畒宫下有牧羊雙稚子卧吹蘆管對西風參寥子詩集卷第十二
