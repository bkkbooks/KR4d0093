front:
  text: 參寥子詩集卷第七
  hash: sha256:e7223699548d9c21536dd9e81947779ee7484dccf95c97ef5bf62f08ae8c27ef
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_007-1a}
body:
  text: 别蘇翰林四海窺人物其誰似我公論交容末契許國見深衷漸逺吴天月行披禁殿風玉堂清夜夢解后過江東送景文交㳺盡四海厚我乃無幾劉侯軀七尺堂堂信英偉中剛冷如鐵萬事肯料理相逢傾蓋餘眷眷極終始東南久徹警將領用儒士三年湖上游屬得陪屐齒長謡傲雲壑草木俱披靡詞鋒剉萬象搜索泣山鬼珠璣溢錦嚢所得真冨矣軒冕本儻來功名徒爾耳一㕓聞已卜視此猶脫屣嵗晚匡廬山髙捿踵前䡄贈太守林子中待制拭目除書下九天邦人争賀使君賢風流謝守宣城日愷悌龔公渤海年終作塩梅均鼎鼐且慿觴豆樂山川一門棣蕚登臺省盛事駸駸海内傳照閣奉陪辯才老師夜坐懐少㳺學士猿鳥投林已寂然芭蕉過雨小樓前雲依絶壁中間破月自遥峰缺處圎照坐不須紅蠟炬可人唯有蕙爐煙校酬御府圖書客疇昔還同此夜禪贈天竺聦道人完完明月珠蓄彼萬丈淵徑寸不可覩餘輝媚清川道人實有道膠口黙不傳心閑氣自和眉宇常藹然邦人昔致師欲以居法筵文移動帥府禮數端亦䖍冥鴻避網羅矯翼從髙騫朅來靈山隅圎蒲味深禪盛德不自顯與物同周旋兒曹恃文采毫末爭醜妍相逢廣坐間肯顧斯人賢茫茫大化中浮名暫腥膻吾知道人意反汝生哀憐送僧遊天台海邉孤起碧千尋俯仰應酬壯觀心峭壁断崖當嵗晏冷雲踈雪上衣襟論懐此日能傾倒尺素它時嗣好音摘勝窮幽吾老矣杖藜無復伴登臨覽黄子理詩卷六載南官何所營百篇翻覆見髙情霜鷗露鵠元非俗雪竹風松本自清俊逸固冝凌鮑照優㳺真已逼淵眀㣲言㑹有知君者謾擬鍾嶸試一評梅花寄汝隂蘇太守湖山揺落嵗方悲又見梅花破玉蕤一樹輕眀侵曉岸數枝清瘦耿踈籬良辰易失空回首習氣難忘尚有詩所向皆公舊題墨肯辜魚鳥却來期次韻陳敏善秀才見過投老形骸真木偶水飲嵓栖聊自守世事浮雲日變遷我亦何心預臧否故人新自廣陵來問我詩嚢近何有吾言淡薄非橄㰖縱可咀嚼聊能久且開䆫户話平生湖色山光翠相糾烘簷暖日氣味好相對蒲圑復支肘愛君年少擅才華詩律清妍無可醜却愁征棹促君還空聽陽關詞一首都僧正慈化大師挽詞領䄂吾家事由來二十春虚懐能應物真氣肯隨人逝水流方逺臨池墨尚新聲聞䨇樹子不見葉間身漢木贈蘇翰林蘇反以折育王山大覺襌師以羅師甞指此語余曰吾不復見此羅漢之生也故及之折贈師凢植凢二十年葉間生青如比丘形謂之羅漢木平生輕長物身世等鴻毛譽出東南早人驚節義高玩竒唯水石結客盡英豪來往元無迹情鍾謾鬱陶伏枕時無幾臨分若故常寸心能烱烱去路豈茫茫車馬門猶盛芝蘭室更香獨餘庭下竹冷韻起悲凉次韻吴承老推官觀開西湖偉人謀議不求多事定紛紛自唯阿盡放龜魚還渌净肯容蕭葦障前坡一朝美事誰能紀百尺蒼崖尚可磨天上列星當亦喜月眀時下浴晴波出教中折列星事都僧正既闕子中待制欲余𥙷其位輒辭以小詩遂獲免佩德懐恩豈易陳自嗟麋鹿性難馴流年日月無多子乞取山林放曠身送子中待制翹翹孤鳯凰安巢本阿閣偶來依澤國歸興遂淹泊江山廹嵗華草木正揺落霜空肅萬里纎翳無處著翻然整羽儀一舉在寥廓南山有佳木秀色何葳蕤封植不記年落落今百圍盤根雖自固烈風無時吹匠手營大厦衆材得施為偉哉梁棟姿取用不可遲平生長樂公聲華越三紀文章兩京齊學術㳺夏比螭頭足未安符竹已屢徙聮翩開幕府爛熳樹桃李鋒車入帝鄉天馬行九軌周旋有程度駑駕安足擬曉發苕溪将次徑山呈通判廖明略學士明星耿耿出天東結束籃輿伴公折我藹藹梅香侵曉陌斑斑旗脚轉春風勝㳺此日塵埃外回首它年夢寐中絶景小詩難壯觀當看醉筆吐長虹次韻王行甫奉議湖上晚歸遇雨妙齡公子嗜遨嬉永日湖山未肯歸酒幟曉人應慣識花枝拂帽不湏揮輕紈細綺來何處青蓋朱輪去似飛向晚薄雷催急雨清寒無柰襲裳衣同曽仲錫通判游天竺諸山煌煌世胄餘夫子非碌碌由腹有詩書所以能㧞俗得官夲河朔瓜期未云促扁舟下東南逸興追鴻鵠遇勝即徜徉風飡兼露宿嗟余偶傾蓋一笑外覉束杖筞每過從相携訪山谷春風披鮮榮繡錯出林麓松門有時盡幽興無断續崖轉聞鍾聲林踈見華屋銜山餘落景歸路猶躑躅誰云鄴下歡往事不可復吾曹二三子所樂亦云足願公紀新詩一一能見録舡頭行北歸嚢篋有美玉塵埃京洛人示與洗心目次韻劉韋孟主簿湖上劉郎詞筆過蘭成詠遍湖山草木情禄隠太平真樂事莫思神武挂冠纓中流出沒一舟虚緩檝長謡彼自如聞說古來江海上達人多半寄樵漁老葑如雲既卷除風瀾百頃翠紆餘竒探險取各争賦誰復能名造物𥘉逰苕溪道場山東風吹雨過城闉日照河隄桞映津兩槳差差揺燕尾千山漠漠散魚鱗長縁絶境關幽夢尚喜兹㳺及暮春蘭蕙未衰桃李在蜂喧鳥咽莫愁人夏夜松室開孤定褰幃納夜涼嬋姢依翠竹無語過東墻送蘭花與毛正仲運使幽姿冷艶匪夭嬈曽伴靈均賦楚騷今日移根庭下植可無佳句與揮毫從來託迹喜深林顯晦那求世所聞偶至華堂奉君子不隨桃李闘氤氲夏日竹閣沈水擢煙青繚繞風篁傳韻冷蕭騷楚山竹簟琉璃滑卧看炎雲檻外髙送李仲益赴襄陽幕襄陽古名都雄觀壓荆楚醉公誇文詞風物粲可數嗟余未歷覽彷彿已如覩人生㳺宦間得此亦佳遇李俊妙天姿文行兩自負少年志冥鴻千里輕一舉天風不借便造物暫淹阻既無負郭田黽勉依幕府賢哉彼方伯脫略髙韻度寜俾簿書役朱墨事朝暮爽氣對西山清談共樽爼試問鹿門翁遺蹤今在否訪勤上人断橋蒼壁倚溪斜赤葉楓林噪晚鴉可怕嶺雲埋徑路㑹尋流水到君家荅柯山曉上人風騷古人事而我豈所長兒曹嗜章句餘習未易忘根源本無有真若夏潦潢道人氣拔俗吾黨稱俊良十年依叢林實以道自将禪餘喜賦詠妙語逾珪璋世眼獨未識深叢閟孤芳鋒錐必頴脫安肯久處嚢子冝力自勉聲問終揚揚吾言豈知子老大殊荒唐送俞伯謨宣徳赴辟成都我生落拓如虚舟萬里江湖隨演漾君今禄仕亦我同南北悠悠無定向故郷回首海東頭兄弟十年官塞上才髙質羙衆所竒𣏌梓豫章非冗長辟書交飛上廟堂肯使湏臾事閑曠秦山峥嶸塹戎虜自古征人愁悵望劒門棧閣天下危去馬來車魂欲喪羡君年少勇攀躋足躡青冥身益壯舊游陳迹想依然感物懐親情獨愴嘗為成都漕折伯謨先公待制次韻文饒同自龍井出資國度泛舟以歸北山踞虎奔犀列萬形竒觀直已過南屏縈雲細路杳無盡落石飛泉静有聲十里平湖𥘉卷葑一天秋色共揚舲停橈共過孤山寺寂寂林僧半掩扃陪司馬才仲節推諸君㳺天竺得青字西郊久不雨草木無餘青薄雲弄秋暉山色時晦冥超然五詞客文采披華星聮翩過吾廬車蓋紛滿庭相携訪靈鷲細路通嵓扃攀翻幽桂叢衣襟襲芳馨絶境異人世吾詩豈能名諸豪追鄴下妙語逾瓊英願言一揮冩樂事良難并髙空墮海日歸驂尚能停呈丞相章公時提舉洞霄大滌仙翁謝往還蕭然几席奉清閑胷中舊已吞雲夢人望從來重泰山書到鍾王方絶學文非典誥不湏攀名言一一皆公語它日親聞廣坐間過定林謁荆公畫像古木蒼藤一徑纒我公疇昔屢回旋蕭蕭屋底瞻遺像傑氣英姿尚􅏮然壁間千字走龍蛇好事何人護絳紗一讀已能生感慨暮簷蕭瑟更啼鴉次韻曽子開侍郎話别二紀浮㳺踏世塵賢愚了了見情真行藏不昩如公少細聽名言實可人抗論儀曹肯折旋一麾江海去飄然他時開府餘杭郡來酌吾廬石縫泉書夢寄妙懿妙思堂深路屈盤夜來魂夣忽躋攀道人開户相迎處宛在脩篁翠霧間觀恭師詩書以二絶勉之吾郷英秀頗能文子復區區慕碧雲請用三多為祖式他時自與古人群論書當亦似論兵軍律非嚴事不成行伍㑹湏同比櫛出竒方可語縱横過鍾山尋俞清老不遇霜風薄木韻含悲嵗晚尋君失後期夜鶴曉猿驚怨歇草堂人去已多時次韻劉伯昌長官見贈劉侯詩格殆天全𥘉得西湖紀勝篇錦繡為腸供麗藻鯨鯢作氣吸長川静依北牖開樽爼醉掃寒梢雜雨煙嵗晚扁舟東去急喜君髙調重遷延次韻法真禪師送曽敬之宣德昆仲昔與乃翁相遇年始知有子生且賢尔來䨇榦已争秀屹屹欲上參髙天昨朝較蓺偶不售他日奏賦聞甘泉方今廟堂喜人物収拾萬彚歸陶甄褭蹄麟趾終一出輝映左右無餘妍肯學孟生誇得意一日走遍春風前嗟余投老隠嵓谷形若槁木心灰然扁舟追子僅千里彷彿夜夢遥相傳西湖風物行嵗晏歸賦梅花趂臈先送文惠師還金華脫略紛華自妙年秉心端喜事金僊終期象馭超三界不羨鵬程越九天考䟽窮經心尚壯依仁據德節尤堅秋風陡起庭闈念聊寄脩江一葉舡證師聖可桐虚齋吾聞嶧山桐猗猗排秀榦栖鸞宿鳯信所竒衆木紛紛何足筭嗚呼天相彼質復虚彼心故其聲之隱也無閡其動也無留有叩而鳴體佚而休嘉上人之妙齡兮無適俗之卑韻剛有儗於斯桐兮廓中虚以受訓異速成之朝榮兮培益厚而日敏悼像末之寥寥兮蹇我道之不振續芳塵於祖席兮他日非桐虚上入者而復誰何哉䂓師方外停雲齋上人少脫略出處非拘囚停雲倚空端舒卷良自由縱之千丈強歛附拳石幽超遥宇宙間孰與斯人儔銘詩善摹冩居士亦風流士居士即周元翁也折揭榜作銘皆濂溪居卜居智果方外以詩見寄次韻奉酬偶來湖上緝衡門桐長脩柯竹有孫引䇿每從佳處去望雲橋下是西村青燈殘篆夜寥寥門外秋風振葦蕭慚愧髙人能見憶為余西望立溪橋次韻周開祖大夫泛湖見訪漾漾清漪十里間畫舡人似鏡中安雨催菡蓞幽香發風觸莆萄細浪寒髙岸烏紗來静院倒揮白羽傍曾欄吟毫所遇無遺景天乞詞源比海寛參寥子詩集卷第七
