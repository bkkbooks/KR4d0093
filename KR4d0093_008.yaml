front:
  text: 參寥子詩集卷第八
  hash: sha256:4aa7096e123b2c0d5fd4533b92634d4de43ec017b798fc1d8ccb27ac41ba5e3f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_008-1a}
body:
  text: 次韻才仲試院夢中夢事見寄夢入秋山知幾層霜風吹骨正稜稜蒼崖犖硧難安足自説從余授杖藤事見才仲敘中朱甍碧瓦礙雲浮共躡層梯最上頭一餉闌干變風雨凛然毛髮便驚秋怪獸胡為出巨津昻然激水忽翻身魚龍贔屭何妨事莫作風波謾恐人一川修竹映踈花川上時聞響釣車似到秦人種桃處誰知夢斷却還家崖根烏蜜已先嘗從此知君鬢不霜應笑吾曺事枯稿山中危坐獨休糧贈吳子野先生麻田老仙心炯炯少有髙風慕箕潁枕流漱石三十年眸子瞭焉神更靜忽然杖策海上來至人道妙同塵埃達官貴侯競招致往無所欲誰嫌猜邇來一志從吾黨迹與孤雲共天壤曹溪有路更攀躋徑躡毗盧髙頂上見東坡詩中折子野將出家事送庠上人點撿行裝拂與巾灑然輕别故山春家家門底長安道舉目何須更問津次韻才仲山行幕府文書一掃空何妨行樂醉春風想聞笑語千山外正在煙雲萬疊中哢日鳥聲喧細碎照溪花影靜玲瓏苦吟只恐凋肝腎夫子還冝少黜聰與神智師話别昔我年始壯託身靈鷲峰主人大導師鼓舞揚真風四方依絳帳雜遝象與龍嗟余於此時已識大士蹤紛紛論議場頭角出群雄如何三十載慧刃藏其鋒端居肄業地了不為世通邇獨念西湖聿來將誰從情隨山水逺興與魚鳥同平生方外姿自在如冥鴻明朝復回首飄灑一孤篷暉暉堂堂上何為絶點埃堂前翠帚掃空階遙憐薄日暉暉靜影入髙人燕坐懷次韻嵩陽陳叔易先生見訪知君挾册未嘗間一志端能事孔顔千里扁舟下吳會眼中收拾只溪山枯稿長專一壑間權豪殊未少低顔風雲他日超騰去莫畏移文到北山曉霽雲擁茅簷水拍渠曉來新雨過吾廬蔫紅宿蕚莓苔滿解事長揚自掃除次韻龔堯佐帳勾晨起感懷造物紛紛自變更達人何用較前程芭蕉身世榮枯久胡蝶夢魂來往輕隔屋想驚銅漏盡開扉猶愛玉繩橫應嫌百吏鳬行進簿領文書與案平逺齋為玉上人作君不見崑崙之河與天通源深發逺人莫窮回溪轉壑隨折衝末勢演溢流于東東溟無旁下無底浩蕩足以家魚龍嗟哉吾徒雖好學詎肯著意推所從淵停冨滀有若是孰謂世上無豪雄法師名齋意且逺張皇幽眇見爾聰西來竺書五千軸期子嵗月如磨礱離騷楚詞亦謾讀言語黼黻何必工禪餘習氣如未盡時倚澗石吟松風懷仙閣瀛州仙人騎皓鶴珮玉鳴風度寥廓錦溪南望九仙岑笑指煙霞憩層閣閣中清絶無纎塵銅爐著香夜夢真平明跨鶴出山去澗草嵓花空自春山僧問我入何地今作玉皇香案吏挾持造化幾時還搔首臨風聊一喟華亭道中白水茫茫天四空黃昏小雨濕春風五更百舌催殘夢月到官河桞影中同周元翁著作范眀逺祕校西湖夜泛各賦一首薄雲踈雨作還休白帝撩人巧變秋天地此身均逆旅江湖幾番共離憂暮聲斷續鐘連磬夜氣浮沈浦與洲圓嶠方壷吾未羡敢煩騷客為冥搜和元翁髙論每逢賢友生還如講武得竒兵了無鄙吝胸中物尚有風流世外情破海玉蟾初未躍灑空珠露已先傾回橈轉柂行三鼓始見波瀾百頃明和明逺二客風神瑩石泉解衣同緩夜歸船已殘巾子峰頭日猶認吾廬竹外煙水怪有名殊未見犀燈無事不須然月明幽渚蒹葭靜珍重沙禽穩睡眠次韻月上人秋夜見寄冥鴻振鷺想儀形數日新秋入夢清丹壑流泉依舊否碧嵓藂桂幾時生風來玉户涼𥘉集露泫銀河色漸清僶俯酬君無妙語夜光魚目愧相并送逺上人還金華千脫葉送殘秋一舸南歸興莫留冨渚江平非白馬子陵灘穩異黃牛吟懷覽勝冝無倦才力如君豈易求他日殷勤為細字盡傳佳句到東州與愚上人宿天竺夕陽山氣藹蔥蔥路轉松隂復幾重行過石橋人未見數聲先聽寺樓鍾稽留峰北好林泉珍重幽棲得所便柏子煙中能宴坐想無餘習可攀緣霜壓簾櫳露泫條銀河影轉斗垂杓清言共失三更夢錯恨芙蓉漏易消晨起猿鶴驚呼曉樓鐘動翠微楓林墮清月踈影亂人衣喜不群不疑見訪鵲啅庭梧喜滿懷懸知二子下崔嵬山中爽氣知多少半逐風流杖屨來送桐江明上人之都下窈窕孤雲下翠岑帝鄉間去夲無心紅塵滿眼急回首莫遣空山鶴怨深送定上人還會稽西風警群木蕭瑟散秋聲病客有歸思孤雲無戀情月當千里共人恨四難并苦學誰如子它年在一鳴次韻劉蔡仲秀才雪後登竹閣檻前君子舊虛心雪後相看意更深晴日暖風催語鳥翠梢髙處囀柔音君看楚嶠聳巑岏圭壁千層間翠嵐山後一峰尤秀拔依稀還落剡溪南次韻黃仲閔主簿見訪遊寶雲諸寺吾廬附曽阿松竹蔚行路平生土木軀羞為折腰具蓼蟲甘苦澀雖死那求遇黃香諸父賢傾蓋如有素相將山水行所適得佳趣觀臺深且靚縞壁懸清句雲巢倚空端下覽冝細顧樓臺霽雪𥘉碧瓦塵未涴籃輿指頽景長挹還辭去恍如山隂集俯仰已成故重來竟何時相望碧雲暮蘇世美夫人挽辭夫子剛中早數竒閨門髙節聳當時淵眀晚欲歸三徑德曜能從賦五噫不見萊衣華髮事空驚薤露昔人悲故知造物酬隂施玉立諸郎冨白眉重居夜坐懷蘇伯達昆仲狂風吹林聲怒號隔垣洶洶如秋濤夜闌稍覺群動息星斗挂簷霜月髙東鄰書生勤且勞粲然文采真鳯毛想遙下帷應未寢短檠相對課離騷慕容居士雙柟軒陽羡溪山名浙右氤氲淑氣無時有遂令比屋慕絃歌甲第殊科爭捷手先生讀書三十年數竒不偶真可憐閉門陋巷聊自隱簞瓢屢空心晏然南軒前頭兩佳木先生撫玩長不足尤愛薰風五月𥘉白銀開花光照屋故人解后相逢遇指點婆娑索新句君不見少陵杜叟有長吟莫作凡材等間賦次韻蘇端定武雪浪齋孔眀氣宇白玉溫忠義勇決踰王尊葛巾羽扇傳號令塞垣徹警無塵昏良辰往往挾將佐射雕走馬循煙村歸來飲酒坐堂上賔從如雲填戟門一朝郡圃得竒石雪浪觸眼驚神魂旁求蒼珉琢巨斛偃然卧土知無根三牛曳歸置階圯錯磨不許留纎䀶興來作詩寄臺閣雄詞妙筆爭考論將軍今謫窮海外會見曦娥窺覆盆殷勤寄語朔方客佳致勿毁冝長存無為堂無為豈不動無念非刳心至人均道妙與物相浮沉青銅一寸眀萬象了自分何須苦機械擾擾亂沖襟晴窗馥煙篆衣祴蒙餘薰超然曠士懷所得踰古今示法頴兒曹汝既識薰蕕卓犖應須力自修一志徑從齊客語萬端無受楚人咻卑飛燕雀冝深逺髙舉鸞凰可並遊莫負謫仙當日語十年名譽滿東州清聚軒之子吟懷欲稱情故穿幽沼滀清泠儻逢來客議深淺但道淵源通北溟次韻曉師見别欲遊京洛春波漲南浦霽色媚澄鮮扁舟駕兩槳行矣子所便岸花開迤邐紅紫交相妍詩情發浩蕩輸㵼萬壑淵清新逼庾信雅健追樊川相儔得鴻鵠翔集固超然衣祴暫塵土它時洗雲泉幽姿復炯炯不羡玉池蓮遊徑山懷司馬才仲柔桑蔽野麥𥘉齊布穀催耕雨一犂略彴時橫溪上下薔薇間發水東西重尋勝處追前賞無復斯人手共携回首春風增感槩綿綿黃鳥更悲啼雲巢環湖相望百招提髙棟曽軒亦屢躋未若道人基􅌟勝闌干清與白雲齊九江秀色可攬結謫仙愛彼巢雲松寂寞風流三百載此軒竒觀躡前蹤碧瓦朱甍冠翠微鬱蔥佳氣繚窗扉人間塵土紛阡陌不到藜床燕坐衣清明日湖上呈秦少章主簿水邉花霧曉氤氲春入西湖兩岸深冶葉倡條他自媚朽株枯木我何心鞦韆索轉朱樓角博塞聲喧碧桞隂年少故人方感概未應從俗強浮沉喪耦折時少章送誠無上人還洞山文禪師席下上人妙齒遺樊籠嗜好豈與稠人同嵓捿水飲有餘𥙿期以至道超鴻蒙少林人亡僅千載末路鼓舞誰為雄江西老褐真望士蟻趨雲合爭所從羡君伏役事且久誠專志苦迷春冬心珠磨錯稍精瑩倣佛水月含沖融去嵗扁舟下吳會溪山勝踐情所鍾芒鞋竹杖霜露入始知節物徂秋風朝來興盡挽不住翻然又逐南征鴻它年相逢定廬嶽與子終老巢雲松燕默堂萬彚乾坤裏誰何識道真喧卑憎末俗燕默羡髙人漏轉芙蓉永香銷柏子頻他年揮玉麈堂上挹芳塵送嚴上人還永嘉道人出處孤鴻儔詎肯低回受羇絆飄風轉日歷九州不羡騎鯨遊汗漫我生與君幾相逢窮幽摘勝時乃同胸中妙道未容扣又引髙興辭秋風君家住在孤嶼側此别何時見顔色欲識相思一寸心冷月依依挂空碧吳門獄中懷北山舊隱江湖堂北是吾廬繚繞杉篁蔚有餘欲問山中近消息鱗鴻不寄獄中書誅茒投老卜栖遲雲雨相翻豈易知夜鶴曉猿休悵望回車復路可無時數畒檀欒古道邉亭亭氣槩上參天未應霜雪能摧抑不用行人歎可憐東崦扶踈一樹梅繁英辜負嵗時開殷勤寄語蘭兼蕙它日春風我亦來甘冷冝茶石縫泉得名𥘉自玉堂仙蒼苔滓穢聊疏治照月涵星復粲然一徑緣雲入夀星竹間窈窕見踈櫺闌干數曲觀臺上幽草靚花常滿庭吳門有懷錢塘何彥時仙尉英妙何郎藴德光不隨人世事炎涼麒麟步武開天上他日青雲道路長英遊閣前官桞行柔枝嫋嫋弄鵝黃多情春色還依舊獨有離人天一方湖岸茸茸細草生芳洲杜若想縱橫去年問桞尋花地誰伴穿雲渡水行劉咸臨秀才挽詞道源學士之子劉子江南英韻勝不友俗閉門誦詩書户外無來躅昔我寄匡山嵓扉屏幽獨君聞跨蹇驢迢迢訪深谷忘懷去畦畛結好比松竹浮雲事忽空逝水難再復徒有篋中文千秋成鬼録異材擢陽阿秀色方蔚然侵尋掩衆阜屹屹上造天驚飈忽摧殞中道虛棄捐顔淵古稱夭道德今獨妍何求擁腫為無用徒永年平生本家學耻作干時語著書以愚名綽欲慕前古紛紛詆迂闊默默君自許弱齡詠風騷其詞哀以苦先生歎竒作夀達終難與果為冥冥遊一往不可覩吾希李長吉異代不得友賴餘錦囊篇把玩時在手斯人君並駕未易較先後肝脾褁陽秋落筆粲瓊玖當年邂逅初宛在三峽右相携石橋行下瞰冰雪溜音容俄永隔山月空依舊銘詩得黃香知子垂不朽贈霍山人先生少年喜武事三略六韜曽遍閲胸中雲夢吞八九氣勝萬夫真勇決防邉伊昔從都護欲取功名繼前烈臂弓腰箭事戎裝逺出砂場恣遊獵擒狐射鴈狂且逸不覺歸途迷夜雪敗官遭譴失所志回首飄然辭魏闕挾持妙術當生涯放浪江湖間嵗月尋常得錢即沽酒笑與妻奴同飲啜樂天知命了無憂奕奕紅顔浮兩頰春風浩蕩魯城邉稠花亂蘂爭紛妍方將與君共携手騁懷遊目相回旋興來别我汶陽去黃鵠一舉難留連村橋野店醉斜日路人誰識地行仙參寥子詩集卷第八
