front:
  text: 參寥子詩集巻第十
  hash: sha256:458ba687cd26d06f16084806776e24fdcb8d4e58fdfeb4d18f5d3273ae99d21c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_010-1a}
body:
  text: 續許元裕夣中作下遂夣爲詩覺而記其兩句云未可病中折許奉議失㓜子甚慧方悲惱中卧於北䆫元𥙿意其子他日必復生俾余續之折驚老去會湏花底喚春歸語甚羙而北䆫支枕夣幽㣲隱隱神眀發暗機未可病中驚老去㑹湏花底喚春歸琉璃雖破彩雲飛演慶髙門未易衰既有嘉祥能兆夣定湏他日産熊羆次韻聞復湖上秋日六言十首澤畔蒹葭蕭瑟露華落日珠浮撫事少陵多感萬端獨立懐憂禪餘偶登絶巘據石聊為欠申眼界謾分畦畛誰知大道無隣楚客當年何苦愁懐繚轉非舒頼有管城公子離騷萬恨能書西湖發揮有素最盛唯誇樂天遺愛到今不朽長隄一道如弦處士尚餘陳迹断碑横卧林塘婉約梅花秀句騷人萬古傳香草蔓行将潰茂菊英稍稍敷金南浦愁窺去燕海山莽蒼雲深江城秋至幾日風物斗覺凄凉隣女機絲何有夜聞促織悲傷人物年來衰謝背繩追曲周容嗟爾得時蝘蜓故能嘲哂龜龍涼月娟娟清媚舒光巧入簾櫳萬籟聲同比竹細窺一一空中可恠狙公巧黠猶迷暮四朝三老我身如枯枿瓦然不動幽嵓觀宗室趙明發使君所畫訪戴圗并二小詩因次其韻水石追摩詰風騷類小山每來窺二妙戀戀欲忘還巉絶千峰玉清妍五字詩胷中盤爽氣彷彿幾人知次韻樓試可承議見招東州覉旅迹誰親夫子端能給我貧黙識松筠霜後操静桃折看李夢中春嵩陽勝絶髙天下縣令風流邁古人待得芳菲開爛熳去隨行樂後車塵次韻秦少游學士畫江千晚晴圖四首折觀宗室大年觀察所數幅生綃上形容萬態心坐窺天下勝何用逺登臨漠漠雲披岫斑斑雨弄晴横江舟一葉注目使人驚陽秋閟肝膈無處見㣲茫時作丹青戯風流冠帝鄉參差山接野渺莽水連空笠釣沙頭客真冝避世翁春隂浮雲易作雨無端未放春泥十日乾湏信杏園憔悴煞從來花骨不禁寒次韻伯言眀發登西樓望桃花江南梅子已生人京國桃花始放春氣候不齊雖可恨一枝猶得見墻闉小樓西望那人家出屋香梢幾樹花只恐東風能作悪亂紅如雨墮䆫紗送伯言赴姑蘇上幕都城公子海賢否良難㑹從容翰墨場班班知所詣超然三四公詞學昔人配源流出蘇黄汲引功豈細斯人固才華氣節復逺邁一官從幕府未覺簿書礙投刃却鳬行岸巾依物外凝香久寂寞清絶今可繼𥘉辭廣陌塵笑皷春江枻楚岫與吴山相望挹空際莫唱渭城歌臨流増歎喟贈歐陽季黙承議先公跨箕尾揺曳旋天關於今二紀餘肯復來人間時時對遺編彷彿窺一斑夢寐思見之何從暫追攀迩來都城裏忽覩庭中蘭方寸實驚喜典刑斯可觀抱痾一榻上骨瘦清琅玕爲余設幽几氣皃徐以寛㣲詞落玉麈文彩真孔鸞棣華惜未識妙譽聞朝端先公德未冺四海共仰歎願言付百世清風嗣門䦨次韻劉延中廷直見贈劉郎世胄子苦學窮淵源羞爲一掬清欲効千丈渾君看長鯨質澗壑豈所存操觚妙述作斧鑿無纎㾗鍾牙不世出審音誰復論鵷鶵理勁翮雲漢思孤騫上追鸞皇游下棄燕雀喧建安誇七子壮氣君可吞九衢苦昬霾槐隂蔽重門良辰爲我飯滿案餘芳蓀軟語夜達旦未覺罷神魂湏知名教樂不羨冨貴尊酬劉巨載舍人見贈所畫山水扇冰紈玉粉净無塵墨妙扶踈更絶倫試問揮毫厎人物不言從可識天真觀眀發畫李賀髙軒過圖唐年茂宗枝時平多俊良長吉尤震曜春林擢孤芳退之於孔門屹屹真棟梁筆力障百川風瀾息其狂破衣繫麻鞵右顧生輝光一朝與湜軰命駕驚煌煌賀初為兒童隨父事迎将湏臾命賦詩英氣加激昻長安衆詞客聲問争推揚風流垂異代尚想古錦嚢君今亦宗英韻勝斯人方少年肯事事苦學志獨強風騷擬屈宋妙處相頡頏丹青出戯弄配古猶擅場形容示往事彷彿如在旁一徑入幽逺古垣繚林莊平橋跨渌水叢薄含葱蒼晴䆫為披拂佳興杳難忘次韻東坡居士過嶺一時遷客盡難堪二老髙懷黙自甘造物定知還嶺北暮年寜許喪天南安排拄杖尋廬阜斗藪征衣洗瘴嵐他日相逢長夜語殘燈飛燼落毿毿次韻代嶺上老人荅閑持箕箒掃崔嵬夾道松隂盡我栽人去人歸真一笑壊空成住互輪回次韻子由侍郎書事二首七年依嶺外遇物即防閑宿負𥘉償畢他生豈復還飄飄疑鶴骨奕奕藹童顔自許喬松夀玄機宻鏁關真材不易得於國實長城造父還能御驊騮豈憚行買田隣少室為計老餘生居士來何晚江淮遣候迎次韻丗可見訪峻極遇雨都城塵土倦茫茫獨喜西來筞甚長避暑禪房依亢爽可人溪雨作清凉飛蚊斗絶簷間閙乳燕時拳砌下篁縣令風流真晉客談餘玉麈自揮揚揖仙亭崧陽古令尹製錦誇妙手鳴絃對髙堂坐使風俗厚政成思考槃觴豆宴賔友開亭面緱嶺佳致昔未有雲煙靄葱曨青壁冠星斗王子果真仙揖君千載後鸞車駐縹緲彷彿容暫偶天風吹簫笙凄響落户牖紛紛驚坐客往往爲囬首相顧弗復言且進杯中酒次韻試可同逰法王嶽寺兩山脩徑盡榛蕪謾詫當年幸翠輿空覩宸文藏寳􅌟不逢衲子話真如長老折寺久無林深想見靈根茂地勝冝多隠者居凉月照人歸路好傍溪嘉樹影扶踈次韻試可喜雨東阡北陌久黄埃天遣神龍詎用媒雲似濤頭山半起雨如銀竹望中來奔輸澗谷時頽岸噴激龜魚或曝顋民物有秋真可喜池蓮從此更湏栽峻極夏夜廣庭無凡株鬰鬰兩佳樹扶踈饒美䕃盤錯根本固朝披葉厎風夜泫衣上露禪餘自循繞百匝未忍住月華中天來左右發暉素清景非人間泠然洗吾慮緬彼大梁下炎蒸毒朝暮朱門曉未開馬足已馳騖摧眉事權要幸彼一盻顧素標挿君頭擾擾獨不悟觀宗室曹夫人畫野水平林眇不窮雪翻鷗鷺㸃晴空洞房豈識江湖趣意象冥將造化同華屋生知世胄榮誰教天付與多能西風白草牛羊晚隠見横岡一兩層臨平山下藕花洲旁引官河一帶流雨棹風㠶有無處筆端湏與細冥捜平藕花圖折甞許作臨次韻陽翟尉黄天選見寄寓形宇宙間佚我方以老流光安足恃百嵗同過鳥頃余嬰網羅文彩縁自表自古山林人何曽識機巧但記寒嵓翁論心秋月皎黃香十年舊學術參衆妙虚懷養天和肯徇奔走閙官居職事理晨起何用早桐隂滿西齋叱吏供洒掃眷余東南來野飯煑芹藻先生既清尚令尹亦髙蹈相將古寺行軟語頽晚照公家有畸人虚縁能自葆卜築嵩山陽行當從結好山中饒勝境一覧未易了何時命巾車共陟雲外嶠翻愁筋力疲不隨追勇踔公詩擬南山雄拔千丈峭形容逼天真解后適其要籓籬吾未窺敢議窮閫奥次韻試可嶽祠祭土宿齋神祠齋舘卧耽耽五皷星河屢起瞻劔珮森森趨帝右衣冠肅肅奉宸嚴風傳逺壑松千樹人擁囬廊月一簾四嶽旌幢𥘉㑹散晨烏聲動廟竿尖贈宗室徳強團練造物賦象質於余頗能名瓊瑶琢其骨冲和擅其清公生華屋貴好學從妙齡才髙豈容遏卓然以文鳴厚德滋善飬雍容無暫矜區區草苑人未必真爾能家藏三萬軸挿架連屋楹牙籖示題目探賾手不停㣲言固澹泊嗜好如飴餳祖宗開鴻基累聖致太平詵詵既蕃衍綽綽亦見稱𥙿陵喜人物教率從典刑聮翩試文藝議論參公卿公材實𣏌梓落落非杉檉願言勤著書㑹當補朝廷他時樹勲業彛鼎信可銘秋聲古槐花落小中庭夜半風來捲葉鳴潁水先生如尚在呼兒應問此何聲次韻天選寄逍遥庵黄居士收得詞場舉子身拂衣高卧傍嶙峋休言白日壷中勝且看紅顔鏡裏春冨貴群争雖有路山林獨往豈無人恐君未識陶彭澤故約籃輿訪采真次韻試可同謁子晉祠古栢連岡三萬株朝煙破日翠扶踈投鞭下馬得幽徑共謁賔天帝子居遺榮少海猛無雙便逐浮丘岀帝郷可笑而今居冨貴亦思高舉上蒼蒼哭少游學士江左有豪英超驤世無倫妙齡已述作識造窮天人儒林老先生相與為友賔客來叩治亂亹亹披霜筠波瀾與枝葉猶足跨後塵青衫入仕初十手爭扶輪孤嘲可敵衆志欝不得信造物念流落荐収付洪鈞干將不許就中晝如有神七年投炎荒日與山鬼隣妻孥各異土相望同參辰秋風吹黄茅八月瘴霧新囬車嬰重癘惸惸無與親中原尚杳隔墳隴懷棘薪凄涼浯水頭魂逝歸無因精爽竟了了挽章見情真流傳到京闕悲讀聞縉紳斯人儻不亡光華國之珎彼蒼未易曉三歎鼻酸辛念子少年日豪氣吞九州讀書知宎奥㳺刃無全牛當時所獻筞考致第一流論髙追賈誼氣勝凌馬周勝理非空文灼可資廟謀危根易揺動謂子不好脩嗚呼一齊人柰彼衆楚咻孔門餘四科士豈一律求區區事屠釣崛起為公侯數竒信有命君亦忘怨尤平生所著書字字鏗琳球子道决不泯千載傳芳猷瓶盂客京口彷彿熈寜末君方駕扁舟歸來自苕霅中泠忽相值傾蓋忘楚越禪揮龐老鋒辯皷子貢舌連宵極名談江閣倚清絶扣檻出黿鼉時取一笑發即岀賔客常以爲戯折金山江中多黿扣欄䢴溝介淮海濟濟多俊傑良辰苦招要結好從此設堂堂紫髯翁道德冠前烈老龍圖折謂孫莘風流廣文先烱烱事脩㓗仁博士折謂閻求老禪魁藂林冠蓋趨雜遝之禪師折謂慶顯三豪相繼往墓木葉屢脫子今復云亡枯棊愈殘缺相逢舊好間悲詫那忍說眀年東下舩繫䌫竹西月茗奠蜀岡南彈指當永訣參寥子詩集卷第十
