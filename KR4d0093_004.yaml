front:
  text: 參寥子詩集巻第四
  hash: sha256:08d0e94488c729496371f01805745d3f0231d977526a37a62c1f6b21f752807c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_004-1a}
body:
  text: 春行朝入春山千萬重暮歸溪上漫匆匆白沙岸口長回首無數漁燈翠靄中次韻傳師見過孫郎蕭洒逼人衣咫尺塵埃隔蕙帷陋巷有時過佛刹談經還共惜秋暉百年空果冥中謝一寸靈珠象外歸久矣此情人不諭援毫聊復爲君揮准上聞鴈寄仲恭欹枕舡舷夜櫓停數行南去鴈如繩起來欲寄相思字髙拂銀河喚不噟與怡然夜話雲埋碧瓦寒侵戸榻照青燈夜色空故國十年無限事笑談如在夢魂中鶴林寺宛轉囬廊漫布金蕭條寒日墮墻隂門前合抱松千尺黄鶴不來年巳深寄舒堯文教授經綸滿腹貯雲霓卓犖丘門道可躋絳帳開時霞影亂青衿立處鴈行齊憶親麈尾焚香夜共惜筠梢落月低别後鳯毛知更長五車應巳識詮題次韻順上人寄叔康講師少年好詩書齷齪空閉户有若丹青徒秉筆學畫虎法師當是時聲價久巳負籍籍東州人髙談慕支許余時跡四方浪渉川陸苦昨夜北山翁挑燈同軟語因論鄉里賢悵師成獨阻南徐號名都興發歷漢楚峥嶸江上山王氣埋千古至今風前笛夜夜怨江浦感慨易成吟安得君來伍次韻順上人登壽寜閣昔過廣陵日兹樓亦盤桓飛甍切星斗鴻鵠争危欄怳若隨扶揺九萬直上摶下視古帝基蕭條空湠漫當時競豪華人物鏤綺紈孰謂千載後故宫半耕殘城西舊輦道繚繞猶屈盤咫尺見螢苑枯桑生晝寒閻閭豈復隘狐兎穴巳寛楚楚但喬木萋萋無寸山茍非壯士懷往往不忍看青旗催畫角囬首送飛翰得端叔淮上書揚舲恨不得與君俱之折云長淮秋色清曠順風飛鴻從西來有客遺我書開緘識逺意字字情有餘報言歷長淮泛泛乗舳艫天開㓕逺霧水碧涵空虚超然忘端倪身世疑有無徜徉極幽致恨我失之俱我昔與曾子兹㳺頗躊蹰風髙當白帝露冷凋紅蕖扁舟僅半月歷覽窮朝晡伊人亦才華俊逸千里駒結交慕豪彦倜儻非迂儒當時欲相從恨子隔海隅今朝子獨往我軰還星踈邂逅亦有分夤縁非強圗茫然臨西風俛首良自吁庻幾有至理去彼形跡拘相望雲漢間皎㓗同蟾蜍送慧悟大師還闕下道人本丘壑浪爲京華居一往二十年嵗月驚湏臾禪餘挾妙術出入卿大夫飛揚動天子聲問傾九衢紛彼户外屨泛如水中鳬髙懐勌酬應逸賞思江湖春風巻衣祴千古隨舳艫中泠湧樓觀圎嶠連方壷杖筞歩鼇頭直上窮﨑嶇超然萬象外所得良有餘興盡乗白雲飄飄還帝都將之金陵寄侍琪服之秀才黄昬落帆牛渚磯蒼石岸黒行人稀漁燈夜深逺近沒水鳥月眀來去飛瓶盂漸與南斗闊身世東去將焉爲鍾山咫尺行可及㑹當與子同遨嬉鍾山夜月萬壑千嵓夜未央月華松色共蒼蒼上方巳覺無人語金殿誰焚栢子香睡起紅芳落盡踏青青啞咤黄鸝隔樹鳴午睡覺來聽不足杖藜重過竹隂行曾子固舍人挽辭命世髙標見實難狂瀾既倒頼公還學窮㳺夏淵源際文列斑楊伯仲間落落聲塵隨逝水滔滔論著在名山凄凉四海門人淚想對秋風爲一潸雄詞大冊破幽昬返覆難窺斧鑿痕投老雍容歸法從銜哀倉卒去都門雲泉巳負髙秋約江渚空悲静夜魂誰與朝廷終太史君王應待鶺鴒原子瞻赴守湖州武陵竇群朱宿詩追用其韻各賦三首折少㳺與余同載因㳺惠山覧唐處士王山煙弄滅沒山木含葱蒼刺舟傍遥岸理筞升虚堂周遭矚曾巘矯矯如翺翔下瞰平田流澹然浮日光青簩解初籜洗兩聞清香雖云迫前涂真賞豈易松門暗朝雨寂歷無行人隆曦忽穿漏卉木蔚以新堦泉漱石齒照眼光磷磷吏君羙無度卓犖遺囂塵風標傲竹栢談笑凌穹旻何愧沈冥子卧霞吞結鄰揚帆渡江來洗眼驚翠樾雲姿既容裔鳥哢更清絶凌梯訪前蹤琬琰亦未㓕嗟我魚目光疇能綴明月狂墨掃琅玕風煙坐中發殊勝區中人茫茫走飛轍吴江垂虹亭同賦得岸字蜿蜒誇長虹吴㑹稱傑觀淪漣幾萬頃放目失垠岸倒影射遥山青螺㸃空半從來夸震澤勝事無昬旦破浪湧長鬐排空度飛翰肺肝入清境劃若春冰泮安得凌九垓從公㳺汗漫同吴興尉錢濟明南溪泛舟枇杷弄實梅欲黄海氣冥冥錯昬書僧坊亭午隘可鄙畫舸從君逐溪溜斗欣紛翳眼前失但覺波光翻縠縐蘋花洗雨白雪香荷柄吹風青玉瘦囬看行人走南北蠢蠢岸傍如蟻闘一竿落日麗樵明繞郭雲山相倚搆嶄嶄青壁映彤霞轉盻忽驚開錦繡好將傑句爲余寫天乞君才多頴荗錦囊玉刻厭傳玩燕尾蚕頭吾未䆒輕橈欲動蹇淹留城上哀笳凄巳奏吴興道中寄子瞻與少㳺同賦弱性嗜幽散出門隨所便蓮房紛可襲林幄正髙褰群木含晨景孤撐破宿煙逶迤屯秀㠋宛轉滀清漣岸匝藤花暗崖垂桂影圓引鶵鳴鴶鵴解籜露嬋姢怳若經愚谷渾疑渡􅦿川葑田青泛泛石葛蔓綿綿緬想醉山蕳相從狂謫仙援毫更妙韻愧乏碧雲妍田居四時原隰春風暖池塘鴈北翔曉耕雲塢潤午飯野芹香燕子依茒棟花枝過土墻東阡與南陌生事日皇皇五月梅争熟村村桑柘稀茜裙蚕婦瘦粉翅乳鵝肥菱蔓滋溪雨藤花鎻釣磯呼兒行採去亭午候荆扉刈穫終吾事田園日向閑晚香増橘柚潦水耗汀灣聚噪捿鴉定孤吹牧竪還兒童驚野燒一片起前山汩汩防濃霧窮冬亦謾勞茒簷催日午籬落聽雞號臘近還移竹宵閑更索綯春風歸早晚行見事東臯夏日龍井書事并秦少㳺少㳺時在越折呈辯才法師兼寄吴興蘇太守翠櫪髙蘿結晝隂驕陽無地迫吾身石崖細聽紅泉落林菓初甞碧柰新揮麈巳欣從惠逺談經終恨少遺民何時暫著登山屐來岸烏紗漉酒巾雨過千嵓爽氣新孤懐入夜與誰鄰風蟬故故頻移樹山月時時自近人禮樂汝其攻我短形骸吾巳付天真露華漸冷飛蚊息䆫裏吟燈亦可親自憐多病畏炎曦長夏投蹤此最冝青石白沙含淺瀬碧梧蒼竹聒涼颸雲中雞犬聽難辨谷口漁樵問不知斑杖芒鞵隨歩逺歸來幽火認苑茨朅來人外慰捿遟谷逺山長萬事遺好鳥未嘗吟俗韻白雲還解弄竒姿藤花冉冉青當户竹色姢姢碧過籬不羨故人探禹穴短橈孤榜逐漣漪寄俞伯謨宣義昆仲謝家蘭玉競芬芳千里南來未易忘猶憶娑羅雙樹院月眀相對坐胡床多病侵尋鬢巳霜昔年交友半殊方吴臺松栢今何似想見龍蛇數尺長夏夜斗帳昬昬夜氣蒸移床趂月卧中庭紫薇花露霑衣冷翻覺華胥夢易醒送楚上人還廣陵慶禪師法席吾鄉少年多齷齪投老家山猶戀著何異醯雞舞甕天肯信十方無壁落羡君壯懐慕逺舉萬里雲山行犖确荆江洞庭虚浩渺歛祴浮杯心自若去年臘月過湓城聆我幽蹤卧雲壑朅來相從慰契闊笑語逸發驚猿鶴春風又復卷征衣問子東去將何爲廣陵城西古佛刹中有老禪吾所師當年與君共伏役妙道彷彿窺籓籬别來星霜歎巳久夜夢往往神魂馳真金雖巳出頑鑛鍜錬豈厭増鉗鎚縱横法縛断除盡了了方為獅子兒晚興墻角風欺竹影斜數聲啼盡欲棲鴉重門巳閉断還往獨卷踈簾進月華下湖晚歸屈曲莎隄引興長肯辭芒屨踏秋霜歸來巳奏孤城角撩亂梅花落女墻秋日西湖兩山斜抱翠逶迤一水中間似漾陂孤榜獨來還獨往鸕鷀鸂䳵莫相疑琤然一葉墮空庭似喚幽人夢欲醒斜倚素屏褰翠幔沈香煙吐鏄山青南山爽氣對朝扉竹露吹風更濕衣可是吟魂怯清景何妨著屐歩苔磯飛來䨇鷺落寒汀秋水無㾗玉鏡清踈蓼黄蘆冝掩映沙邊危立太分眀欲跨髙樓曠逺情無端秋雨苦冥冥崢嶸日脚漏雲處瞥見遥山一抹青西風夜半捲庭槐卧聽鄰翁曉圃開稚子相呼入林去應知病菓落莓苔晨起䆫扉曉闢對平湖爽氣侵尋冷入膚林逈霜黄垂橘柚渚清沙碧老菰蒲忘機鷗鷺元相狎得食猿猱不用呼㳺目騁懐心正逸更慿髙處立湏臾參寥子詩集巻第四
