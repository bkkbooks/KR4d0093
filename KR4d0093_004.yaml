front:
  text: 參寥子詩集卷第四
  hash: sha256:e230a93ac14a4e666ea5f0e6faa040d54e602fa621048dd86554b26558d9b92b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0093_SBCK_004-1a}
body:
  text: 春行朝入春山千萬重暮歸溪上漫匆匆白沙岸口長回首無數漁燈翠靄中次韻傳師見過孫郎蕭灑逼人衣咫尺塵埃隔蕙帷陋巷有時過佛剎談經還共惜秋暉百年空果冥中謝一寸靈珠象外歸久矣此情人不諭援毫聊復為君揮準上聞鴈寄仲恭欹枕船舷夜櫓停數行南去鴈如繩起來欲寄相思字髙拂銀河喚不噟與怡然夜話雲埋碧瓦寒侵戶榻照青燈夜色空故國十年無限事笑談如在夢魂中鶴林寺宛轉回廊漫布金蕭條寒日墮墻隂門前合抱松千尺黃鶴不來年巳深寄舒堯文教授經綸滿腹貯雲霓卓犖丘門道可躋絳帳開時霞影亂青襟立處鴈行齊憶親麈尾焚香夜共惜筠梢落月低别後鳯毛知更長五車應巳識詮題次韻順上人寄叔康講師少年好詩書齷齪空閉户有若丹青徒秉筆學畫虎法師當是時聲價久巳負籍籍東州人髙談慕支許余時迹四方浪涉川陸苦昨夜北山翁挑燈同軟語因論鄉里賢悵師成獨阻南徐號名都興發歷漢楚峥嶸江上山王氣埋千古至今風前笛夜夜怨江浦感慨易成吟安得君來伍次韻順上人登壽寧閣昔過廣陵日兹樓亦盤桓飛甍切星斗鴻鵠爭危欄恍若隨扶搖九萬直上摶下視古帝基蕭條空湠漫當時競豪華人物鏤綺紈孰謂千載後故宫半耕殘城西舊輦道繚繞猶屈盤咫尺見螢苑枯桑生晝寒閻閭豈復隘狐兔穴巳寬楚楚但喬木萋萋無寸山茍非壯士懷往往不忍看青旗催畫角回首送飛翰得端叔淮上書揚舲恨不得與君俱之折云長淮秋色清曠順風飛鴻從西來有客遺我書開緘識逺意字字情有餘報言歷長淮泛泛乘舳艫天開滅逺霧水碧涵空虛超然忘端倪身世疑有無徜徉極幽致恨我失之俱我昔與曾子兹遊頗躊蹰風髙當白帝露冷凋紅蕖扁舟僅半月歷覽窮朝晡伊人亦才華俊逸千里駒結交慕豪彥倜儻非迂儒當時欲相從恨子隔海隅今朝子獨往我輩還星踈邂逅亦有分夤緣非強圗茫然臨西風俯首良自吁庶幾有至理去彼形迹拘相望雲漢間皎潔同蟾蜍送慧悟大師還闕下道人本丘壑浪為京華居一往二十年嵗月驚須臾禪餘挾妙術出入卿大夫飛揚動天子聲問傾九衢紛彼户外屨泛如水中鳬髙懷倦酬應逸賞思江湖春風卷衣祴千古隨舳艫中泠湧樓觀圎嶠連方壷杖策步鼇頭直上窮﨑嶇超然萬象外所得良有餘興盡乘白雲飄飄還帝都將之金陵寄侍琪服之秀才黃昏落帆牛渚磯蒼石岸黑行人稀漁燈夜深逺近沒水鳥月眀來去飛瓶盂漸與南斗闊身世東去將焉為鍾山咫尺行可及會當與子同遨嬉鍾山夜月萬壑千嵓夜未央月華松色共蒼蒼上方巳覺無人語金殿誰焚柏子香睡起紅芳落盡踏青青啞吒黃鸝隔樹鳴午睡覺來聽不足杖藜重過竹隂行曾子固舍人挽辭命世髙標見實難狂瀾既倒賴公還學窮遊夏淵源際文列斑楊伯仲間落落聲塵隨逝水滔滔論著在名山凄涼四海門人淚想對秋風為一潸雄詞大册破幽昏返覆難窺斧鑿痕投老雍容歸法從銜哀倉卒去都門雲泉巳負髙秋約江渚空悲靜夜魂誰與朝廷終太史君王應待鶺鴒原子瞻赴守湖州武陵竇群朱宿詩追用其韻各賦三首折少遊與余同載因遊惠山覽唐處士王山煙弄滅沒山木含蔥蒼刺舟傍遙岸理策升虛堂周遭矚曾巘矯矯如翺翔下瞰平田流淡然浮日光青簩解初籜洗兩聞清香雖云迫前塗真賞豈易松門暗朝雨寂歷無行人隆曦忽穿漏卉木蔚以新階泉漱石齒照眼光磷磷吏君美無度卓犖遺囂塵風標傲竹柏談笑凌穹旻何愧沈冥子卧霞吞結鄰揚帆渡江來洗眼驚翠樾雲姿既容裔鳥哢更清絶凌梯訪前蹤琬琰亦未滅嗟我魚目光疇能綴明月狂墨掃琅玕風煙坐中發殊勝區中人茫茫走飛轍吳江垂虹亭同賦得岸字蜿蜒誇長虹吳會稱傑觀淪漣幾萬頃放目失垠岸倒影射遙山青螺點空半從來夸震澤勝事無昏旦破浪湧長鬐排空度飛翰肺肝入清境劃若春冰泮安得凌九垓從公遊汗漫同吳興尉錢濟明南溪泛舟枇杷弄實梅欲黃海氣冥冥錯昏書僧坊亭午隘可鄙畫舸從君逐溪溜斗欣紛翳眼前失但覺波光翻縠皺蘋花洗雨白雪香荷柄吹風青玉瘦回看行人走南北蠢蠢岸傍如蟻鬪一竿落日麗樵明繞郭雲山相倚搆嶄嶄青壁映彤霞轉盻忽驚開錦繡好將傑句為余寫天乞君才多頴荗錦囊玉刻厭傳玩燕尾蠶頭吾未究輕橈欲動蹇淹留城上哀笳凄巳奏吳興道中寄子瞻與少遊同賦弱性嗜幽散出門隨所便蓮房紛可襲林幄正髙褰群木含晨景孤撑破宿煙逶迤屯秀崿宛轉滀清漣岸匝藤花暗崖垂桂影圓引雛鳴鴶鵴解籜露嬋姢恍若經愚谷渾疑渡􅦿川葑田青泛泛石葛蔓綿綿緬想醉山蕳相從狂謫仙援毫更妙韻愧乏碧雲妍田居四時原隰春風暖池塘鴈北翔曉耕雲塢潤午飯野芹香燕子依茒棟花枝過土墻東阡與南陌生事日皇皇五月梅爭熟村村桑柘稀茜裙蠶婦瘦粉翅乳鵝肥菱蔓滋溪雨藤花鎖釣磯呼兒行採去亭午候荆扉刈穫終吾事田園日向間晚香增橘柚潦水耗汀灣聚噪捿鴉定孤吹牧竪還兒童驚野燒一片起前山汩汩防濃霧窮冬亦謾勞茒簷催日午籬落聽雞號臘近還移竹宵間更索綯春風歸早晚行見事東臯夏日龍井書事并秦少遊少遊時在越折呈辨才法師兼寄吳興蘇太守翠櫪髙蘿結晝隂驕陽無地迫吾身石崖細聽紅泉落林果初嘗碧奈新揮麈巳欣從惠逺談經終恨少遺民何時暫著登山屐來岸烏紗漉酒巾雨過千嵓爽氣新孤懷入夜與誰鄰風蟬故故頻移樹山月時時自近人禮樂汝其攻我短形骸吾巳付天真露華漸冷飛蚊息窗裏吟燈亦可親自憐多病畏炎曦長夏投蹤此最冝青石白沙含淺瀨碧梧蒼竹聒涼颸雲中雞犬聽難辨谷口漁樵問不知斑杖芒鞋隨步逺歸來幽火認苑茨朅來人外慰捿遲谷逺山長萬事遺好鳥未嘗吟俗韻白雲還解弄竒姿藤花冉冉青當户竹色姢姢碧過籬不羡故人探禹穴短橈孤榜逐漣漪寄俞伯謨宣義昆仲謝家蘭玉競芬芳千里南來未易忘猶憶娑羅雙樹院月眀相對坐胡床多病侵尋鬢巳霜昔年交友半殊方吳臺松柏今何似想見龍蛇數尺長夏夜斗帳昏昏夜氣蒸移床趂月卧中庭紫薇花露霑衣冷翻覺華胥夢易醒送楚上人還廣陵慶禪師法席吾鄉少年多齷齪投老家山猶戀著何異醯雞舞甕天肯信十方無壁落羡君壯懷慕逺舉萬里雲山行犖確荆江洞庭虛浩渺斂祴浮杯心自若去年臘月過湓城聆我幽蹤卧雲壑朅來相從慰契闊笑語逸發驚猿鶴春風又復卷征衣問子東去將何為廣陵城西古佛剎中有老禪吾所師當年與君共伏役妙道倣佛窺籓籬别來星霜歎巳久夜夢往往神魂馳真金雖巳出頑礦煆錬豈厭增鉗鎚縱橫法縛斷除盡了了方為獅子兒晚興墻角風欺竹影斜數聲啼盡欲棲鴉重門巳閉斷還往獨卷踈簾進月華下湖晚歸屈曲莎隄引興長肯辭芒屨踏秋霜歸來巳奏孤城角撩亂梅花落女墻秋日西湖兩山斜抱翠逶迤一水中間似漾陂孤榜獨來還獨往鸕鷀鸂鷘莫相疑琤然一葉墮空庭似喚幽人夢欲醒斜倚素屏褰翠幔沈香煙吐鏄山青南山爽氣對朝扉竹露吹風更濕衣可是吟魂怯清景何妨著屐步苔磯飛來雙鷺落寒汀秋水無䀶玉鏡清踈蓼黃蘆冝掩映沙邊危立太分眀欲跨髙樓曠逺情無端秋雨苦冥冥崢嶸日腳漏雲處瞥見遙山一抹青西風夜半捲庭槐卧聽鄰翁曉圃開稚子相呼入林去應知病果落莓苔晨起窗扉曉闢對平湖爽氣侵尋冷入膚林逈霜黃垂橘柚渚清沙碧老菰蒲忘機鷗鷺元相狎得食猿猱不用呼遊目騁懷心正逸更慿髙處立須臾參寥子詩集卷第四
